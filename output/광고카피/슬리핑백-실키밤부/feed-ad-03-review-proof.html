<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Ad 03 - Review Social Proof</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #FFFDF9;
    font-family: 'Noto Sans KR', sans-serif;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .photo-section {
    width: 100%;
    height: 680px;
    position: relative;
    overflow: hidden;
  }

  .photo-section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
  }

  .photo-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 250px;
    background: linear-gradient(to top, #FFFDF9 0%, rgba(255,253,249,0.6) 50%, transparent 100%);
  }

  .photo-badge {
    position: absolute;
    top: 36px;
    right: 36px;
    background: #3D3229;
    color: #FFFFFF;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .review-section {
    padding: 0 60px;
    margin-top: -40px;
    position: relative;
    z-index: 2;
  }

  .star-rating {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stars {
    color: #E8A838;
    font-size: 36px;
    letter-spacing: 4px;
  }

  .rating-number {
    font-size: 40px;
    font-weight: 800;
    color: #3D3229;
  }

  .rating-count {
    font-size: 22px;
    font-weight: 400;
    color: #A89B8E;
  }

  .headline {
    font-size: 40px;
    font-weight: 700;
    color: #3D3229;
    line-height: 1.35;
    letter-spacing: -1.5px;
    margin-bottom: 28px;
  }

  .review-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 32px;
  }

  .review-card {
    background: #F5F2ED;
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
  }

  .review-card::before {
    content: '\201C';
    font-size: 48px;
    color: #D4C5A9;
    position: absolute;
    top: 8px;
    left: 20px;
    line-height: 1;
  }

  .review-text {
    font-size: 22px;
    font-weight: 500;
    color: #4A3F35;
    line-height: 1.5;
    padding-left: 28px;
    letter-spacing: -0.3px;
  }

  .review-author {
    font-size: 16px;
    font-weight: 400;
    color: #A89B8E;
    margin-top: 8px;
    padding-left: 28px;
  }

  .bottom-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    margin-top: 24px;
  }

  .product-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .product-name {
    font-size: 20px;
    font-weight: 600;
    color: #3D3229;
  }

  .product-price {
    font-size: 28px;
    font-weight: 700;
    color: #3D3229;
  }

  .brand-mark {
    font-size: 16px;
    font-weight: 300;
    color: #B8AD9E;
    letter-spacing: 4px;
  }

  .cta-pill {
    background: #3D3229;
    color: #FFFFFF;
    padding: 18px 44px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="ad-container">
  <div class="photo-section">
    <img src="file:///Users/inkyo/Downloads/슬리핑백/ddidong2_m21_1760173473_3740928689320337000_44615471898.jpg" alt="SUNDAY HUG 슬리핑백 아기 수면">
    <div class="photo-overlay"></div>
    <div class="photo-badge">REAL REVIEW</div>
  </div>

  <div class="review-section">
    <div class="star-rating">
      <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      <span class="rating-number">4.9</span>
      <span class="rating-count">/ 227 리뷰</span>
    </div>

    <h1 class="headline">227명의 엄마가 증명한<br>우리 아기 꿀잠의 비밀</h1>

    <div class="review-cards">
      <div class="review-card">
        <p class="review-text">밤새 이불 차던 아기가 아침까지 꿀잠 자요!</p>
        <p class="review-author">h***2 님 | 제이드 그린 구매</p>
      </div>
      <div class="review-card">
        <p class="review-text">소재가 진짜 실크처럼 부드러워요. 아기 피부에 딱이에요</p>
        <p class="review-author">m***a 님 | 오트 베이지 구매</p>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="product-info">
      <span class="brand-mark">SUNDAY HUG</span>
      <span class="product-name">꿀잠 슬리핑백 실키 밤부</span>
      <span class="product-price">54,900원</span>
    </div>
    <div class="cta-pill">리뷰 더 보기</div>
  </div>
</div>
</body>
</html>
