<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card News Guide 02 - WHY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    background: #FBF7F2;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #E8D5C0, #C49A6C, #A8C4A0, #9BB8D0, #C4A8D4);
  }

  .page-indicator {
    position: absolute;
    top: 130px;
    left: 70px;
    display: flex;
    gap: 10px;
    z-index: 2;
  }

  .page-dot {
    width: 48px;
    height: 8px;
    border-radius: 4px;
    background: #E0D5C8;
  }

  .page-dot:nth-child(2) {
    background: #4A3728;
    width: 72px;
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    padding: 200px 70px 340px 70px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4A3728, #6B5242);
    color: #fff;
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(74,55,40,0.2);
  }

  .step-label {
    font-size: 28px;
    font-weight: 700;
    color: #C49A6C;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .step-title {
    font-size: 58px;
    font-weight: 800;
    color: #4A3728;
    line-height: 1.35;
    letter-spacing: -2px;
    word-break: keep-all;
    margin-bottom: 50px;
  }

  .reason-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 50px;
  }

  .reason-item {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    background: #fff;
    border-radius: 24px;
    padding: 32px 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .reason-icon {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .reason-icon.red { background: #FFF0F0; }
  .reason-icon.orange { background: #FFF5EB; }
  .reason-icon.blue { background: #F0F4FF; }

  .reason-content {
    flex: 1;
  }

  .reason-title {
    font-size: 30px;
    font-weight: 700;
    color: #4A3728;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .reason-desc {
    font-size: 26px;
    font-weight: 400;
    color: #8B7B6B;
    line-height: 1.5;
  }

  /* Bottom photo strip */
  .photo-strip {
    flex: 1;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
  }

  .photo-strip img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .photo-strip-overlay {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(transparent, rgba(249,245,240,0.9));
  }

  .stat-badge {
    position: absolute;
    bottom: 24px;
    left: 24px;
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 16px 24px;
    font-size: 24px;
    font-weight: 700;
    color: #4A3728;
  }

  .stat-badge span {
    color: #C49A6C;
  }

  .logo {
    position: absolute;
    bottom: 354px;
    right: 70px;
    z-index: 2;
    font-size: 22px;
    font-weight: 600;
    color: #C4B5A5;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="page-indicator">
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
  </div>

  <div class="content">
    <div class="step-number">01</div>
    <span class="step-label">WHY</span>
    <h2 class="step-title">슬리핑백이<br>필요한 이유</h2>

    <div class="reason-list">
      <div class="reason-item">
        <div class="reason-icon red">&#10060;</div>
        <div class="reason-content">
          <p class="reason-title">이불 걷어차기 반복</p>
          <p class="reason-desc">밤새 이불 덮어주느라 엄마도 수면 부족</p>
        </div>
      </div>
      <div class="reason-item">
        <div class="reason-icon orange">&#9888;&#65039;</div>
        <div class="reason-content">
          <p class="reason-title">체온 유지 어려움</p>
          <p class="reason-desc">이불 없이 자면 냉방병 & 감기 위험</p>
        </div>
      </div>
      <div class="reason-item">
        <div class="reason-icon blue">&#128588;</div>
        <div class="reason-content">
          <p class="reason-title">안전한 수면 환경</p>
          <p class="reason-desc">느슨한 이불 대신 슬리핑백으로 질식 위험 제거</p>
        </div>
      </div>
    </div>

    <div class="photo-strip">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/ol_chaea_1759919392_3738797308504064982_69193025607.jpg" alt="UGC">
      <div class="photo-strip-overlay"></div>
      <div class="stat-badge">엄마 <span>10명 중 8명</span>이 밤잠 설친 경험</div>
    </div>
  </div>

  <div class="logo">SUNDAY HUG</div>
</body>
</html>
