<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card News Guide 04 - COLORS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    background: #FBF7F2;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #E8D5C0, #C49A6C, #A8C4A0, #9BB8D0, #C4A8D4);
  }

  .page-indicator {
    position: absolute;
    top: 130px;
    left: 70px;
    display: flex;
    gap: 10px;
    z-index: 2;
  }

  .page-dot {
    width: 48px;
    height: 8px;
    border-radius: 4px;
    background: #E0D5C8;
  }

  .page-dot:nth-child(4) {
    background: #4A3728;
    width: 72px;
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    padding: 200px 70px 340px 70px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4A3728, #6B5242);
    color: #fff;
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(74,55,40,0.2);
  }

  .step-label {
    font-size: 28px;
    font-weight: 700;
    color: #C49A6C;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .step-title {
    font-size: 56px;
    font-weight: 800;
    color: #4A3728;
    line-height: 1.35;
    letter-spacing: -2px;
    word-break: keep-all;
    margin-bottom: 50px;
  }

  /* Color grid */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    flex: 1;
  }

  .color-card {
    background: #fff;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .color-swatch {
    flex: 1;
    min-height: 140px;
  }

  .color-swatch.white-cream {
    background: linear-gradient(135deg, #FEFCF8, #F5EFE6);
    border-bottom: 3px solid #EDE4D8;
  }

  .color-swatch.oat-beige {
    background: linear-gradient(135deg, #E8DDD0, #D4C8B8);
  }

  .color-swatch.baby-pink {
    background: linear-gradient(135deg, #F8E0E0, #F0C8C8);
  }

  .color-swatch.jade-green {
    background: linear-gradient(135deg, #B8D4B8, #9CC49C);
  }

  .color-swatch.cloud-blue {
    background: linear-gradient(135deg, #C0D8E8, #A8C8DC);
  }

  .color-swatch.bloom-lavender {
    background: linear-gradient(135deg, #D4C0E0, #C4A8D4);
  }

  .color-info {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .color-name-kr {
    font-size: 26px;
    font-weight: 700;
    color: #4A3728;
    letter-spacing: -0.5px;
  }

  .color-name-en {
    font-size: 20px;
    font-weight: 500;
    color: #B0A090;
    letter-spacing: 0.5px;
  }

  .popular-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(74,55,40,0.85);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 10px;
  }

  .bottom-note {
    margin-top: 16px;
    text-align: center;
    font-size: 26px;
    font-weight: 500;
    color: #8B7B6B;
    line-height: 1.5;
  }

  .logo {
    position: absolute;
    bottom: 354px;
    right: 70px;
    z-index: 2;
    font-size: 22px;
    font-weight: 600;
    color: #C4B5A5;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="page-indicator">
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
  </div>

  <div class="content">
    <div class="step-number">03</div>
    <span class="step-label">COLORS</span>
    <h2 class="step-title">6가지 컬러,<br>고르는 재미</h2>

    <div class="color-grid">
      <div class="color-card">
        <div class="color-swatch white-cream"></div>
        <div class="color-info">
          <span class="color-name-kr">화이트 크림</span>
          <span class="color-name-en">White Cream</span>
        </div>
        <span class="popular-badge">BEST</span>
      </div>
      <div class="color-card">
        <div class="color-swatch oat-beige"></div>
        <div class="color-info">
          <span class="color-name-kr">오트 베이지</span>
          <span class="color-name-en">Oat Beige</span>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch baby-pink"></div>
        <div class="color-info">
          <span class="color-name-kr">베이비 핑크</span>
          <span class="color-name-en">Baby Pink</span>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch jade-green"></div>
        <div class="color-info">
          <span class="color-name-kr">제이드 그린</span>
          <span class="color-name-en">Jade Green</span>
        </div>
        <span class="popular-badge">NEW</span>
      </div>
      <div class="color-card">
        <div class="color-swatch cloud-blue"></div>
        <div class="color-info">
          <span class="color-name-kr">클라우드 블루</span>
          <span class="color-name-en">Cloud Blue</span>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch bloom-lavender"></div>
        <div class="color-info">
          <span class="color-name-kr">블룸 라벤더</span>
          <span class="color-name-en">Bloom Lavender</span>
        </div>
      </div>
    </div>

    <p class="bottom-note">인테리어에 맞춰, 기분에 맞춰 골라 입히는 재미</p>
  </div>

  <div class="logo">SUNDAY HUG</div>
</body>
</html>
