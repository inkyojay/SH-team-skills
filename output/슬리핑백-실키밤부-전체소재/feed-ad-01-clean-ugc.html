<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Ad 01 - Clean Minimal UGC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #FAF8F5;
    font-family: 'Noto Sans KR', sans-serif;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .photo-area {
    width: 100%;
    height: 850px;
    position: relative;
    overflow: hidden;
  }

  .photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .photo-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to top, #FAF8F5 0%, transparent 100%);
  }

  .badge {
    position: absolute;
    top: 40px;
    left: 40px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .badge-stars {
    color: #E8A838;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .badge-text {
    font-size: 20px;
    font-weight: 600;
    color: #3D3229;
    letter-spacing: -0.3px;
  }

  .content-area {
    padding: 30px 60px 0;
    text-align: center;
  }

  .hook-copy {
    font-size: 46px;
    font-weight: 700;
    color: #3D3229;
    line-height: 1.35;
    letter-spacing: -1.5px;
    margin-bottom: 18px;
  }

  .hook-copy em {
    font-style: normal;
    color: #8BAE6A;
  }

  .sub-copy {
    font-size: 24px;
    font-weight: 400;
    color: #8C7E72;
    line-height: 1.5;
    margin-bottom: 30px;
    letter-spacing: -0.3px;
  }

  .price-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .price {
    font-size: 38px;
    font-weight: 700;
    color: #3D3229;
    letter-spacing: -1px;
  }

  .price-sub {
    font-size: 20px;
    font-weight: 400;
    color: #A89B8E;
  }

  .cta-button {
    display: inline-block;
    background: #3D3229;
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 600;
    padding: 20px 60px;
    border-radius: 50px;
    letter-spacing: 0.5px;
    margin-bottom: 30px;
  }

  .brand-logo {
    font-size: 18px;
    font-weight: 300;
    color: #B8AD9E;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="ad-container">
  <div class="photo-area">
    <img src="file:///Users/inkyo/Downloads/슬리핑백/ji_eunwoooo_1758544683_3727265412238447170_56729168769.jpg" alt="아기 슬리핑백 UGC">
    <div class="photo-gradient"></div>
    <div class="badge">
      <span class="badge-stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      <span class="badge-text">4.9 (227)</span>
    </div>
  </div>

  <div class="content-area">
    <h1 class="hook-copy">대나무에서 온<br><em>실크 같은</em> 부드러움</h1>
    <p class="sub-copy">실키 밤부 슬리핑백 - 아기 피부가 먼저 알아요</p>
    <div class="price-row">
      <span class="price">54,900원</span>
      <span class="price-sub">6가지 컬러</span>
    </div>
    <div class="cta-button">자세히 보기</div>
    <div class="brand-logo">SUNDAY HUG</div>
  </div>
</div>
</body>
</html>
