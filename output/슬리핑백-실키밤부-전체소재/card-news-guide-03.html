<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card News Guide 03 - HOW (Silky Bamboo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    background: #FBF7F2;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #E8D5C0, #C49A6C, #A8C4A0, #9BB8D0, #C4A8D4);
  }

  .page-indicator {
    position: absolute;
    top: 130px;
    left: 70px;
    display: flex;
    gap: 10px;
    z-index: 2;
  }

  .page-dot {
    width: 48px;
    height: 8px;
    border-radius: 4px;
    background: #E0D5C8;
  }

  .page-dot:nth-child(3) {
    background: #4A3728;
    width: 72px;
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    padding: 200px 70px 340px 70px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4A3728, #6B5242);
    color: #fff;
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(74,55,40,0.2);
  }

  .step-label {
    font-size: 28px;
    font-weight: 700;
    color: #C49A6C;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .step-title {
    font-size: 56px;
    font-weight: 800;
    color: #4A3728;
    line-height: 1.35;
    letter-spacing: -2px;
    word-break: keep-all;
    margin-bottom: 44px;
  }

  /* Photo area */
  .photo-area {
    width: 100%;
    height: 420px;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 40px;
    position: relative;
  }

  .photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  .fabric-tag {
    position: absolute;
    top: 24px;
    right: 24px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 22px;
    font-weight: 700;
    color: #4A3728;
  }

  /* Feature grid */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    flex: 1;
  }

  .feature-card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .feature-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .feature-icon.green { background: #F0F7F0; }
  .feature-icon.blue { background: #F0F4FF; }
  .feature-icon.pink { background: #FFF0F5; }
  .feature-icon.yellow { background: #FFFBF0; }

  .feature-title {
    font-size: 28px;
    font-weight: 700;
    color: #4A3728;
    letter-spacing: -0.5px;
  }

  .feature-desc {
    font-size: 24px;
    font-weight: 400;
    color: #8B7B6B;
    line-height: 1.45;
  }

  .feature-highlight {
    font-size: 22px;
    font-weight: 700;
    color: #C49A6C;
  }

  .logo {
    position: absolute;
    bottom: 354px;
    right: 70px;
    z-index: 2;
    font-size: 22px;
    font-weight: 600;
    color: #C4B5A5;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="page-indicator">
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
    <div class="page-dot"></div>
  </div>

  <div class="content">
    <div class="step-number">02</div>
    <span class="step-label">HOW</span>
    <h2 class="step-title">실키 밤부 소재의<br>4가지 장점</h2>

    <div class="photo-area">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/hi_seowo_o_1758420925_3726227258068877754_65366928480.jpg" alt="Product">
      <span class="fabric-tag">Silky Bamboo</span>
    </div>

    <div class="feature-grid">
      <div class="feature-card">
        <div class="feature-icon green">&#127807;</div>
        <p class="feature-title">실크 같은 촉감</p>
        <p class="feature-desc">대나무에서 추출한<br>초부드러운 원단</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon blue">&#127744;</div>
        <p class="feature-title">통기성 3배</p>
        <p class="feature-desc">면 대비 3배<br>뛰어난 통기성</p>
        <p class="feature-highlight">사계절 OK</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon pink">&#128737;</div>
        <p class="feature-title">천연 항균</p>
        <p class="feature-desc">밤부 원단 고유의<br>항균 기능</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon yellow">&#128274;</div>
        <p class="feature-title">양방향 지퍼</p>
        <p class="feature-desc">기저귀 갈 때<br>완전히 안 벗겨도 OK</p>
      </div>
    </div>
  </div>

  <div class="logo">SUNDAY HUG</div>
</body>
</html>
