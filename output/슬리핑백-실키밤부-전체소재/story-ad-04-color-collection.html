<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story Ad 04 - Color Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    background: #FEFCF9;
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    padding: 140px 70px 340px 70px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .header {
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .brand-tag {
    font-size: 22px;
    font-weight: 600;
    color: #C49A6C;
    letter-spacing: 3px;
  }

  .headline {
    font-size: 52px;
    font-weight: 800;
    color: #4A3728;
    line-height: 1.35;
    letter-spacing: -2px;
    word-break: keep-all;
  }

  .subtitle {
    font-size: 28px;
    font-weight: 500;
    color: #8B7B6B;
    letter-spacing: -0.5px;
  }

  /* Color list - vertical swatches */
  .color-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 20px;
  }

  .color-row {
    flex: 1;
    display: flex;
    align-items: center;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s;
  }

  .color-swatch-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 28px;
  }

  .color-row.white-cream { background: linear-gradient(135deg, #FEFCF8, #F5EFE6); border: 2px solid #EDE4D8; }
  .color-row.oat-beige { background: linear-gradient(135deg, #EDE0D2, #D8CBBB); }
  .color-row.baby-pink { background: linear-gradient(135deg, #F8E2E2, #F0CCCC); }
  .color-row.jade-green { background: linear-gradient(135deg, #C0D8C0, #A4C8A4); }
  .color-row.cloud-blue { background: linear-gradient(135deg, #C8DCE8, #B0CCDC); }
  .color-row.bloom-lavender { background: linear-gradient(135deg, #D8C4E4, #C8ACD8); }

  .color-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .white-cream .color-circle { background: #FAF6F0; }
  .oat-beige .color-circle { background: #C8BAA8; }
  .baby-pink .color-circle { background: #E8B0B0; }
  .jade-green .color-circle { background: #8CB88C; }
  .cloud-blue .color-circle { background: #90B8CC; }
  .bloom-lavender .color-circle { background: #B090C4; }

  .color-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .color-name {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .white-cream .color-name,
  .oat-beige .color-name { color: #4A3728; }
  .baby-pink .color-name { color: #6B3A3A; }
  .jade-green .color-name { color: #2D5A2D; }
  .cloud-blue .color-name { color: #2A4A5A; }
  .bloom-lavender .color-name { color: #4A2D5A; }

  .color-en {
    font-size: 22px;
    font-weight: 500;
    opacity: 0.55;
  }

  .white-cream .color-en,
  .oat-beige .color-en { color: #4A3728; }
  .baby-pink .color-en { color: #6B3A3A; }
  .jade-green .color-en { color: #2D5A2D; }
  .cloud-blue .color-en { color: #2A4A5A; }
  .bloom-lavender .color-en { color: #4A2D5A; }

  .color-badge {
    margin-left: auto;
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(4px);
  }

  .white-cream .color-badge { color: #4A3728; }
  .jade-green .color-badge { color: #2D5A2D; }

  .fomo-badge {
    margin-left: auto;
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 700;
    background: rgba(196,78,78,0.15);
    color: #C44E4E;
    animation: fomoPulse 2s infinite;
  }

  @keyframes fomoPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Poll section (투표 스티커 자리) */
  .poll-section {
    margin-top: 20px;
    background: #fff;
    border-radius: 24px;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .poll-question {
    font-size: 32px;
    font-weight: 700;
    color: #4A3728;
    letter-spacing: -0.5px;
  }

  .poll-fomo {
    font-size: 26px;
    font-weight: 600;
    color: #C44E4E;
    letter-spacing: -0.5px;
  }

  .poll-hint {
    font-size: 24px;
    font-weight: 500;
    color: #B0A090;
  }

  .poll-bar {
    width: 100%;
    height: 8px;
    background: #EDE4D8;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }

  .poll-bar div {
    height: 100%;
  }

  .poll-bar .p1 { width: 28%; background: #F5EFE6; }
  .poll-bar .p2 { width: 18%; background: #D8CBBB; }
  .poll-bar .p3 { width: 12%; background: #F0CCCC; }
  .poll-bar .p4 { width: 20%; background: #A4C8A4; }
  .poll-bar .p5 { width: 12%; background: #B0CCDC; }
  .poll-bar .p6 { width: 10%; background: #C8ACD8; }

  .logo {
    position: absolute;
    bottom: 354px;
    right: 70px;
    z-index: 2;
    font-size: 22px;
    font-weight: 600;
    color: #C4B5A5;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="header">
      <span class="brand-tag">SUNDAY HUG</span>
      <h1 class="headline">어떤 컬러가<br>제일 예뻐요?</h1>
      <p class="subtitle">꿀잠 슬리핑백 실키 밤부 6 colors</p>
    </div>

    <div class="color-list">
      <div class="color-row white-cream">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">화이트 크림</span>
            <span class="color-en">White Cream</span>
          </div>
          <span class="color-badge">BEST</span>
        </div>
      </div>
      <div class="color-row oat-beige">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">오트 베이지</span>
            <span class="color-en">Oat Beige</span>
          </div>
        </div>
      </div>
      <div class="color-row baby-pink">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">베이비 핑크</span>
            <span class="color-en">Baby Pink</span>
          </div>
        </div>
      </div>
      <div class="color-row jade-green">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">제이드 그린</span>
            <span class="color-en">Jade Green</span>
          </div>
          <span class="color-badge">NEW</span>
        </div>
      </div>
      <div class="color-row cloud-blue">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">클라우드 블루</span>
            <span class="color-en">Cloud Blue</span>
          </div>
        </div>
      </div>
      <div class="color-row bloom-lavender">
        <div class="color-swatch-area">
          <div class="color-circle"></div>
          <div class="color-text">
            <span class="color-name">블룸 라벤더</span>
            <span class="color-en">Bloom Lavender</span>
          </div>
          <span class="fomo-badge">HOT</span>
        </div>
      </div>
    </div>

    <div class="poll-section">
      <p class="poll-question">나의 PICK은?</p>
      <p class="poll-fomo">블룸 라벤더 나만 알고 싶었는데 인기 폭발!</p>
      <div class="poll-bar">
        <div class="p1"></div>
        <div class="p2"></div>
        <div class="p3"></div>
        <div class="p4"></div>
        <div class="p5"></div>
        <div class="p6"></div>
      </div>
      <p class="poll-hint">인기 컬러 품절 전에 서두르세요!</p>
    </div>
  </div>

  <div class="logo">SUNDAY HUG</div>
</body>
</html>
