<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Ad 02 - Multi Color Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ad-container {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #F7F4F0;
    font-family: 'Noto Sans KR', sans-serif;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .header {
    padding: 48px 60px 32px;
    text-align: center;
  }

  .brand-logo {
    font-size: 16px;
    font-weight: 300;
    color: #B8AD9E;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .main-copy {
    font-size: 42px;
    font-weight: 700;
    color: #3D3229;
    line-height: 1.3;
    letter-spacing: -1.5px;
  }

  .main-copy em {
    font-style: normal;
    background: linear-gradient(120deg, #C8D8B0 0%, #A8C8D8 50%, #D4B8D8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub-copy {
    font-size: 22px;
    font-weight: 400;
    color: #8C7E72;
    margin-top: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 8px;
    padding: 24px 40px;
    height: 780px;
  }

  .grid-item {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
  }

  .grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .grid-item .color-label {
    position: absolute;
    bottom: 14px;
    left: 14px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    color: #3D3229;
    letter-spacing: -0.3px;
  }

  .color-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px 40px;
  }

  .color-swatches {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(61,50,41,0.1);
  }

  .cta-text {
    font-size: 22px;
    font-weight: 600;
    color: #3D3229;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cta-arrow {
    font-size: 26px;
  }

  .price-tag {
    font-size: 20px;
    font-weight: 700;
    color: #3D3229;
  }
</style>
</head>
<body>
<div class="ad-container">
  <div class="header">
    <div class="brand-logo">SUNDAY HUG</div>
    <h1 class="main-copy"><em>6가지 파스텔 컬러</em>로<br>매일 다른 꿀잠 코디</h1>
    <p class="sub-copy">실키 밤부 슬리핑백 | 54,900원</p>
  </div>

  <div class="grid">
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/ji_eunwoooo_1758544683_3727265411944836813_56729168769.jpg" alt="제이드 그린">
      <div class="color-label"><span class="color-dot" style="background:#8BAE6A;"></span>제이드 그린</div>
    </div>
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/myluv_jua_1758595506_3727691748417425905_68917446288.jpg" alt="오트 베이지">
      <div class="color-label"><span class="color-dot" style="background:#D4C5A9;"></span>오트 베이지</div>
    </div>
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/hi_seowo_o_1758420925_3726227258446322723_65366928480.jpg" alt="화이트 크림">
      <div class="color-label"><span class="color-dot" style="background:#F5F0E8;"></span>화이트 크림</div>
    </div>
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/mming_kkong__1760015410_3739602762813647989_3587164260.jpg" alt="클라우드 블루 (참고)">
      <div class="color-label"><span class="color-dot" style="background:#A8C8D8;"></span>클라우드 블루</div>
    </div>
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/mongdol.zip_1762759114_3762618618980035746_69437222169.jpg" alt="베이비 핑크 (참고)">
      <div class="color-label"><span class="color-dot" style="background:#E8C4C4;"></span>베이비 핑크</div>
    </div>
    <div class="grid-item">
      <img src="file:///Users/inkyo/Downloads/슬리핑백/ss__honeys__ss_1758256537_3724848265955507803_51850137427.jpg" alt="블룸 라벤더 (참고)">
      <div class="color-label"><span class="color-dot" style="background:#C8B8D8;"></span>블룸 라벤더</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="color-swatches">
      <div class="swatch" style="background:#F5F0E8;"></div>
      <div class="swatch" style="background:#D4C5A9;"></div>
      <div class="swatch" style="background:#E8C4C4;"></div>
      <div class="swatch" style="background:#8BAE6A;"></div>
      <div class="swatch" style="background:#A8C8D8;"></div>
      <div class="swatch" style="background:#C8B8D8;"></div>
    </div>
    <div class="cta-text">컬러 보러 가기 <span class="cta-arrow">&rarr;</span></div>
  </div>
</div>
</body>
</html>
