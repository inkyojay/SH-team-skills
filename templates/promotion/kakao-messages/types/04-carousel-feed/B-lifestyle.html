  VARIATION: B — Lifestyle · 감성 커버 + 스트립 카드

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐러셀 피드 - B Lifestyle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">

<!-- Card 1: Cover -->
<div class="km-card" data-type="feed">
  <img class="km-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="라이프스타일 커버">
  <div class="km-cover-text overlay" style="justify-content:flex-end;padding-bottom:56px;">
    <div style="font-family:var(--font-display);font-size:14px;font-weight:500;letter-spacing:.3em;color:rgba(255,255,255,.7);margin-bottom:8px;">SUNDAY HUG</div>
    <div style="font-family:var(--font-display);font-size:36px;font-weight:300;font-style:italic;color:#fff;line-height:1.4;">포근한 잠자리,<br>행복한 하루의 시작</div>
  </div>
</div>

<!-- Card 2: Content -->
<div class="km-card" data-type="feed" style="margin-top:20px;">
  <img class="km-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="라이프스타일">
  <div class="km-strip">
    <span class="km-strip-brand">Sunday Hug</span>
    <span class="km-strip-text">매일 밤 포근한 잠자리, 온 가족의 행복</span>
  </div>
</div>
