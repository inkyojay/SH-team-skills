<!--=============================================================
  TYPE: 쿠폰 배너 (Coupon Banner)
  VARIATION: A — Single (단일 쿠폰)
  DIMENSIONS: 720 × 360px
  PURPOSE: 쿠폰 다운로드 유도 — 단일 쿠폰 강조
  IMAGE SPEC: 제품 이미지 좌측 배치
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>쿠폰 배너 - A Single</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ss-frame" data-type="coupon">
  <div style="display:flex;width:100%;height:100%;background:var(--palette-gradient);">
    <!-- 좌측 제품 이미지 -->
    <div style="flex:0 0 280px;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/feature-02-01.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <!-- 우측 쿠폰 정보 -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 48px;">
      <span class="ss-label" style="font-size:14px;margin-bottom:12px;">COUPON DOWNLOAD</span>
      <div style="font-size:26px;font-weight:700;color:var(--dark);line-height:1.3;text-align:center;margin-bottom:12px;">지금 다운받고 할인 받으세요</div>
      <div class="ss-coupon-card" style="width:320px;padding:28px 32px;">
        <div class="ss-coupon-amount">15,000원</div>
        <div class="ss-coupon-condition" style="margin-top:8px;">실키밤부 슬리핑백 전용 할인 쿠폰</div>
        <div style="margin-top:12px;font-family:var(--font-en);font-size:14px;color:var(--sub);">5만원 이상 구매 시 사용 가능</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
