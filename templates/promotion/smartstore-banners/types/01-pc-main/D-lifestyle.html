<!--=============================================================
  TYPE: PC 메인배너 (PC Main Banner)
  VARIATION: D — Lifestyle (라이프스타일 풀 이미지)
  DIMENSIONS: 1920 × 600px
  PURPOSE: 스토어 홈 상단 — 라이프스타일 이미지 위 텍스트 오버레이
  IMAGE SPEC: 1920 × 600px 이상 (전체 커버, 우측 50% 영역에 여백 확보)
  REFERENCE: 아기 침대 배너 — 풀블리드 이미지 + 우측 텍스트
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PC 메인배너 - D Lifestyle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
<style>
  .ss-lifestyle-pc {
    position: relative;
    width: 1920px;
    height: 600px;
    overflow: hidden;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  .ss-lifestyle-pc__bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .ss-lifestyle-pc__content {
    position: absolute;
    top: 0; right: 0;
    width: 46%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 100px 0 0;
    z-index: 1;
  }
  .ss-lifestyle-pc__pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 22px;
    border: 1px solid #5a5a5a;
    border-radius: 100px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #3a3a3a;
    margin-bottom: 24px;
  }
  .ss-lifestyle-pc__subtitle {
    font-family: var(--font-body);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.5;
    color: #3a3a3a;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .ss-lifestyle-pc__title {
    font-family: var(--font-body);
    font-size: 38px;
    font-weight: 700;
    line-height: 1.35;
    color: #1a1a1a;
    letter-spacing: -0.03em;
    margin-bottom: 14px;
  }
  .ss-lifestyle-pc__tag {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    color: #777777;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ss-lifestyle-pc">
  <!-- 풀블리드 배경 이미지 -->
  <img class="ss-lifestyle-pc__bg"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="실키밤부 슬리핑백">
  <!-- 우측 텍스트 영역 -->
  <div class="ss-lifestyle-pc__content">
    <span class="ss-lifestyle-pc__pill">자세히 만나보기</span>
    <div class="ss-lifestyle-pc__subtitle">어디에 있어도, 같은 잠자리</div>
    <div class="ss-lifestyle-pc__title">아기의 하루가 머무는 침대</div>
    <span class="ss-lifestyle-pc__tag">2차 프리오더</span>
  </div>
</div>
<!--
  ▸ 사용 예시 (변수 치환):
    ../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg  → 라이프스타일 사진 경로
    실키밤부 슬리핑백   → 이미지 대체 텍스트
    자세히 만나보기    → "자세히 만나보기"
    어디에 있어도, 같은 잠자리    → "어디에 있어도, 같은 잠자리"
    아기의 하루가 머무는 침대       → "아기의 하루가 머무는 침대"
    2차 프리오더     → "2차 프리오더"

  ▸ 이미지 가이드:
    - 피사체를 좌측~중앙에 배치 (우측 40%에 텍스트 공간 확보)
    - 밝고 따뜻한 톤의 라이프스타일 사진 권장
    - 우측 영역이 너무 어우면 텍스트 가독성 저하
-->
</body>
</html>
