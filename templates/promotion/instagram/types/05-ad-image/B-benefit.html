<!--=============================================================
  TYPE: 광고 이미지 (Ad Image)
  VARIATION: B — Benefit
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 광고용 — 혜택 강조 (할인/무료배송 등)
  IMAGE SPEC: 540 × 1080px (우측 절반)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광고 이미지 - B Benefit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ig-frame" data-type="feed">
  <div class="ig-split">
    <!-- Left: Benefit info -->
    <div class="ig-split-text" style="background:var(--palette-gradient);padding:60px 50px;">
      <span class="ig-label" style="margin-bottom:32px;">SPECIAL OFFER</span>

      <!-- Discount badge -->
      <div style="width:140px;height:140px;border-radius:50%;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:32px;">
        <span style="font-family:var(--font-en);font-size:48px;font-weight:700;color:#fff;">52%</span>
        <span style="font-family:var(--font-en);font-size:16px;font-weight:500;color:rgba(255,255,255,.8);letter-spacing:.1em;">OFF</span>
      </div>

      <div style="font-size:32px;font-weight:700;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>

      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;">
        <span style="font-family:var(--font-en);font-size:40px;font-weight:700;color:var(--dark);">29,900원</span>
      </div>
      <div style="font-family:var(--font-en);font-size:20px;color:var(--sub);text-decoration:line-through;margin-bottom:32px;">62,000원</div>

      <!-- Benefits -->
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></div>
          <span style="font-size:22px;color:var(--body);">오늘만 특가</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></div>
          <span style="font-size:22px;color:var(--body);">첫 구매 10% 추가 할인</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></div>
          <span style="font-size:22px;color:var(--body);">카드 무이자 3개월</span>
        </div>
      </div>

      <div class="ig-brand-bar" style="margin-top:auto;">
        <span class="ig-brand-logo" style="color:var(--accent-dark);font-size:22px;">Sunday Hug</span>
      </div>
    </div>

    <!-- Right: Product image -->
    <div class="ig-split-img">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg" alt="실키밤부 슬리핑백">
    </div>
  </div>
</div>
</body>
</html>
