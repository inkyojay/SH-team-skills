<!--=============================================================
  TYPE: 카드뉴스 (Card News)
  VARIATION: B — Story (스토리텔링)
  DIMENSIONS: 1080 × 1350px (4:5) × 3 slides
  PURPOSE: 브랜드 스토리 — 라이프스타일 감성
  IMAGE SPEC: 1080 × 1350px (4:5 비율)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드뉴스 - B Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">

<!-- ===== SLIDE 1: COVER ===== -->
<div class="ig-frame" data-type="card" style="margin-bottom:40px;">
  <img class="ig-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-04.jpg" alt="실키밤부 슬리핑백 라이프스타일">
  <div class="ig-overlay bottom" style="padding-top:300px;">
    <span class="ig-label" style="margin-bottom:24px;color:#fff;opacity:.8;">BRAND STORY</span>
    <div class="ig-title" style="font-size:56px;margin-bottom:16px;">
      아이의 밤을<br>포근하게 안아주다
    </div>
    <div class="ig-subtitle" style="font-size:28px;">썬데이허그 실키밤부 이야기</div>
    <div class="ig-slide-number" style="margin-top:32px;color:rgba(255,255,255,.5);">1 / 3</div>
  </div>
</div>

<!-- ===== SLIDE 2: STORY CONTENT ===== -->
<div class="ig-frame" data-type="card" style="margin-bottom:40px;">
  <div style="display:flex;flex-direction:column;height:100%;">
    <!-- Top: Image -->
    <div style="flex:0 0 45%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/feature-01-02.jpg" alt="실키밤부 원단" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <!-- Bottom: Story text -->
    <div style="flex:1;padding:60px 80px;background:var(--bg-warm);display:flex;flex-direction:column;justify-content:center;">
      <div class="ig-slide-number" style="margin-bottom:24px;">2 / 3</div>
      <div style="font-family:var(--font-display);font-size:36px;font-weight:300;font-style:italic;color:var(--accent-dark);line-height:1.5;margin-bottom:32px;">
        "Every thread is woven with love"
      </div>
      <div style="font-size:28px;font-weight:700;color:var(--dark);margin-bottom:16px;">자연이 선물한 밤부 원단</div>
      <div style="font-size:24px;color:var(--body);line-height:1.8;">
        밤부 원단은 대나무에서 추출한 천연 섬유로,<br>
        실크처럼 부드러우면서도 뛰어난 통기성과<br>
        자연 항균 기능을 가지고 있습니다.<br><br>
        썬데이허그는 이 특별한 원단으로<br>
        아이의 수면 환경을 한 단계 높였습니다.
      </div>
    </div>
  </div>
</div>

<!-- ===== SLIDE 3: CTA ===== -->
<div class="ig-frame" data-type="card">
  <div class="ig-center" style="padding:100px 80px;">
    <div class="ig-slide-number" style="margin-bottom:40px;">3 / 3</div>
    <div style="font-family:var(--font-display);font-size:48px;font-weight:300;font-style:italic;color:var(--accent-dark);line-height:1.5;margin-bottom:40px;">
      Gentle dreams,<br>every night.
    </div>
    <div style="font-size:36px;font-weight:700;color:var(--dark);margin-bottom:12px;">실키밤부 슬리핑백</div>
    <div style="font-size:24px;color:var(--body);margin-bottom:48px;">아이의 꿀잠을 위한 프리미엄 선택</div>
    <div class="ig-cta-button">지금 구매하기</div>
    <div class="ig-brand-bar" style="margin-top:60px;">
      <span class="ig-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>
  </div>
</div>

</body>
</html>
