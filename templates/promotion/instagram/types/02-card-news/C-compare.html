<!--=============================================================
  TYPE: 카드뉴스 (Card News)
  VARIATION: C — Compare (비교형)
  DIMENSIONS: 1080 × 1350px (4:5) × 3 slides
  PURPOSE: 제품 비교 — 일반 vs 실키밤부
  IMAGE SPEC: 1080 × 1350px (4:5 비율)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드뉴스 - C Compare</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">

<!-- ===== SLIDE 1: COVER ===== -->
<div class="ig-frame" data-type="card" style="margin-bottom:40px;">
  <div class="ig-center" style="padding:100px 80px;">
    <span class="ig-badge" style="margin-bottom:48px;">VS</span>
    <div class="ig-title" style="font-size:60px;margin-bottom:24px;">
      일반 슬리핑백 vs<br>실키밤부 슬리핑백
    </div>
    <div class="ig-subtitle" style="font-size:30px;margin-bottom:40px;">어떤 차이가 있을까요?</div>
    <div class="ig-brand-bar" style="margin-top:auto;">
      <span class="ig-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>
    <div class="ig-slide-number" style="margin-top:32px;">1 / 3</div>
  </div>
</div>

<!-- ===== SLIDE 2: COMPARISON TABLE ===== -->
<div class="ig-frame" data-type="card" style="margin-bottom:40px;">
  <div style="display:flex;flex-direction:column;height:100%;padding:80px 60px;background:var(--bg-warm);">
    <div class="ig-slide-number" style="margin-bottom:32px;">2 / 3</div>
    <div class="ig-label" style="margin-bottom:40px;">COMPARISON</div>

    <!-- Table header -->
    <div style="display:flex;gap:16px;margin-bottom:24px;padding-bottom:24px;border-bottom:2px solid var(--palette-card-border);">
      <div style="flex:1;font-size:22px;color:var(--sub);font-weight:500;"></div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:500;color:var(--sub);">일반 슬리핑백</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:700;color:var(--accent-dark);">실키밤부</div>
    </div>

    <!-- Row: 원단 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;padding:20px 0;border-bottom:1px solid var(--palette-card-border);">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">원단</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">폴리에스터</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">천연 밤부</div>
    </div>

    <!-- Row: 통기성 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;padding:20px 0;border-bottom:1px solid var(--palette-card-border);">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">통기성</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">보통</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">우수</div>
    </div>

    <!-- Row: 항균 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;padding:20px 0;border-bottom:1px solid var(--palette-card-border);">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">항균</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">없음</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">천연 항균</div>
    </div>

    <!-- Row: 온도조절 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;padding:20px 0;border-bottom:1px solid var(--palette-card-border);">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">온도조절</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">제한적</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">자동 조절</div>
    </div>

    <!-- Row: 촉감 -->
    <div style="display:flex;gap:16px;margin-bottom:20px;padding:20px 0;border-bottom:1px solid var(--palette-card-border);">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">촉감</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">일반</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">실크터치</div>
    </div>

    <!-- Row: 친환경 -->
    <div style="display:flex;gap:16px;padding:20px 0;">
      <div style="flex:1;font-size:26px;font-weight:600;color:var(--dark);">친환경</div>
      <div style="flex:1;text-align:center;font-size:24px;color:var(--body);">합성섬유</div>
      <div style="flex:1;text-align:center;font-size:24px;font-weight:600;color:var(--accent-dark);">지속가능</div>
    </div>
  </div>
</div>

<!-- ===== SLIDE 3: CTA ===== -->
<div class="ig-frame" data-type="card">
  <div style="display:flex;flex-direction:column;height:100%;">
    <div style="flex:0 0 55%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/feature-02-01.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div class="ig-card-body gradient" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div class="ig-slide-number" style="margin-bottom:24px;">3 / 3</div>
      <div style="font-size:36px;font-weight:700;color:var(--dark);margin-bottom:12px;">차이가 느껴지는 프리미엄</div>
      <div style="font-size:24px;color:var(--body);margin-bottom:32px;">실키밤부 슬리핑백으로 아이의 수면을 바꿔보세요</div>
      <div class="ig-cta-button">지금 구매하기</div>
      <div class="ig-brand-bar" style="margin-top:32px;">
        <span class="ig-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
