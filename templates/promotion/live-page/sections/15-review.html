<!--=============================================================
  SECTION: Review (리뷰)
  ORDER: 15
  REQUIRED: ✅ 필수
  BACKGROUND: white
  PURPOSE: 별점 통계 + 대표 리뷰 1~2개.

  DATA REQUIRED:
  - {{review_avg_score}}   : 평균 평점
  - {{review_total_count}} : 누적 리뷰 수
  - {{review_repurchase}}  : 재구매율
  - {{#reviews}}           : 리뷰 배열
=============================================================-->
<div class="sec">
  <div class="sec-label tx-center">Real Review</div>
  <div class="sec-title tx-center">실제 구매하신 분들의<br>솔직한 이야기</div>
  <div class="rv-stats">
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_avg_score}} <span class="unit">/ 5.0</span></div>
      <div class="rv-stat-label">평균 평점</div>
    </div>
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_total_count}}</div>
      <div class="rv-stat-label">누적 리뷰</div>
    </div>
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_repurchase}}<span class="unit">%</span></div>
      <div class="rv-stat-label">재구매율</div>
    </div>
  </div>
  {{#reviews}}
  <div class="rv">
    <div class="rv-stars">★ ★ ★ ★ ★</div>
    <div class="rv-quote">{{quote_html}}</div>
    <div class="rv-meta">{{meta}}</div>
    <div class="rv-body">{{body}}</div>
  </div>
  {{/reviews}}
</div>
