<!--=============================================================
  SECTION: Price Compare (가격 비교표)
  ORDER: 08
  REQUIRED: 🔶 선택
  BACKGROUND: warm
  PURPOSE: 정가 vs 온라인 최저가 vs 라이브가 3열 비교.

  DATA REQUIRED:
  - {{price_regular}}     : 정가 (예: "89,000원")
  - {{price_online}}      : 온라인 최저가 (예: "65,000원")
  - {{price_live}}        : 라이브가 (예: "42,800원")
  - {{price_save_amount}} : 절약 금액 (예: "46,200원")
=============================================================-->
<div class="sec warm">
  <div class="sec-label tx-center">Price Compare</div>
  <div class="sec-title tx-center">라이브에서 가장<br>합리적인 가격</div>
  <div class="price-tbl">
    <div class="price-col">
      <div class="price-col-label">정가</div>
      <div class="price-col-amount">{{price_regular}}</div>
    </div>
    <div class="price-col">
      <div class="price-col-label">온라인 최저가</div>
      <div class="price-col-amount">{{price_online}}</div>
    </div>
    <div class="price-col live">
      <div class="price-col-label">라이브가</div>
      <div class="price-col-amount">{{price_live}}</div>
    </div>
  </div>
  <div class="price-save">총 {{price_save_amount}} 절약!</div>
</div>
