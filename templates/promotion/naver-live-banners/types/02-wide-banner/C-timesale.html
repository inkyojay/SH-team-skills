<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>와이드 배너 - C Timesale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="wide">
  <img class="nlb-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg" alt="실키밤부 슬리핑백">
  <div class="nlb-overlay full">
    <span class="nlb-live-badge" style="font-size:20px;padding:12px 24px;margin-bottom:20px;">LIVE</span>
    <span class="nlb-label" style="color:rgba(255,255,255,.6);font-size:18px;margin-bottom:12px;">TIME SALE</span>
    <div class="nlb-title" style="font-size:56px;margin-bottom:16px;">타임세일</div>
    <div class="nlb-subtitle" style="font-size:28px;margin-bottom:24px;">실키밤부 슬리핑백 한정 특가</div>
    <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:20px;">
      <span class="nlb-discount" style="font-size:64px;">52%</span>
    </div>
    <div class="nlb-countdown" style="background:rgba(255,255,255,.15);color:#fff;">
      <span>00</span><span class="nlb-countdown-sep" style="color:rgba(255,255,255,.5);">:</span>
      <span>30</span><span class="nlb-countdown-sep" style="color:rgba(255,255,255,.5);">:</span>
      <span>00</span>
    </div>
  </div>
</div>
