<!--=============================================================
  TYPE: 상품 카드 (Product Card)
  VARIATION: A — Single
  DIMENSIONS: 720 × 720px (1:1)
  PURPOSE: 단일 상품 카드 — 상단 이미지 + 하단 정보
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상품 카드 - A Single</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="product">
  <!-- Top image 60% -->
  <div style="position:absolute;top:0;left:0;width:100%;height:60%;overflow:hidden;">
    <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
    <div style="position:absolute;top:24px;left:24px;">
      <span class="nlb-live-badge" style="font-size:14px;padding:8px 16px;">LIVE</span>
    </div>
  </div>
  <!-- Bottom info 40% -->
  <div class="nlb-card-body" style="position:absolute;bottom:0;left:0;width:100%;height:40%;padding:32px 40px;display:flex;flex-direction:column;justify-content:center;background:var(--bg-warm);">
    <span class="nlb-label" style="font-size:13px;margin-bottom:8px;">SUNDAY HUG</span>
    <div class="nlb-product-name" style="font-size:28px;margin-bottom:4px;">실키밤부 슬리핑백</div>
    <div class="nlb-product-desc" style="font-size:18px;margin-bottom:12px;">실크처럼 부드러운 프리미엄 밤부 원단</div>
    <div class="nlb-product-prices">
      <span class="nlb-product-discount" style="font-size:32px;">52%</span>
      <span class="nlb-product-price" style="font-size:32px;">29,900원</span>
      <span class="nlb-product-orig">62,000원</span>
    </div>
  </div>
</div>
</body>
</html>
