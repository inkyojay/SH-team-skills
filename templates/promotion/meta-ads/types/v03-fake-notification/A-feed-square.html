<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — iOS 알림 오버레이 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: iOS 알림 오버레이 (Fake Notification — V03)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — iOS 알림 배너 오버레이, 입소문 효과
  IMAGE SPEC: 배경 라이프스타일 이미지 1080×1080
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;position:relative;background:#E8DFD3;">

    <!-- Background: soft lifestyle scene -->
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, #F5EDE3 0%, #E8DFD3 40%, #D4C8B8 100%);"></div>

    <!-- Baby sleeping illustration area -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
      <div style="font-size:200px;opacity:.3;">👶💤</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:32px;color:rgba(0,0,0,.2);margin-top:20px;">아기가 자고 있어요...</div>
    </div>

    <!-- iOS Status Bar -->
    <div style="position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:10;">
      <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:20px;font-weight:600;color:#333;">9:41</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:16px;color:#333;">📶 🔋</span>
      </div>
    </div>

    <!-- Notification Banner -->
    <div style="position:absolute;top:72px;left:32px;right:32px;z-index:20;">
      <div style="background:rgba(255,255,255,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:24px;padding:24px 28px;box-shadow:0 8px 40px rgba(0,0,0,.12);display:flex;gap:20px;align-items:flex-start;">
        <!-- App icon -->
        <div style="width:72px;height:72px;border-radius:16px;background:#FEE500;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;">💬</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;">카카오톡</span>
            <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:18px;color:#8E8E93;">지금</span>
          </div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;font-weight:600;color:#1a1a1a;margin-bottom:4px;">엄마</div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;color:#3C3C43;line-height:1.4;">이거 어디서 샀어?? 우리 아기한테도 사줘야겠다 😍</div>
        </div>
      </div>
    </div>

    <!-- Second Notification -->
    <div style="position:absolute;top:280px;left:32px;right:32px;z-index:19;">
      <div style="background:rgba(255,255,255,.88);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:24px;padding:24px 28px;box-shadow:0 8px 40px rgba(0,0,0,.08);display:flex;gap:20px;align-items:flex-start;">
        <div style="width:72px;height:72px;border-radius:16px;background:#FF6B6B;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;">🛒</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;">Sunday Hug</span>
            <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:18px;color:#8E8E93;">2분 전</span>
          </div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;color:#3C3C43;line-height:1.4;">스와들 스트랩 품절 임박! 지금 바로 확인하세요</div>
        </div>
      </div>
    </div>

    <!-- Bottom brand -->
    <div style="position:absolute;bottom:40px;left:0;right:0;text-align:center;z-index:5;">
      <span class="ma-brand-logo" style="font-size:26px;color:rgba(0,0,0,.25);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
