<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 시즌/컬렉션 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 시즌/컬렉션 (Seasonal/Collection)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 시즌 신상품/컬렉션 런칭 소구
  IMAGE SPEC: 풀블리드 시즌 무드 이미지 1080×1080
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">

  <!-- Full-bleed seasonal mood image -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="시즌 컬렉션">

  <!-- Top label -->
  <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
    <span class="ma-badge" style="font-size:20px;padding:12px 32px;">NEW COLLECTION</span>
  </div>

  <!-- Bottom overlay -->
  <div class="ma-overlay bottom" style="padding:60px 72px;padding-top:300px;">
    <div class="ma-label" style="color:rgba(255,255,255,.6);font-size:20px;letter-spacing:.3em;margin-bottom:12px;">2026 SPRING</div>
    <div class="ma-quote" style="color:#fff;font-size:48px;line-height:1.4;margin-bottom:16px;">
      봄을 담은<br>새로운 컬렉션
    </div>
    <div class="ma-subtitle" style="color:rgba(255,255,255,.7);font-size:28px;margin-bottom:32px;">
      따스한 봄바람처럼 부드러운 촉감
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="ma-brand-bar">
        <span class="ma-brand-logo" style="color:rgba(255,255,255,.9);">Sunday Hug</span>
      </div>
      <a class="ma-cta-button" style="font-size:24px;padding:18px 48px;">컬렉션 보기</a>
    </div>
  </div>

</div>

</body>
</html>
