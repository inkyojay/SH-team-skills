<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 감성 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 감성 (Emotional)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 감성 스토리/릴스, 상단 텍스트 + 풀블리드 사진
  IMAGE SPEC: 풀블리드 라이프스타일 사진 1080×1920 + 상단 그라디언트 오버레이
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">

  <!-- Full-bleed hero image -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="실키밤부 슬리핑백 라이프스타일">

  <!-- Top overlay only -->
  <div class="ma-overlay top" style="padding:100px 80px;padding-bottom:300px;">

    <!-- SUNDAY HUG label -->
    <div class="ma-label" style="color:rgba(255,255,255,.55);font-size:22px;letter-spacing:.3em;margin-bottom:44px;">SUNDAY HUG</div>

    <!-- Display font quote -->
    <div class="ma-quote" style="color:#fff;font-size:56px;line-height:1.5;">
      Sleep tight,<br>little one
    </div>

  </div>

  <!-- Product name — positioned at middle, above safezone -->
  <div style="position:absolute;top:45%;left:0;right:0;text-align:center;z-index:1;">
    <div style="font-family:var(--font-body);font-size:28px;color:rgba(255,255,255,.8);font-weight:300;letter-spacing:.05em;">
      실키밤부 슬리핑백
    </div>
  </div>

  <!-- Brand logo — positioned above safezone (top 60%) -->
  <div style="position:absolute;top:58%;left:50%;transform:translateX(-50%);z-index:1;">
    <span class="ma-brand-logo" style="color:rgba(255,255,255,.65);font-size:24px;">Sunday Hug</span>
  </div>

  <!-- Safezone: bottom 35% (672px) kept clear -->

</div>

</body>
</html>
