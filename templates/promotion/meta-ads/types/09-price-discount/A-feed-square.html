<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 가격/할인 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 가격/할인 (Price-Discount)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 대폭 할인율 강조로 즉각 구매 유도
  IMAGE SPEC: 없음 (그래디언트 배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-center" style="height:100%;padding:80px 80px 60px;justify-content:space-between;background:var(--palette-gradient);">

    <!-- Top: Badge + Label -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <span class="ma-badge" style="font-size:20px;padding:12px 32px;">LIMITED OFFER</span>
      <span class="ma-label" style="font-size:20px;letter-spacing:.25em;">SUNDAY HUG</span>
    </div>

    <!-- Center: Massive Discount -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="display:flex;align-items:baseline;gap:12px;">
        <span class="ma-discount" style="font-size:160px;line-height:1;">52</span>
        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:0;">
          <span class="ma-discount" style="font-size:56px;line-height:1;">%</span>
          <span class="ma-discount" style="font-size:56px;line-height:1;margin-top:-4px;">OFF</span>
        </div>
      </div>

      <!-- Price Info -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:16px;">
        <span class="ma-price-orig" style="font-size:30px;">62,000원</span>
        <span class="ma-price" style="font-size:64px;color:var(--dark);">29,900원</span>
      </div>

      <!-- Product Name -->
      <div class="ma-subtitle" style="font-size:32px;margin-top:12px;color:var(--dark);">실키밤부 슬리핑백</div>
    </div>

    <!-- CTA + Brand -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="ma-cta-button" style="font-size:30px;padding:26px 72px;">지금 구매하기</span>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
