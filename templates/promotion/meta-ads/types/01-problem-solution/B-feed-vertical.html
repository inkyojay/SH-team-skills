<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 문제-해결 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 문제-해결 (Problem-Solution)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 수면 고민 리스트 → 슬리핑백 해결 포인트
  IMAGE SPEC: 제품 이미지 300×300 둥근 썸네일 (하단 패널)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Problem (45%) -->
    <div style="height:45%;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;text-align:center;">
      <div class="ma-label" style="color:rgba(255,255,255,.5);font-size:20px;letter-spacing:.25em;margin-bottom:32px;">PROBLEM</div>
      <div class="ma-title" style="color:#fff;font-size:48px;margin-bottom:48px;">이런 고민, 있으셨죠?</div>
      <div style="display:flex;flex-direction:column;gap:24px;width:100%;max-width:700px;">
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.06);border-radius:16px;">
          <span class="ma-cross" style="font-size:28px;">✗</span>
          <span style="font-family:var(--font-body);font-size:32px;color:rgba(255,255,255,.85);font-weight:400;">밤마다 이불을 걷어차요</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.06);border-radius:16px;">
          <span class="ma-cross" style="font-size:28px;">✗</span>
          <span style="font-family:var(--font-body);font-size:32px;color:rgba(255,255,255,.85);font-weight:400;">새벽에 추워서 깨요</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.06);border-radius:16px;">
          <span class="ma-cross" style="font-size:28px;">✗</span>
          <span style="font-family:var(--font-body);font-size:32px;color:rgba(255,255,255,.85);font-weight:400;">땀이 차서 뒤척여요</span>
        </div>
      </div>
    </div>

    <!-- BOTTOM: Solution (55%) -->
    <div style="height:55%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 80px;text-align:center;">
      <!-- Product image thumbnail -->
      <div style="width:300px;height:300px;border-radius:50%;overflow:hidden;margin-bottom:32px;box-shadow:0 8px 40px rgba(0,0,0,.1);flex-shrink:0;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div class="ma-title" style="font-size:40px;margin-bottom:28px;">실키밤부 슬리핑백</div>
      <!-- Feature highlights -->
      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:36px;width:100%;max-width:600px;">
        <div style="display:flex;align-items:center;gap:16px;justify-content:center;">
          <span class="ma-check" style="font-size:26px;">✓</span>
          <span style="font-family:var(--font-body);font-size:28px;color:var(--dark);font-weight:400;">사계절 온도 조절</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;justify-content:center;">
          <span class="ma-check" style="font-size:26px;">✓</span>
          <span style="font-family:var(--font-body);font-size:28px;color:var(--dark);font-weight:400;">실크처럼 부드러운 촉감</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;justify-content:center;">
          <span class="ma-check" style="font-size:26px;">✓</span>
          <span style="font-family:var(--font-body);font-size:28px;color:var(--dark);font-weight:400;">발차기 걱정 끝</span>
        </div>
      </div>
      <a class="ma-cta-button" style="margin-bottom:24px;">자세히 보기</a>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
