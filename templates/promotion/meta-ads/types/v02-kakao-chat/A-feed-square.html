<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 카카오톡 대화 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 카카오톡 대화 스타일 (KakaoTalk Chat — V02)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 카카오톡 채팅 UI 재현, 대화형 제품 추천
  IMAGE SPEC: 없음 (UI 전용)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;background:#B2C7D9;">

    <!-- KakaoTalk Header -->
    <div style="height:88px;background:#3B3B3B;display:flex;align-items:center;justify-content:center;position:relative;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;font-weight:500;color:#fff;">엄마들 단톡방 👶</span>
      <div style="position:absolute;right:28px;top:50%;transform:translateY(-50%);display:flex;gap:20px;">
        <span style="font-size:24px;color:rgba(255,255,255,.6);">🔍</span>
        <span style="font-size:24px;color:rgba(255,255,255,.6);">☰</span>
      </div>
    </div>

    <!-- Chat Area -->
    <div style="flex:1;padding:32px 28px;display:flex;flex-direction:column;gap:28px;overflow:hidden;">

      <!-- Other person message -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#FFB6C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">🤱</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">지은맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:580px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;color:#1a1a1a;">이거 써봤어?</span>
          </div>
          <div style="font-size:18px;color:rgba(0,0,0,.4);margin-top:6px;">오후 11:23</div>
        </div>
      </div>

      <!-- My message -->
      <div style="display:flex;flex-direction:row-reverse;gap:12px;align-items:flex-end;">
        <div style="background:#FEE500;border-radius:16px 16px 4px 16px;padding:20px 28px;max-width:580px;">
          <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;color:#1a1a1a;">뭔데?? 🤔</span>
        </div>
        <div style="font-size:18px;color:rgba(0,0,0,.4);">오후 11:23</div>
      </div>

      <!-- Other person message -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#FFB6C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">🤱</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">지은맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;color:#1a1a1a;">스와들 스트랩ㅋㅋ<br>아기 진짜 잘 잠 ㄷㄷ<br>7시간 연속 잤어</span>
          </div>
          <div style="font-size:18px;color:rgba(0,0,0,.4);margin-top:6px;">오후 11:24</div>
        </div>
      </div>

      <!-- My message -->
      <div style="display:flex;flex-direction:row-reverse;gap:12px;align-items:flex-end;">
        <div style="background:#FEE500;border-radius:16px 16px 4px 16px;padding:20px 28px;max-width:580px;">
          <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;color:#1a1a1a;">헐 링크 좀!! 🙏🙏</span>
        </div>
        <div style="font-size:18px;color:rgba(0,0,0,.4);">오후 11:24</div>
      </div>

      <!-- Link preview -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#FFB6C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">🤱</div>
        <div style="background:#FFF;border-radius:16px;padding:0;max-width:500px;overflow:hidden;">
          <div style="background:#F8F4F0;padding:24px 28px;">
            <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:6px;">Sunday Hug 스와들 스트랩</div>
            <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#888;">sundayhug.kr</div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
