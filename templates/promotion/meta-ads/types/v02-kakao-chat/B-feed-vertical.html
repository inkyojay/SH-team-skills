<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 카카오톡 대화 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 카카오톡 대화 스타일 (KakaoTalk Chat — V02)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — 카카오톡 채팅 UI, 긴 대화형 제품 후기
  IMAGE SPEC: 없음 (UI 전용)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;background:#B2C7D9;">

    <!-- KakaoTalk Header -->
    <div style="height:88px;background:#3B3B3B;display:flex;align-items:center;justify-content:center;position:relative;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:30px;font-weight:500;color:#fff;">육아 고수 모임 🏆</span>
      <div style="position:absolute;right:28px;top:50%;transform:translateY(-50%);display:flex;gap:20px;">
        <span style="font-size:24px;color:rgba(255,255,255,.6);">🔍</span>
        <span style="font-size:24px;color:rgba(255,255,255,.6);">☰</span>
      </div>
    </div>

    <!-- Chat Area -->
    <div style="flex:1;padding:32px 28px;display:flex;flex-direction:column;gap:24px;overflow:hidden;">

      <!-- Date divider -->
      <div style="text-align:center;margin:8px 0;">
        <span style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:rgba(0,0,0,.35);background:rgba(0,0,0,.06);padding:8px 20px;border-radius:20px;">2026년 3월 22일 토요일</span>
      </div>

      <!-- Other message 1 -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#98D8C8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">👩</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">하은맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">슬리핑백 쓰시는 분 있어요?<br>뭐가 좋을까요 😭</span>
          </div>
          <div style="font-size:18px;color:rgba(0,0,0,.4);margin-top:6px;">오전 10:15</div>
        </div>
      </div>

      <!-- Other message 2 -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#FFB6C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">👩‍🦰</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">민서맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">썬데이허그 실키밤부!!<br>무조건 이거에요 ㅋㅋㅋ</span>
          </div>
        </div>
      </div>

      <!-- Other message 3 -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#DDA0DD;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">👱‍♀️</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">서윤맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">ㅇㅈ 우리도 그거 쓰는데<br>밤에 한번도 안깨요 진짜</span>
          </div>
        </div>
      </div>

      <!-- Other message 4 -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#FFB6C1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">👩‍🦰</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:20px;color:#333;margin-bottom:8px;">민서맘</div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">소재도 진짜 좋고<br>세탁해도 안 늘어나고<br>이불 걷어차도 괜찮고 👍</span>
          </div>
        </div>
      </div>

      <!-- My message -->
      <div style="display:flex;flex-direction:row-reverse;gap:12px;align-items:flex-end;">
        <div style="background:#FEE500;border-radius:16px 16px 4px 16px;padding:20px 28px;max-width:580px;">
          <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">나도 방금 주문함ㅋㅋㅋ</span>
        </div>
        <div style="font-size:18px;color:rgba(0,0,0,.4);">오전 10:22</div>
      </div>

      <!-- Reaction -->
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="width:64px;height:64px;border-radius:20px;background:#DDA0DD;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;">👱‍♀️</div>
        <div>
          <div style="background:#FFF;border-radius:16px 16px 16px 4px;padding:20px 28px;max-width:620px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#1a1a1a;">ㅋㅋㅋㅋ 잘한 선택 👏👏</span>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
