<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — Ugly 후기 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<!--=============================================================
  TYPE: Ugly/Lo-Fi 후기 (Ugly Review — V04)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — TikTok 캡션 스타일, 날것의 후기
  IMAGE SPEC: 없음 (텍스트 전용, 단색 배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;">

    <!-- Star rating -->
    <div style="font-size:56px;margin-bottom:48px;letter-spacing:8px;">
      <span style="color:#FFD700;">★★★★★</span>
    </div>

    <!-- Review text — TikTok caption style -->
    <div style="font-family:'Noto Sans KR',sans-serif;font-size:64px;font-weight:900;color:#FFF;line-height:1.5;text-shadow:4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 4px 12px rgba(0,0,0,.5);">
      솔직히<br>
      반신반의했는데<br>
      <span style="color:#FFD700;">아기가 진짜 안 깨요</span>
    </div>

    <!-- Reviewer -->
    <div style="margin-top:48px;font-family:'Noto Sans KR',sans-serif;font-size:28px;color:rgba(255,255,255,.5);font-weight:400;">
      — 3개월 아기 엄마
    </div>

    <!-- Brand -->
    <div style="position:absolute;bottom:40px;right:48px;">
      <span class="ma-brand-logo" style="font-size:22px;color:rgba(255,255,255,.2);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
