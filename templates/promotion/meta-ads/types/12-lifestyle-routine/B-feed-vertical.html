<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 라이프스타일/루틴 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 라이프스타일/루틴 (Lifestyle/Routine)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 하루 루틴 타임라인 형식
  IMAGE SPEC: 라이프스타일 사진 1080×500 (상단) + 타임라인 하단
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Lifestyle hero -->
    <div style="width:100%;height:38%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
           alt="수면 루틴"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 40%, rgba(250,247,244,1) 100%);z-index:1;"></div>
      <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:12px 32px;">DAILY ROUTINE</span>
      </div>
    </div>

    <!-- BOTTOM: Routine timeline -->
    <div style="width:100%;height:62%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:20px 72px 48px;">

      <div class="ma-title" style="font-size:40px;margin-bottom:8px;">우리 아이 수면 루틴</div>
      <div class="ma-subtitle" style="font-size:26px;margin-bottom:36px;">매일 밤, 같은 순서로</div>

      <!-- Timeline -->
      <div style="display:flex;flex-direction:column;gap:24px;width:100%;max-width:700px;margin-bottom:36px;">
        <div style="display:flex;align-items:center;gap:24px;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:#fff;">7PM</span>
          </div>
          <div>
            <div style="font-size:26px;font-weight:500;color:var(--dark);">따뜻한 목욕 시간</div>
            <div style="font-size:22px;color:var(--body);">체온을 적절하게 올려주세요</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:24px;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:#fff;">7:30</span>
          </div>
          <div>
            <div style="font-size:26px;font-weight:500;color:var(--dark);">슬리핑백 입히기</div>
            <div style="font-size:22px;color:var(--body);">실키밤부 슬리핑백으로 포근하게</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:24px;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:#fff;">8PM</span>
          </div>
          <div>
            <div style="font-size:26px;font-weight:500;color:var(--dark);">편안한 숙면</div>
            <div style="font-size:22px;color:var(--body);">아침까지 깊은 잠</div>
          </div>
        </div>
      </div>

      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
