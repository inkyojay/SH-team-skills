<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사용자 후기 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사용자 후기 (UGC/Testimonial)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 제품 이미지 + 리뷰 카드 조합
  IMAGE SPEC: 라이프스타일 이미지 1080×608 (상단 45%)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- Top 45%: Product Image -->
    <div style="width:100%;height:45%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
           alt="실키밤부 슬리핑백"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
    </div>

    <!-- Bottom 55%: Review Card Area -->
    <div style="width:100%;height:55%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 80px;gap:36px;">

      <!-- Review Card -->
      <div class="ma-review-card" style="width:100%;padding:44px 48px;text-align:center;">
        <div style="font-family:var(--font-display);font-size:80px;font-weight:300;font-style:italic;color:var(--accent);line-height:0.6;margin-bottom:24px;">&ldquo;</div>
        <div class="ma-quote" style="font-size:36px;line-height:1.6;margin-bottom:28px;">아이가 이 슬리핑백을 입으면 신기하게 잘 자요.<br>밤새 뒤척이지 않고 아침까지 푹 자더라고요.</div>
        <div style="font-size:36px;color:var(--accent);letter-spacing:4px;margin-bottom:16px;">★★★★★</div>
        <div style="font-size:24px;color:var(--body);font-weight:400;">김○○ 맘 · 14개월 아기</div>
      </div>

      <!-- Review count stat -->
      <div style="font-size:28px;color:var(--body);font-weight:400;">
        <span style="font-family:var(--font-en);font-weight:700;color:var(--accent);">3,847</span>개의 실 구매 후기
      </div>

      <!-- Brand Logo -->
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>

    </div>

  </div>
</div>

</body>
</html>
