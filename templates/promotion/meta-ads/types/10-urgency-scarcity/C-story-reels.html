<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 긴급성/희소성 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 긴급성/희소성 (Urgency-Scarcity)
  VARIATION: C — Story Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 스토리/릴스용 긴급성 강조
  IMAGE SPEC: 없음 (다크 배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels" style="background:#2C2C3A;">
  <!-- Content in top 65% safezone -->
  <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:0 80px;">

    <!-- Spacer top -->
    <div style="height:140px;flex-shrink:0;"></div>

    <!-- LAST CHANCE Label -->
    <span class="ma-label" style="font-size:24px;letter-spacing:.25em;color:var(--danger);">&#9200; LAST CHANCE</span>

    <!-- Title -->
    <div class="ma-title" style="font-size:56px;color:#fff;text-align:center;margin-top:40px;line-height:1.4;">지금 아니면<br>놓칩니다</div>

    <!-- Countdown -->
    <div class="ma-countdown" style="margin-top:48px;">
      <div class="ma-countdown-unit">
        <div class="ma-countdown-number">02</div>
        <div class="ma-countdown-label">일</div>
      </div>
      <div class="ma-countdown-unit">
        <div class="ma-countdown-number">08</div>
        <div class="ma-countdown-label">시간</div>
      </div>
      <div class="ma-countdown-unit">
        <div class="ma-countdown-number">45</div>
        <div class="ma-countdown-label">분</div>
      </div>
      <div class="ma-countdown-unit">
        <div class="ma-countdown-number">30</div>
        <div class="ma-countdown-label">초</div>
      </div>
    </div>

    <!-- Product + Price -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:48px;">
      <div class="ma-title" style="font-size:40px;color:#fff;">실키밤부 슬리핑백</div>
      <div style="display:flex;align-items:baseline;gap:16px;margin-top:4px;">
        <span class="ma-price-orig" style="font-size:28px;color:rgba(255,255,255,.4);">62,000원</span>
        <span class="ma-price" style="font-size:52px;color:#fff;">29,900원</span>
      </div>
    </div>

    <!-- Remaining Quantity -->
    <div style="font-family:var(--font-body);font-size:30px;font-weight:500;color:var(--danger);margin-top:32px;">남은 수량 127개</div>

    <!-- CTA -->
    <span class="ma-cta-button" style="font-size:32px;padding:28px 80px;background:var(--accent);color:#2C2C3A;font-weight:700;margin-top:40px;">지금 구매하기</span>

    <!-- Brand Logo -->
    <div class="ma-brand-bar" style="justify-content:center;margin-top:40px;">
      <span class="ma-brand-logo" style="font-size:32px;color:rgba(255,255,255,.5);">Sunday Hug</span>
    </div>

    <!-- Remaining space is safezone bottom (35%) -->

  </div>
</div>

</body>
</html>
