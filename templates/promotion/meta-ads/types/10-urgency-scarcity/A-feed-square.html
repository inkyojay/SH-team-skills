<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 긴급성/희소성 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 긴급성/희소성 (Urgency-Scarcity)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 카운트다운 + 잔여 수량으로 긴급성 자극
  IMAGE SPEC: 없음 (다크 배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square" style="background:#2C2C3A;">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:72px 80px;">

    <!-- Top: Badge + Label -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <span class="ma-badge" style="font-size:22px;padding:14px 36px;background:var(--danger);color:#fff;">마감 임박</span>
      <span class="ma-label" style="font-size:20px;letter-spacing:.25em;color:rgba(255,255,255,.6);">LIMITED TIME</span>
    </div>

    <!-- Center: Countdown -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:32px;">
      <div class="ma-countdown">
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">02</div>
          <div class="ma-countdown-label">일</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">08</div>
          <div class="ma-countdown-label">시간</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">45</div>
          <div class="ma-countdown-label">분</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">30</div>
          <div class="ma-countdown-label">초</div>
        </div>
      </div>

      <!-- Product + Price -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div class="ma-title" style="font-size:40px;color:#fff;">실키밤부 슬리핑백</div>
        <span class="ma-price" style="font-size:56px;color:#fff;">29,900원</span>
      </div>

      <!-- Remaining Quantity -->
      <div style="font-family:var(--font-body);font-size:28px;font-weight:500;color:var(--danger);">남은 수량 127개</div>
    </div>

    <!-- CTA + Brand -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="ma-cta-button" style="font-size:30px;padding:26px 72px;background:var(--accent);color:#2C2C3A;font-weight:700;">지금 구매하기</span>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:rgba(255,255,255,.5);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
