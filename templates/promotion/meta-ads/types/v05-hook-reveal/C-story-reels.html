<!--=============================================================
  TYPE: 스크롤 멈춤 훅 (Hook-Reveal — V05)

  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: B급 바이럴 — 풀스크린 훅 텍스트 → 하단 리빌

<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- HOOK: 65% -->
    <div style="height:65%;background:linear-gradient(180deg, #FF3366 0%, #FF6B6B 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 80px;text-align:center;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:110px;font-weight:900;color:#FFF;line-height:1.35;text-shadow:0 6px 30px rgba(0,0,0,.2);">
        수면교육<br>
        포기한<br>
        엄마들<br>
        <span style="font-size:80px;font-weight:400;">보세요</span>
      </div>
    </div>

    <!-- Divider -->
    <div style="height:6px;background:#FFF;"></div>

    <!-- REVEAL: 35% -->
    <div style="flex:1;background:#FFF;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 80px;text-align:center;gap:24px;">

      <div style="display:flex;align-items:center;gap:24px;margin-bottom:8px;">
        <div style="width:120px;height:120px;border-radius:24px;background:#F8F4F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:60px;">👶</span>
        </div>
        <div style="text-align:left;">
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:40px;font-weight:700;color:#1a1a1a;">스와들 스트랩</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#888;">수면교육 없이 7시간 연속 수면</div>
        </div>
      </div>

      <div style="font-family:'Noto Sans KR',sans-serif;font-size:30px;color:#666;line-height:1.6;">
        실키밤부 소재 · 등센서 방지 · 사계절 OK
      </div>

      <a class="ma-cta-button" style="font-size:30px;padding:26px 72px;margin-top:8px;">지금 확인하기</a>

      <div class="ma-brand-bar" style="justify-content:center;margin-top:4px;">
        <span class="ma-brand-logo" style="font-size:22px;color:#ccc;">Sunday Hug</span>
      </div>
    </div>

  </div>
