<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비포/애프터 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비포/애프터 (Before-After)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 상하 분할 비포/애프터 + 제품 이미지
  IMAGE SPEC: 제품 이미지 300×300 (하단 패널)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Before (45%) -->
    <div style="width:100%;height:45%;position:relative;overflow:hidden;">
      <!-- Background image with grayscale filter -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:url('../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg') center/cover no-repeat;filter:grayscale(100%) brightness(0.7);"></div>
      <!-- Overlay -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(80,75,75,.55);z-index:1;"></div>
      <!-- Content -->
      <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:60px 80px;text-align:center;">
        <span class="ma-label" style="font-size:28px;letter-spacing:.25em;color:rgba(255,255,255,.6);margin-bottom:24px;">BEFORE</span>
        <div style="font-size:72px;margin-bottom:28px;">&#x1F61F;</div>
        <div class="ma-title" style="font-size:48px;color:#fff;line-height:1.35;margin-bottom:16px;">밤마다 반복되는 이불 전쟁</div>
        <div class="ma-subtitle" style="font-size:30px;color:rgba(255,255,255,.6);line-height:1.6;">걷어차고, 뒤척이고, 새벽에 깨고...</div>
      </div>
    </div>

    <!-- BOTTOM: After (55%) -->
    <div style="width:100%;height:55%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 80px;text-align:center;">
      <span class="ma-label" style="font-size:28px;letter-spacing:.25em;margin-bottom:24px;">AFTER</span>
      <div style="font-size:72px;margin-bottom:20px;">&#x1F60A;</div>
      <div class="ma-title" style="font-size:48px;line-height:1.35;margin-bottom:16px;">아침까지 푹, 편안한 숙면</div>
      <div class="ma-subtitle" style="font-size:28px;line-height:1.6;margin-bottom:36px;">실키밤부 슬리핑백 하나로 해결</div>

      <!-- Product Image -->
      <div style="width:300px;height:300px;border-radius:24px;overflow:hidden;margin-bottom:32px;box-shadow:0 8px 32px rgba(0,0,0,.1);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>

      <!-- Product Info -->
      <div style="font-family:var(--font-body);font-size:32px;font-weight:500;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
      <div class="ma-product-info" style="justify-content:center;margin-bottom:28px;">
        <span class="ma-price" style="font-size:44px;">49,900&#xFFE6;</span>
      </div>

      <div class="ma-cta-button" style="font-size:26px;padding:20px 56px;">지금 구매하기</div>

      <!-- Brand Logo -->
      <div class="ma-brand-bar" style="justify-content:center;margin-top:24px;">
        <span class="ma-brand-logo" style="font-size:24px;color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
