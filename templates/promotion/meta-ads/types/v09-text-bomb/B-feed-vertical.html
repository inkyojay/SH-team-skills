<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;background:#FF6B6B;display:flex;align-items:center;justify-content:center;padding:80px;position:relative;">

    <!-- One witty line -->
    <div style="font-family:'Noto Sans KR',sans-serif;font-size:96px;font-weight:900;color:#FFF;line-height:1.4;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.1);">

    <!-- Tiny brand in corner -->
    <div style="position:absolute;bottom:36px;right:44px;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:400;color:rgba(255,255,255,.3);">sundayhug.kr</span>
    </div>

    <!-- Small product label -->
    <div style="position:absolute;bottom:36px;left:44px;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:400;color:rgba(255,255,255,.3);">스와들 스트랩</span>
