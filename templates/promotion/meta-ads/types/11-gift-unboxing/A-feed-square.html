<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 선물/언박싱 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 선물/언박싱 (Gift/Unboxing)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 출산 선물/기프트 소구, 언박싱 감성
  IMAGE SPEC: 기프트 박스/포장 이미지 1080×600 (상단 영역)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP 55%: Gift visual -->
    <div style="width:100%;height:55%;position:relative;overflow:hidden;background:var(--palette-gradient);">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="썬데이허그 기프트 패키지"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.8;">
      <!-- Overlay -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 30%, rgba(250,247,244,.9) 100%);z-index:1;"></div>
      <!-- Badge -->
      <div style="position:absolute;top:48px;left:48px;z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:12px 28px;">GIFT SET</span>
      </div>
      <!-- Bottom text overlay -->
      <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;z-index:2;">
        <div style="font-family:var(--font-display);font-size:40px;font-weight:300;font-style:italic;color:var(--dark);">The perfect gift</div>
      </div>
    </div>

    <!-- BOTTOM 45%: Gift info -->
    <div style="width:100%;height:45%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 60px;text-align:center;">
      <div class="ma-title" style="font-size:44px;margin-bottom:16px;">출산 선물, 고민 끝</div>
      <div class="ma-subtitle" style="font-size:28px;margin-bottom:32px;line-height:1.6;">
        받는 분이 진짜 좋아하는 선물<br>프리미엄 기프트 패키지
      </div>
      <!-- Gift features -->
      <div style="display:flex;gap:40px;margin-bottom:32px;">
        <div style="text-align:center;">
          <div style="font-size:32px;margin-bottom:8px;">🎁</div>
          <div style="font-size:22px;color:var(--body);">고급 포장</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:32px;margin-bottom:8px;">💌</div>
          <div style="font-size:22px;color:var(--body);">메시지 카드</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:32px;margin-bottom:8px;">🚚</div>
          <div style="font-size:22px;color:var(--body);">직접 배송</div>
        </div>
      </div>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
