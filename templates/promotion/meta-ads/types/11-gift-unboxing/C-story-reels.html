<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 선물/언박싱 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 선물/언박싱 (Gift/Unboxing)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 언박싱 스타일 세로 구성
  IMAGE SPEC: 기프트 패키지 이미지 (상단 히어로)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- TOP: Hero gift image (~35%) -->
    <div style="height:672px;position:relative;overflow:hidden;flex-shrink:0;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="기프트 패키지"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 40%, rgba(250,247,244,1) 100%);z-index:1;"></div>
      <div style="position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:22px;padding:14px 36px;">GIFT SET</span>
      </div>
    </div>

    <!-- BOTTOM: Gift info (keeps text above 65% height) -->
    <div style="flex:1;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:20px 80px 0;text-align:center;">

      <div style="font-family:var(--font-display);font-size:36px;font-weight:300;font-style:italic;color:var(--accent-dark);margin-bottom:12px;">A gift from the heart</div>
      <div class="ma-title" style="font-size:48px;margin-bottom:16px;">출산 선물 세트</div>
      <div class="ma-subtitle" style="font-size:28px;margin-bottom:40px;line-height:1.6;">
        센스 있는 당신을 위한<br>프리미엄 기프트 패키지
      </div>

      <!-- Set items list -->
      <div style="display:flex;flex-direction:column;gap:20px;width:100%;max-width:700px;margin-bottom:36px;">
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.6);border-radius:16px;">
          <span style="font-size:28px;">🎀</span>
          <span style="font-size:28px;color:var(--dark);font-weight:400;">실키밤부 슬리핑백</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.6);border-radius:16px;">
          <span style="font-size:28px;">🎀</span>
          <span style="font-size:28px;color:var(--dark);font-weight:400;">오가닉 스와들 2장</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;padding:20px 32px;background:rgba(255,255,255,.6);border-radius:16px;">
          <span style="font-size:28px;">🎀</span>
          <span style="font-size:28px;color:var(--dark);font-weight:400;">프리미엄 턱받이</span>
        </div>
      </div>

      <a class="ma-cta-button" style="font-size:30px;padding:26px 72px;">선물하기</a>
    </div>

    <!-- Safezone: bottom 35% (672px) left clear -->

  </div>
</div>

</body>
</html>
