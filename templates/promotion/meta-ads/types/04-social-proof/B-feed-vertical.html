<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사회적 증거 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사회적 증거 (Social Proof)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 누적 판매 + 인증 마크로 신뢰 구축
  IMAGE SPEC: 라이프스타일 이미지 1080×540 (상단 40%)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- Top 40%: Product Image with Badge -->
    <div style="width:100%;height:40%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="실키밤부 슬리핑백"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <!-- Badge overlay -->
      <div style="position:absolute;top:40px;left:40px;z-index:2;">
        <span class="ma-badge">BEST SELLER</span>
      </div>
    </div>

    <!-- Bottom 60%: Stats + Trust -->
    <div style="width:100%;height:60%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 80px;gap:40px;">

      <!-- Big Center Stat -->
      <div style="text-align:center;">
        <div class="ma-stat-number" style="font-size:88px;line-height:1;">50,000+</div>
        <div style="font-size:28px;color:var(--body);margin-top:12px;">누적 판매</div>
        <div class="ma-subtitle" style="font-size:32px;margin-top:8px;color:var(--dark);font-weight:500;">대한민국 엄마들의 선택</div>
      </div>

      <!-- 3 Trust Items -->
      <div style="display:flex;gap:40px;align-items:center;justify-content:center;">
        <!-- KC 인증 -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;">
            <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:var(--accent);">KC</span>
          </div>
          <span style="font-size:22px;color:var(--body);">KC 인증</span>
        </div>
        <!-- OEKO-TEX -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;">
            <span style="font-family:var(--font-en);font-size:16px;font-weight:700;color:var(--accent);text-align:center;line-height:1.1;">OEKO<br>TEX</span>
          </div>
          <span style="font-size:22px;color:var(--body);">OEKO-TEX</span>
        </div>
        <!-- ISO 9001 -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;">
            <span style="font-family:var(--font-en);font-size:16px;font-weight:700;color:var(--accent);text-align:center;line-height:1.1;">ISO<br>9001</span>
          </div>
          <span style="font-size:22px;color:var(--body);">ISO 9001</span>
        </div>
      </div>

      <!-- Price + CTA + Brand -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
        <div style="display:flex;align-items:baseline;gap:16px;">
          <span class="ma-discount" style="font-size:44px;">52%</span>
          <span class="ma-price" style="font-size:44px;">29,900원</span>
        </div>
        <div class="ma-cta-button">지금 구매하기</div>
        <div class="ma-brand-bar" style="justify-content:center;margin-top:4px;">
          <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
