<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 세트/구성 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 세트/구성 (Bundle/Set)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 세트 구성품 한눈에 보기 + 가격 절감 강조
  IMAGE SPEC: 구성품별 썸네일 이미지 3~4개
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-center" style="height:100%;padding:64px 64px;justify-content:space-between;background:var(--palette-gradient);">

    <!-- Top: Badge + Title -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <span class="ma-badge" style="font-size:20px;padding:10px 28px;">BEST SET</span>
      <div class="ma-title" style="font-size:44px;">인기 세트 구성</div>
      <div class="ma-subtitle" style="font-size:26px;">따로 사면 손해! 세트로 더 알뜰하게</div>
    </div>

    <!-- Center: 2x2 Product Grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:800px;">
      <!-- Item 1 -->
      <div class="ma-feature-card" style="padding:24px;display:flex;flex-direction:column;align-items:center;">
        <div style="width:160px;height:160px;border-radius:16px;overflow:hidden;margin-bottom:16px;">
          <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
               alt="슬리핑백" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div style="font-size:24px;font-weight:500;color:var(--dark);">슬리핑백</div>
        <div style="font-size:20px;color:var(--sub);">62,000원</div>
      </div>
      <!-- Item 2 -->
      <div class="ma-feature-card" style="padding:24px;display:flex;flex-direction:column;align-items:center;">
        <div style="width:160px;height:160px;border-radius:16px;overflow:hidden;margin-bottom:16px;">
          <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
               alt="스와들" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div style="font-size:24px;font-weight:500;color:var(--dark);">스와들</div>
        <div style="font-size:20px;color:var(--sub);">35,000원</div>
      </div>
      <!-- Item 3 -->
      <div class="ma-feature-card" style="padding:24px;display:flex;flex-direction:column;align-items:center;">
        <div style="width:160px;height:160px;border-radius:16px;overflow:hidden;margin-bottom:16px;">
          <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
               alt="턱받이" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div style="font-size:24px;font-weight:500;color:var(--dark);">턱받이</div>
        <div style="font-size:20px;color:var(--sub);">18,000원</div>
      </div>
      <!-- Item 4: Set Price -->
      <div style="background:var(--accent);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div style="font-family:var(--font-en);font-size:20px;color:rgba(255,255,255,.7);letter-spacing:.15em;margin-bottom:8px;">SET PRICE</div>
        <span class="ma-price-orig" style="font-size:24px;color:rgba(255,255,255,.6);">115,000원</span>
        <span style="font-family:var(--font-en);font-size:52px;font-weight:700;color:#fff;line-height:1.2;">79,900원</span>
        <div style="font-family:var(--font-en);font-size:28px;font-weight:700;color:#fff;margin-top:4px;">30% OFF</div>
      </div>
    </div>

    <!-- Bottom: Brand -->
    <div class="ma-brand-bar" style="justify-content:center;">
      <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
