<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비교 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비교 (Comparison)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 제품 이미지 + 좌우 비교 카드
  IMAGE SPEC: 제품 라이프스타일 이미지 1080×540 (상단)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Product Image (40%) -->
    <div style="width:100%;height:40%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
           alt="실키밤부 슬리핑백"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <!-- Gradient overlay bottom -->
      <div style="position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,var(--bg-warm) 0%,transparent 100%);z-index:1;"></div>
    </div>

    <!-- BOTTOM: Comparison (60%) -->
    <div style="width:100%;height:60%;background:var(--bg-warm);display:flex;flex-direction:column;padding:40px 60px;">

      <!-- Title -->
      <div style="text-align:center;margin-bottom:36px;">
        <div class="ma-title" style="font-size:48px;line-height:1.35;">차이가 느껴지시나요?</div>
      </div>

      <!-- Side-by-side Comparison -->
      <div style="display:flex;gap:28px;flex:1;">

        <!-- Left: 일반 슬리핑백 (muted) -->
        <div style="flex:1;background:#EDEAE7;border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;">
          <div style="font-size:28px;font-weight:500;color:var(--sub);margin-bottom:28px;">일반 슬리핑백</div>
          <div style="display:flex;flex-direction:column;gap:24px;width:100%;">
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-cross" style="font-size:30px;flex-shrink:0;">&#x2717;</span>
              <span style="font-size:26px;color:var(--sub);">폴리에스터 원단</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-cross" style="font-size:30px;flex-shrink:0;">&#x2717;</span>
              <span style="font-size:26px;color:var(--sub);">단일 시즌 사용</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-cross" style="font-size:30px;flex-shrink:0;">&#x2717;</span>
              <span style="font-size:26px;color:var(--sub);">항균 기능 없음</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-cross" style="font-size:30px;flex-shrink:0;">&#x2717;</span>
              <span style="font-size:26px;color:var(--sub);">일반 촉감</span>
            </div>
          </div>
        </div>

        <!-- Right: 실키밤부 (accent border) -->
        <div style="flex:1;background:#fff;border:3px solid var(--accent);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;">
          <div style="font-size:28px;font-weight:700;color:var(--accent);margin-bottom:28px;">실키밤부</div>
          <div style="display:flex;flex-direction:column;gap:24px;width:100%;">
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-check" style="font-size:30px;flex-shrink:0;">&#x2713;</span>
              <span style="font-size:26px;color:var(--dark);font-weight:500;">프리미엄 밤부 원단</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-check" style="font-size:30px;flex-shrink:0;">&#x2713;</span>
              <span style="font-size:26px;color:var(--dark);font-weight:500;">사계절 온도 적응</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-check" style="font-size:30px;flex-shrink:0;">&#x2713;</span>
              <span style="font-size:26px;color:var(--dark);font-weight:500;">자연 항균 효과</span>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
              <span class="ma-check" style="font-size:30px;flex-shrink:0;">&#x2713;</span>
              <span style="font-size:26px;color:var(--dark);font-weight:500;">실크처럼 부드러운 촉감</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Price + CTA + Brand -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:36px;">
        <div style="display:flex;align-items:center;gap:24px;">
          <span class="ma-price" style="font-size:44px;">49,900&#xFFE6;</span>
          <div class="ma-cta-button" style="font-size:24px;padding:18px 48px;">구매하기</div>
        </div>
        <div class="ma-brand-bar">
          <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
