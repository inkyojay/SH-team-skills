<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비교 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비교 (Comparison)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 세로형 비교 카드 리스트 + CTA
  IMAGE SPEC: 없음 (텍스트 기반 비교 카드)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:var(--bg-warm);display:flex;flex-direction:column;">

    <!-- Content area (top 65% = safezone) -->
    <div style="width:100%;height:65%;display:flex;flex-direction:column;padding:80px 60px 40px;">

      <!-- Title -->
      <div style="text-align:center;margin-bottom:48px;">
        <span class="ma-label" style="font-size:24px;margin-bottom:16px;display:block;">COMPARISON</span>
        <div class="ma-title" style="font-size:52px;line-height:1.35;">비교하면 답이 보입니다</div>
      </div>

      <!-- Comparison Cards -->
      <div style="display:flex;flex-direction:column;gap:20px;flex:1;">

        <!-- Card 1: 원단 -->
        <div style="display:flex;align-items:center;background:#fff;border-radius:16px;padding:28px 36px;box-shadow:0 2px 12px rgba(0,0,0,.04);">
          <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">원단</div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;">
            <span class="ma-cross" style="font-size:28px;">&#x2717;</span>
            <span style="font-size:24px;color:var(--sub);">폴리에스터</span>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;background:var(--accent);border-radius:12px;padding:14px 16px;">
            <span style="font-size:28px;color:#fff;font-weight:700;">&#x2713;</span>
            <span style="font-size:24px;color:#fff;font-weight:600;">프리미엄 밤부</span>
          </div>
        </div>

        <!-- Card 2: 온도조절 -->
        <div style="display:flex;align-items:center;background:#fff;border-radius:16px;padding:28px 36px;box-shadow:0 2px 12px rgba(0,0,0,.04);">
          <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">온도조절</div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;">
            <span class="ma-cross" style="font-size:28px;">&#x2717;</span>
            <span style="font-size:24px;color:var(--sub);">단일 시즌</span>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;background:var(--accent);border-radius:12px;padding:14px 16px;">
            <span style="font-size:28px;color:#fff;font-weight:700;">&#x2713;</span>
            <span style="font-size:24px;color:#fff;font-weight:600;">사계절 적응</span>
          </div>
        </div>

        <!-- Card 3: 항균 -->
        <div style="display:flex;align-items:center;background:#fff;border-radius:16px;padding:28px 36px;box-shadow:0 2px 12px rgba(0,0,0,.04);">
          <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">항균</div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;">
            <span class="ma-cross" style="font-size:28px;">&#x2717;</span>
            <span style="font-size:24px;color:var(--sub);">없음</span>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;background:var(--accent);border-radius:12px;padding:14px 16px;">
            <span style="font-size:28px;color:#fff;font-weight:700;">&#x2713;</span>
            <span style="font-size:24px;color:#fff;font-weight:600;">자연 항균</span>
          </div>
        </div>

        <!-- Card 4: 촉감 -->
        <div style="display:flex;align-items:center;background:#fff;border-radius:16px;padding:28px 36px;box-shadow:0 2px 12px rgba(0,0,0,.04);">
          <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">촉감</div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;">
            <span class="ma-cross" style="font-size:28px;">&#x2717;</span>
            <span style="font-size:24px;color:var(--sub);">일반</span>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:12px;justify-content:center;background:var(--accent);border-radius:12px;padding:14px 16px;">
            <span style="font-size:28px;color:#fff;font-weight:700;">&#x2713;</span>
            <span style="font-size:24px;color:#fff;font-weight:600;">실크터치</span>
          </div>
        </div>

      </div>

      <!-- Product Info + CTA -->
      <div style="text-align:center;margin-top:40px;">
        <div style="font-family:var(--font-body);font-size:34px;font-weight:500;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
        <div class="ma-product-info" style="justify-content:center;margin-bottom:28px;">
          <span class="ma-price" style="font-size:48px;">49,900&#xFFE6;</span>
        </div>
        <div class="ma-cta-button" style="font-size:28px;padding:22px 60px;">지금 구매하기</div>
      </div>

    </div>

    <!-- Safezone bottom (35%) -->
    <div style="width:100%;height:35%;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;">
      <div class="ma-brand-bar">
        <span class="ma-brand-logo" style="font-size:28px;color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
