<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비교 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비교 (Comparison)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 비교 테이블로 제품 우위 시각화
  IMAGE SPEC: 없음 (텍스트 기반 비교 테이블)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:var(--bg-warm);display:flex;flex-direction:column;padding:80px 60px;">

    <!-- Title -->
    <div style="text-align:center;margin-bottom:48px;">
      <div class="ma-title" style="font-size:52px;line-height:1.35;">왜 실키밤부 슬리핑백인가요?</div>
    </div>

    <!-- Comparison Table -->
    <div style="flex:1;display:flex;flex-direction:column;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06);">

      <!-- Header Row -->
      <div class="ma-comparison-row" style="padding:28px 32px;background:#FAFAFA;border-bottom:2px solid var(--palette-card-border);">
        <div style="flex:1.2;font-size:28px;font-weight:500;color:var(--sub);"></div>
        <div style="flex:1;text-align:center;font-size:28px;font-weight:500;color:var(--sub);">일반</div>
        <div style="flex:1;text-align:center;font-size:28px;font-weight:700;color:#fff;background:var(--accent);border-radius:12px;padding:12px 16px;">실키밤부</div>
      </div>

      <!-- Row 1: 원단 -->
      <div class="ma-comparison-row" style="flex:1;padding:28px 32px;">
        <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">원단</div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-cross" style="font-size:36px;">&#x2717;</span>
          <span style="font-size:26px;color:var(--sub);">폴리에스터</span>
        </div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-check" style="font-size:36px;">&#x2713;</span>
          <span style="font-size:26px;color:var(--dark);font-weight:500;">프리미엄 밤부</span>
        </div>
      </div>

      <!-- Row 2: 온도조절 -->
      <div class="ma-comparison-row" style="flex:1;padding:28px 32px;">
        <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">온도조절</div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-cross" style="font-size:36px;">&#x2717;</span>
          <span style="font-size:26px;color:var(--sub);">단일 시즌</span>
        </div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-check" style="font-size:36px;">&#x2713;</span>
          <span style="font-size:26px;color:var(--dark);font-weight:500;">사계절 적응</span>
        </div>
      </div>

      <!-- Row 3: 항균 -->
      <div class="ma-comparison-row" style="flex:1;padding:28px 32px;">
        <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">항균</div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-cross" style="font-size:36px;">&#x2717;</span>
          <span style="font-size:26px;color:var(--sub);">없음</span>
        </div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-check" style="font-size:36px;">&#x2713;</span>
          <span style="font-size:26px;color:var(--dark);font-weight:500;">자연 항균</span>
        </div>
      </div>

      <!-- Row 4: 촉감 -->
      <div class="ma-comparison-row" style="flex:1;padding:28px 32px;">
        <div style="flex:1.2;font-size:30px;font-weight:500;color:var(--dark);">촉감</div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-cross" style="font-size:36px;">&#x2717;</span>
          <span style="font-size:26px;color:var(--sub);">일반</span>
        </div>
        <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <span class="ma-check" style="font-size:36px;">&#x2713;</span>
          <span style="font-size:26px;color:var(--dark);font-weight:500;">실크터치</span>
        </div>
      </div>

    </div>

    <!-- Bottom: Price + Brand -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:40px;">
      <div class="ma-product-info">
        <span class="ma-price" style="font-size:48px;">49,900&#xFFE6;</span>
      </div>
      <div class="ma-brand-bar">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
