<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 티어리스트 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 티어리스트 (Tier List — V06)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — 세로형 티어리스트, 더 많은 아이템
  IMAGE SPEC: 없음 (UI 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;padding:52px;">

    <!-- Title -->
    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:56px;font-weight:900;color:#FFF;">🏆 육아템 티어리스트</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.35);margin-top:12px;">현직 엄마 500명 투표 결과</div>
    </div>

    <!-- Tier Grid -->
    <div style="flex:1;display:flex;flex-direction:column;gap:10px;">

      <!-- S Tier -->
      <div style="display:flex;flex:1;border-radius:14px;overflow:hidden;">
        <div style="width:110px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:56px;font-weight:700;color:#FFF;text-shadow:2px 2px 6px rgba(0,0,0,.3);">S</span>
          <span style="font-family:'DM Sans',sans-serif;font-size:16px;color:rgba(255,255,255,.7);">GOD</span>
        </div>
        <div style="flex:1;background:rgba(255,215,0,.12);display:flex;align-items:center;padding:16px 32px;gap:16px;flex-wrap:wrap;">
          <div style="background:rgba(255,215,0,.2);border:2px solid #FFD700;border-radius:14px;padding:14px 28px;box-shadow:0 0 24px rgba(255,215,0,.3);">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:#FFD700;">✨ 스와들 스트랩</span>
          </div>
          <div style="background:rgba(255,215,0,.15);border:2px solid rgba(255,215,0,.5);border-radius:14px;padding:14px 28px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:#FFD700;">실키밤부 슬리핑백</span>
          </div>
        </div>
      </div>

      <!-- A Tier -->
      <div style="display:flex;flex:0.8;border-radius:14px;overflow:hidden;">
        <div style="width:110px;background:#4ECDC4;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#FFF;">A</span>
        </div>
        <div style="flex:1;background:rgba(78,205,196,.08);display:flex;align-items:center;padding:16px 32px;gap:16px;flex-wrap:wrap;">
          <div style="background:rgba(78,205,196,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#4ECDC4;">아기 침대</span>
          </div>
          <div style="background:rgba(78,205,196,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#4ECDC4;">바운서</span>
          </div>
          <div style="background:rgba(78,205,196,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#4ECDC4;">아기띠</span>
          </div>
        </div>
      </div>

      <!-- B Tier -->
      <div style="display:flex;flex:0.7;border-radius:14px;overflow:hidden;">
        <div style="width:110px;background:#5B8DEF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#FFF;">B</span>
        </div>
        <div style="flex:1;background:rgba(91,141,239,.08);display:flex;align-items:center;padding:16px 32px;gap:16px;flex-wrap:wrap;">
          <div style="background:rgba(91,141,239,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#5B8DEF;">백색소음기</span>
          </div>
          <div style="background:rgba(91,141,239,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#5B8DEF;">수유쿠션</span>
          </div>
        </div>
      </div>

      <!-- C Tier -->
      <div style="display:flex;flex:0.6;border-radius:14px;overflow:hidden;">
        <div style="width:110px;background:#FF9F43;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#FFF;">C</span>
        </div>
        <div style="flex:1;background:rgba(255,159,67,.08);display:flex;align-items:center;padding:16px 32px;gap:16px;">
          <div style="background:rgba(255,159,67,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#FF9F43;">범퍼침대</span>
          </div>
          <div style="background:rgba(255,159,67,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#FF9F43;">모빌</span>
          </div>
        </div>
      </div>

      <!-- F Tier -->
      <div style="display:flex;flex:0.6;border-radius:14px;overflow:hidden;">
        <div style="width:110px;background:#FF6B6B;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#FFF;">F</span>
        </div>
        <div style="flex:1;background:rgba(255,107,107,.08);display:flex;align-items:center;padding:16px 32px;gap:16px;">
          <div style="background:rgba(255,107,107,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#FF6B6B;text-decoration:line-through;">일반 이불</span>
          </div>
          <div style="background:rgba(255,107,107,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:#FF6B6B;text-decoration:line-through;">수면조끼</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Brand -->
    <div style="text-align:center;margin-top:28px;">
      <span class="ma-brand-logo" style="font-size:20px;color:rgba(255,255,255,.2);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
