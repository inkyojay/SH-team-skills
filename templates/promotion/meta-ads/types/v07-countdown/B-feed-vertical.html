<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 카운트다운 리스트 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 카운트다운 리스트 (Countdown List — V07)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — 세로형 카운트다운, 카드 레이아웃
  IMAGE SPEC: 없음 (텍스트 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;background:#111;display:flex;flex-direction:column;">

    <!-- Title -->
    <div style="padding:56px 60px 40px;text-align:center;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:48px;font-weight:900;color:#FFF;line-height:1.3;">스와들 스트랩을<br>써야 하는</div>
      <div style="font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:64px;font-weight:900;color:#FF6B6B;margin-top:8px;">3가지 이유</div>
    </div>

    <!-- Countdown Cards -->
    <div style="flex:1;display:flex;flex-direction:column;padding:0 60px;gap:20px;">

      <!-- #3 -->
      <div style="flex:1;background:#1a1a1a;border-radius:24px;padding:32px 40px;display:flex;align-items:center;gap:32px;border-left:6px solid #5B8DEF;">
        <div style="font-family:'DM Sans',sans-serif;font-size:88px;font-weight:900;color:#5B8DEF;flex-shrink:0;width:100px;text-align:center;">3</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:700;color:#FFF;">실키밤부 소재</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.45);margin-top:8px;">여름에도 시원하고 겨울에도 따뜻한 사계절 소재</div>
        </div>
      </div>

      <!-- #2 -->
      <div style="flex:1;background:#1a1a1a;border-radius:24px;padding:32px 40px;display:flex;align-items:center;gap:32px;border-left:6px solid #FF9F43;">
        <div style="font-family:'DM Sans',sans-serif;font-size:88px;font-weight:900;color:#FF9F43;flex-shrink:0;width:100px;text-align:center;">2</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:700;color:#FFF;">등센서 완벽 차단</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.45);margin-top:8px;">안아서 재우고 내려놓아도 안 깨요</div>
        </div>
      </div>

      <!-- #1 — highlighted -->
      <div style="flex:1.3;background:linear-gradient(135deg,#FF3366,#FF6B6B);border-radius:24px;padding:36px 40px;display:flex;align-items:center;gap:32px;box-shadow:0 8px 40px rgba(255,51,102,.3);">
        <div style="font-family:'DM Sans',sans-serif;font-size:110px;font-weight:900;color:#FFF;flex-shrink:0;width:100px;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.2);">1</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:40px;font-weight:900;color:#FFF;">7시간 연속 수면</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:rgba(255,255,255,.7);margin-top:8px;">수면교육 없이도 통잠 성공!</div>
        </div>
      </div>

    </div>

    <!-- CTA + Brand -->
    <div style="padding:32px 60px 48px;display:flex;justify-content:space-between;align-items:center;">
      <a class="ma-cta-button" style="font-size:24px;padding:18px 48px;">지금 확인하기</a>
      <span class="ma-brand-logo" style="font-size:22px;color:rgba(255,255,255,.2);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
