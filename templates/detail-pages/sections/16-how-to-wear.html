<!--=============================================================
  SECTION: How to Wear (착용 방법)
  ORDER: 16
  REQUIRED: 🔶 선택 — 착용/사용법 안내가 필요한 제품
  BACKGROUND: white
  PURPOSE: 간단한 스텝 가이드로 제품 사용법을 안내한다.

  DATA REQUIRED:
  - {{howto_overview_image}} : 전체 착용 이미지
  - {{#howto_steps}}         : 스텝 배열 (2~4개)
    각 항목: { step_label, image, desc_html }
  - {{?howto_note}}          : 하단 추가 안내문 (선택)
=============================================================-->
<div class="sec v">
  <div class="sec-label tx-center">How to Wear</div>
  <div class="sec-title tx-center">손쉬운 착용방법</div>
  <div class="fb-img"><img src="{{howto_overview_image}}" alt="착용법"></div>
  <div class="howto-grid v">
    {{#howto_steps}}
    <div class="howto-item">
      <div class="howto-item-img"><img src="{{image}}" alt=""></div>
      <div class="howto-step">{{step_label}}</div>
      <div class="howto-txt">{{desc_html}}</div>
    </div>
    {{/howto_steps}}
  </div>
  {{?howto_note}}
  <p style="text-align:center;margin-top:16px;font-size:11px;color:var(--sub);">{{howto_note}}</p>
  {{/howto_note}}
</div>
