<!--=============================================================
  SECTION: Expert Card (전문가 추천)
  ORDER: 10a (10-product-guide 근처에 배치)
  REQUIRED: 선택
  BACKGROUND: 웜톤 (#A89B8B 등 제품에 맞는 톤)
  PURPOSE: 전문가 프로필과 추천 코멘트로 제품 신뢰도를 높인다.
           하단에 누적 리뷰 수와 만족도 평점 통계를 함께 표시.

  DESIGN NOTES:
  - 전체 중앙 정렬, 웜톤 배경
  - 프로필 사진: 96px 원형, 상단 중앙
  - 이름: 연한 흰색, "OOO 대표가 말하는" 형태
  - 헤딩: 진한 다크 (#2A2A2E), 제품명 강조
  - 인용 박스: 반투명 흰색 배경, 큰 글씨 (20~25px)
  - 포인트 3개: 진한 다크, 중앙 정렬
  - 통계 바: 흰색 카드, 2열 (리뷰 수 / 평점)

  CSS REQUIRED:
  .expert          — 웜톤 배경, 중앙 정렬
  .expert-profile  — flex column, 중앙
  .expert-avatar   — 96px 원형
  .expert-heading  — 22px 볼드
  .expert-callout  — 반투명 카드
  .expert-points   — 텍스트 블록들
  .expert-stats    — 2열 통계 카드

  DATA REQUIRED:
  - {{expert_avatar}}  : 프로필 이미지 URL
  - {{expert_name}}    : "슬립베러베이비 김지현 대표가 말하는"
  - {{expert_heading}} : "'슬리핑백' 이 사랑받는 이유"
  - {{expert_callout}} : 인용 텍스트 (HTML)
  - {{#expert_points}} : 포인트 배열
  - {{review_count}}   : 누적 리뷰 수 (예: "6,426")
  - {{rating}}         : 만족도 평점 (예: "4.9")
=============================================================-->
<div class="expert v">
  <div class="expert-profile">
    <img class="expert-avatar" src="{{expert_avatar}}" alt="{{expert_name}}">
    <div class="expert-name">{{expert_name}}</div>
  </div>

  <div class="expert-heading"><em>{{expert_heading}}</em></div>

  <div class="expert-callout">{{expert_callout_html}}</div>

  <div class="expert-points">
    {{#expert_points}}
    <div class="expert-point">{{text_html}}</div>
    {{/expert_points}}
  </div>

  <div class="expert-stats">
    <div class="expert-stat">
      <div class="expert-stat-label">누적 리뷰 수</div>
      <div class="expert-stat-ico"><span class="ico-chat"></span></div>
      <div class="expert-stat-val">{{review_count}}</div>
    </div>
    <div class="expert-stat">
      <div class="expert-stat-label">만족도 평점</div>
      <div class="expert-stat-ico"><span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span></div>
      <div class="expert-stat-val">{{rating}}<span class="unit">/5</span></div>
    </div>
  </div>
</div>
