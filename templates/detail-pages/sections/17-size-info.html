<!--=============================================================
  SECTION: Size Info (사이즈 정보)
  ORDER: 17
  REQUIRED: ✅ 필수
  BACKGROUND: warm
  PURPOSE: 사이즈 선택을 돕는 모델 착용 사진과 사이즈 표.

  DATA REQUIRED:
  - {{#model_cards}} : 모델 카드 배열
    각 항목: { image, meta, size_label }
  - {{size_table_headers}} : 테이블 헤더 배열
  - {{#size_table_rows}}   : 테이블 데이터 배열
=============================================================-->
<div class="sec warm v">
  <div class="sec-label">Size Info</div>
  <div class="sec-title">우리 아이에게 맞는<br>사이즈 선택하기</div>

  <div class="model-cards v">
    {{#model_cards}}
    <div class="model-card">
      <div class="model-card-img"><img src="{{image}}" alt=""></div>
      <div class="model-card-info">
        <div class="meta">{{meta}}</div>
        <div class="sz">착용: <span class="hl">{{size_label}}</span></div>
      </div>
    </div>
    {{/model_cards}}
  </div>

  <table class="sz-tbl v">
    <thead><tr>
      {{#size_table_headers}}<th>{{.}}</th>{{/size_table_headers}}
    </tr></thead>
    <tbody>
      {{#size_table_rows}}
      <tr>{{#cells}}<td>{{.}}</td>{{/cells}}</tr>
      {{/size_table_rows}}
    </tbody>
  </table>
</div>
