<!--=============================================================
  SECTION: Intro
  ORDER: 03
  REQUIRED: ✅ 필수
  BACKGROUND: white
  PURPOSE: 제품이 왜 필요한지 공감을 이끌어내는 도입부.
           고객의 고민/상황을 언급하고 제품이 해결책임을 암시한다.

  DESIGN NOTES:
  - sec-label (영문 태그), sec-title (한글 제목), sec-desc (설명문)
  - 하단에 풀블리드 이미지 1장
  - 이 섹션 뒤에 thin-line 구분선 배치

  DATA REQUIRED:
  - {{intro_label}}     : 영문 섹션 라벨 (예: "About This Product")
  - {{intro_title_html}}: 제목 (HTML, <br> 가능)
  - {{intro_desc_html}} : 설명문 (HTML)
  - {{intro_image}}     : 풀블리드 이미지 URL (600x400 권장)
  - {{intro_image_alt}} : 이미지 alt 텍스트
=============================================================-->
<div class="sec v">
  <div class="sec-label">{{intro_label}}</div>
  <div class="sec-title">{{intro_title_html}}</div>
  <div class="sec-desc">{{intro_desc_html}}</div>
  <div class="fb-img"><img src="{{intro_image}}" alt="{{intro_image_alt}}"></div>
</div>

<div class="thin-line"></div>
