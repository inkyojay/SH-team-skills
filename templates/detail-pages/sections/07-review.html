<!--=============================================================
  SECTION: Review (사회적 증거)
  ORDER: 07
  REQUIRED: ✅ 필수
  BACKGROUND: warm
  PURPOSE: 실제 구매자 리뷰와 통계 수치로 사회적 증거를 제공한다.
           "나만 사는 게 아니라 다른 엄마들도 만족한다"는 확신.

  DESIGN NOTES:
  - rv-stats: 3칸 통계 바 (평점/리뷰수/재구매율)
  - rv-img-strip: 리뷰 사진 3장 가로 스트립
  - rv: 개별 리뷰 카드 (별점 + 인용 + 메타 + 본문)
  - link-btn: 전체 리뷰 보기 링크 버튼

  DATA REQUIRED:
  - {{review_avg_score}}   : 평균 평점 (예: "4.9")
  - {{review_total_count}} : 누적 리뷰 수 (예: "2,847")
  - {{review_repurchase}}  : 재구매율 (예: "89")
  - {{#review_photos}}     : 리뷰 사진 URL 배열 (3장)
  - {{#reviews}}           : 리뷰 배열 (3개 권장)
    각 리뷰: { quote_html, meta, body }
  - {{review_link_text}}   : 링크 버튼 텍스트
=============================================================-->
<div class="sec warm v">
  <div class="sec-label">Real Review</div>
  <div class="sec-title">{{product_name_short}}을 직접 사용해본<br>엄마들의 이야기</div>

  <div class="rv-stats v">
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_avg_score}} <span class="unit">/ 5.0</span></div>
      <div class="rv-stat-label">평균 평점</div>
    </div>
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_total_count}}</div>
      <div class="rv-stat-label">누적 리뷰</div>
    </div>
    <div class="rv-stat">
      <div class="rv-stat-val">{{review_repurchase}}<span class="unit">%</span></div>
      <div class="rv-stat-label">재구매율</div>
    </div>
  </div>

  <div class="rv-img-strip v">
    {{#review_photos}}
    <img src="{{url}}" alt="리뷰 사진">
    {{/review_photos}}
  </div>

  {{#reviews}}
  <div class="rv">
    <div class="rv-stars">★ ★ ★ ★ ★</div>
    <div class="rv-quote">{{quote_html}}</div>
    <div class="rv-meta">{{meta}}</div>
    <div class="rv-body">{{body}}</div>
  </div>
  {{/reviews}}

  <a href="{{review_url}}" class="link-btn">{{review_link_text}} &rarr;</a>
</div>
