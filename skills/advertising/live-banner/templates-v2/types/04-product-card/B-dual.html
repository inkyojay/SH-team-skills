<!--=============================================================
  TYPE: 상품 카드 (Product Card)
  VARIATION: B — Dual
  DIMENSIONS: 720 × 720px (1:1)
  PURPOSE: 2개 상품 비교 카드 — 좌우 분할
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상품 카드 - B Dual</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="product">
  <!-- Header -->
  <div style="position:absolute;top:0;left:0;width:100%;padding:28px 36px;background:var(--bg-warm);border-bottom:1px solid var(--palette-card-border);display:flex;align-items:center;justify-content:space-between;z-index:1;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="nlb-live-badge" style="font-size:13px;padding:6px 14px;">LIVE</span>
      <span class="nlb-label" style="font-size:13px;">LIVE PICK</span>
    </div>
    <span class="nlb-brand-logo" style="color:var(--accent);font-size:18px;">Sunday Hug</span>
  </div>
  <!-- Two products side by side -->
  <div style="display:flex;width:100%;height:100%;padding-top:80px;">
    <!-- Product 1 -->
    <div style="flex:1;display:flex;flex-direction:column;border-right:1px solid var(--palette-card-border);">
      <div style="flex:1;overflow:hidden;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="padding:20px 24px;background:var(--bg);">
        <div class="nlb-product-name" style="font-size:20px;margin-bottom:4px;">실키밤부 슬리핑백</div>
        <div class="nlb-product-desc" style="font-size:14px;margin-bottom:8px;">크림 아이보리</div>
        <div class="nlb-product-prices">
          <span class="nlb-product-discount" style="font-size:24px;">52%</span>
          <span class="nlb-product-price" style="font-size:24px;">29,900원</span>
        </div>
      </div>
    </div>
    <!-- Product 2 -->
    <div style="flex:1;display:flex;flex-direction:column;">
      <div style="flex:1;overflow:hidden;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-04.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="padding:20px 24px;background:var(--bg);">
        <div class="nlb-product-name" style="font-size:20px;margin-bottom:4px;">실키밤부 슬리핑백</div>
        <div class="nlb-product-desc" style="font-size:14px;margin-bottom:8px;">로즈 핑크</div>
        <div class="nlb-product-prices">
          <span class="nlb-product-discount" style="font-size:24px;">52%</span>
          <span class="nlb-product-price" style="font-size:24px;">29,900원</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
