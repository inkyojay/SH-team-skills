<!--=============================================================
  TYPE: 캐러셀 커머스형 (Carousel Commerce)
  VARIATION: C — Triple · 커버 + 3개 제품 리스트 카드
  DIMENSIONS: 800 × 800px per card (1:1)
  PURPOSE: 라이프스타일 커버 → 넘버링 3개 제품 리스트
  IMAGE SPEC: 커버 800×800px · 제품 썸네일 88×88px 각
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐러셀 커머스 - C Triple</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">

<!-- Card 1: Cover -->
<div class="km-card" data-type="commerce">
  <img class="km-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="컬렉션 커버">
  <div class="km-cover-text overlay" style="justify-content:center;align-items:center;text-align:center;">
    <div class="km-cover-tag">BEST SELLER</div>
    <div class="km-cover-title" style="font-size:38px;">봄 실내복 컬렉션<br>오늘이 마지막!</div>
    <div class="km-cover-sub" style="color:rgba(255,255,255,.7);">여러 장 담을수록 더 큰 혜택</div>
  </div>
</div>

<!-- Card 2: Triple List -->
<div class="km-card" data-type="commerce" style="margin-top:20px;">
  <div style="padding:32px 40px 8px;text-align:center;">
    <div style="font-family:var(--font-en);font-size:13px;font-weight:500;letter-spacing:.2em;color:var(--accent);margin-bottom:6px;">COLLECTION</div>
    <div style="font-size:26px;font-weight:700;color:var(--dark);">인기 슬리핑백 TOP 3</div>
  </div>
  <div class="km-triple">
    <div class="km-triple-item">
      <div class="km-triple-num">1</div>
      <img class="km-triple-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부">
      <div class="km-triple-body">
        <div class="km-triple-desc">극강의 부드러움, 편안한 착용감</div>
        <div class="km-triple-name">실키밤부 슬리핑백</div>
        <div class="km-triple-price-row">
          <span class="km-triple-badge">최대혜택</span>
          <span class="km-triple-price">29,900원</span>
        </div>
      </div>
    </div>
    <div class="km-triple-item">
      <div class="km-triple-num">2</div>
      <img class="km-triple-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="트리플밤부">
      <div class="km-triple-body">
        <div class="km-triple-desc">3중 밤부 레이어, 사계절용</div>
        <div class="km-triple-name">트리플밤부 슬리핑백</div>
        <div class="km-triple-price-row">
          <span class="km-triple-badge">최대혜택</span>
          <span class="km-triple-price">34,900원</span>
        </div>
      </div>
    </div>
    <div class="km-triple-item">
      <div class="km-triple-num">3</div>
      <img class="km-triple-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="메쉬">
      <div class="km-triple-body">
        <div class="km-triple-desc">통기성 메쉬, 여름 전용</div>
        <div class="km-triple-name">메쉬 슬리핑백</div>
        <div class="km-triple-price-row">
          <span class="km-triple-badge">최대혜택</span>
          <span class="km-triple-price">23,900원</span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
