  PURPOSE: 큐레이션 리스트형 메시지

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>와이드 리스트형 B — Curated</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<!-- Header 800×400 -->
<div class="kakao-frame" data-type="header">
  <div class="km-curated-header" style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;">
    <div class="km-curated-label">EDITOR'S PICK</div>
    <div class="km-curated-title">이번 주 베스트 아이템</div>
    <div style="font-size:20px;color:var(--body);margin-top:8px;">MD가 추천하는 인기 아이템</div>
  </div>
</div>
<!-- List 800×800 -->
<div class="kakao-frame" data-type="list-item" style="display:flex;flex-direction:column;justify-content:center;">
  <div class="km-list-item">
    <div class="km-list-item-img"><img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="밤부 스와들"></div>
    <div class="km-list-item-body">
      <div class="km-list-item-name">밤부 스와들</div>
      <div class="km-list-item-desc">데일리크림 · 신생아 필수템</div>
      <div class="km-list-item-prices"><span class="km-list-item-discount">38%</span><span class="km-list-item-price">24,900원</span><span class="km-list-item-orig">39,900원</span></div>
    </div>
  </div>
  <div class="km-list-item">
    <div class="km-list-item-img"><img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="슬리핑백"></div>
    <div class="km-list-item-body">
      <div class="km-list-item-name">실키밤부 슬리핑백</div>
      <div class="km-list-item-desc">제이드그린 · 인기 컬러</div>
      <div class="km-list-item-prices"><span class="km-list-item-discount">52%</span><span class="km-list-item-price">29,900원</span><span class="km-list-item-orig">62,000원</span></div>
    </div>
  </div>
  <div class="km-list-item">
    <div class="km-list-item-img"><img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="모자"></div>
    <div class="km-list-item-body">
      <div class="km-list-item-name">밤부 모자</div>
      <div class="km-list-item-desc">자외선 차단 · 통기성 밤부</div>
      <div class="km-list-item-prices"><span class="km-list-item-discount">30%</span><span class="km-list-item-price">12,900원</span><span class="km-list-item-orig">18,500원</span></div>
    </div>
  </div>
</div>
</body>
</html>
