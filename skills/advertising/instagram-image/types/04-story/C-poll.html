<!--=============================================================
  TYPE: 스토리 (Story)
  VARIATION: C — Poll
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 스토리 — 투표/설문 (이거 vs 저거)
  IMAGE SPEC: 각 옵션 이미지 460 × 460px
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스토리 - C Poll</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ig-frame" data-type="story">
  <div style="display:flex;flex-direction:column;height:100%;background:var(--palette-gradient);padding:80px 60px;">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:48px;">
      <span class="ig-label" style="margin-bottom:20px;display:block;">SUNDAY HUG POLL</span>
      <div class="ig-title" style="font-size:56px;margin-bottom:12px;">어떤 컬러가 좋아요?</div>
      <div class="ig-subtitle" style="font-size:26px;">실키밤부 슬리핑백 컬러 투표</div>
    </div>

    <!-- VS divider -->
    <div style="text-align:center;margin-bottom:40px;">
      <span style="font-family:var(--font-en);font-size:36px;font-weight:700;color:var(--accent);letter-spacing:.15em;">VS</span>
    </div>

    <!-- Option A -->
    <div style="flex:1;display:flex;flex-direction:column;margin-bottom:24px;">
      <div style="flex:1;border-radius:24px;overflow:hidden;position:relative;border:3px solid var(--palette-card-border);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/feature-01-02.jpg" alt="옵션 A" style="width:100%;height:100%;object-fit:cover;">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:24px 32px;background:linear-gradient(to top,rgba(26,26,26,.8),transparent);">
          <span style="font-size:28px;font-weight:700;color:#fff;">크림 베이지</span>
        </div>
      </div>
      <div class="ig-poll-option" style="margin-top:16px;border-color:var(--accent);background:var(--palette-highlight);">
        크림 베이지
      </div>
    </div>

    <!-- Option B -->
    <div style="flex:1;display:flex;flex-direction:column;">
      <div style="flex:1;border-radius:24px;overflow:hidden;position:relative;border:3px solid var(--palette-card-border);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/feature-03-01.jpg" alt="옵션 B" style="width:100%;height:100%;object-fit:cover;">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:24px 32px;background:linear-gradient(to top,rgba(26,26,26,.8),transparent);">
          <span style="font-size:28px;font-weight:700;color:#fff;">소프트 그레이</span>
        </div>
      </div>
      <div class="ig-poll-option" style="margin-top:16px;">
        소프트 그레이
      </div>
    </div>

    <!-- Brand -->
    <div class="ig-brand-bar" style="justify-content:center;margin-top:40px;">
      <span class="ig-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>
  </div>
</div>
</body>
</html>
