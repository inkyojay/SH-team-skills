<!--=============================================================
  TYPE: 릴스 커버 (Reels Cover)
  VARIATION: C — Event
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 릴스 커버 — 이벤트/프로모션
  IMAGE SPEC: 없음 (그라데이션 배경)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>릴스 커버 - C Event</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ig-frame" data-type="reels">
  <div class="ig-center" style="padding:120px 80px;">
    <!-- Top decoration -->
    <div style="width:120px;height:2px;background:var(--accent);margin-bottom:60px;"></div>

    <span class="ig-label" style="margin-bottom:48px;">SPECIAL EVENT</span>

    <div class="ig-title" style="font-size:80px;margin-bottom:24px;">
      봄맞이<br>슬리핑백 특가
    </div>

    <div class="ig-subtitle" style="font-size:32px;margin-bottom:60px;">실키밤부 전 상품 할인</div>

    <!-- Discount highlight -->
    <div style="display:flex;align-items:center;gap:24px;margin-bottom:60px;">
      <div style="width:160px;height:160px;border-radius:50%;border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span style="font-family:var(--font-en);font-size:56px;font-weight:700;color:var(--accent);">52%</span>
        <span style="font-family:var(--font-en);font-size:18px;font-weight:500;color:var(--sub);letter-spacing:.1em;">OFF</span>
      </div>
      <div style="text-align:left;">
        <div style="font-family:var(--font-en);font-size:48px;font-weight:700;color:var(--dark);">29,900원</div>
        <div style="font-family:var(--font-en);font-size:24px;color:var(--sub);text-decoration:line-through;">62,000원</div>
      </div>
    </div>

    <!-- Period -->
    <div style="padding:20px 48px;border:1px solid var(--palette-card-border);border-radius:100px;margin-bottom:60px;">
      <span style="font-family:var(--font-en);font-size:24px;font-weight:500;color:var(--body);letter-spacing:.05em;">2026.03.18 — 2026.03.31</span>
    </div>

    <div class="ig-cta-button">지금 구매하기</div>

    <!-- Bottom decoration -->
    <div style="width:120px;height:2px;background:var(--accent);margin-top:60px;"></div>

    <div class="ig-brand-bar" style="margin-top:40px;">
      <span class="ig-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>
  </div>
</div>
</body>
</html>
