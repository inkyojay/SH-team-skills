<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사회적 증거 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사회적 증거 (Social Proof)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 통계 수치로 제품 신뢰도 전달
  IMAGE SPEC: 텍스트 전용 (통계 카드 3열)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-center" style="background:var(--palette-gradient);padding:80px 80px;justify-content:space-between;">

    <!-- Top: Badge + Title -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
      <span class="ma-badge">BEST SELLER</span>
      <div class="ma-title" style="font-size:56px;text-align:center;line-height:1.35;">엄마들이 선택한<br>슬리핑백</div>
    </div>

    <!-- Center: 3 Stats in a row -->
    <div style="display:flex;width:100%;align-items:center;justify-content:center;">
      <!-- Stat 1 -->
      <div class="ma-stat" style="flex:1;padding:32px 0;">
        <div class="ma-stat-number" style="font-size:68px;">4.9</div>
        <div class="ma-stat-label" style="font-size:24px;margin-top:12px;">평균 평점</div>
      </div>
      <!-- Divider -->
      <div style="width:1px;height:100px;background:var(--palette-card-border);"></div>
      <!-- Stat 2 -->
      <div class="ma-stat" style="flex:1;padding:32px 0;">
        <div class="ma-stat-number" style="font-size:68px;">3,847</div>
        <div class="ma-stat-label" style="font-size:24px;margin-top:12px;">실 구매 리뷰</div>
      </div>
      <!-- Divider -->
      <div style="width:1px;height:100px;background:var(--palette-card-border);"></div>
      <!-- Stat 3 -->
      <div class="ma-stat" style="flex:1;padding:32px 0;">
        <div class="ma-stat-number" style="font-size:68px;">98%</div>
        <div class="ma-stat-label" style="font-size:24px;margin-top:12px;">만족도</div>
      </div>
    </div>

    <!-- Bottom: Product info + brand -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="display:flex;align-items:baseline;gap:16px;">
        <span class="ma-discount" style="font-size:48px;">52%</span>
        <span class="ma-price" style="font-size:48px;">29,900원</span>
      </div>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
