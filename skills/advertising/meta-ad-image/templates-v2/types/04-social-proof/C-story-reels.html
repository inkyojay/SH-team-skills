<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사회적 증거 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사회적 증거 (Social Proof)
  VARIATION: C — Story/Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 세로 스택 통계로 임팩트 극대화
  IMAGE SPEC: 텍스트 전용 (통계 4단 스택)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;padding:80px 80px;">

    <!-- Top: Label + Title -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:60px;">
      <span class="ma-label">TRUSTED BY MOMS</span>
      <div class="ma-title" style="font-size:52px;text-align:center;line-height:1.35;">숫자로 증명하는<br>품질</div>
    </div>

    <!-- Vertically stacked stats -->
    <div style="display:flex;flex-direction:column;gap:36px;margin-bottom:56px;">
      <!-- Stat 1 -->
      <div style="display:flex;align-items:baseline;gap:20px;justify-content:center;">
        <span class="ma-stat-number" style="font-size:80px;">4.9</span>
        <span style="font-size:32px;color:var(--body);font-weight:400;">평균 평점</span>
      </div>
      <!-- Divider -->
      <div style="width:120px;height:1px;background:var(--palette-card-border);align-self:center;"></div>
      <!-- Stat 2 -->
      <div style="display:flex;align-items:baseline;gap:20px;justify-content:center;">
        <span class="ma-stat-number" style="font-size:80px;">3,847</span>
        <span style="font-size:32px;color:var(--body);font-weight:400;">실 구매 후기</span>
      </div>
      <!-- Divider -->
      <div style="width:120px;height:1px;background:var(--palette-card-border);align-self:center;"></div>
      <!-- Stat 3 -->
      <div style="display:flex;align-items:baseline;gap:20px;justify-content:center;">
        <span class="ma-stat-number" style="font-size:80px;">98%</span>
        <span style="font-size:32px;color:var(--body);font-weight:400;">만족도</span>
      </div>
      <!-- Divider -->
      <div style="width:120px;height:1px;background:var(--palette-card-border);align-self:center;"></div>
      <!-- Stat 4 -->
      <div style="display:flex;align-items:baseline;gap:20px;justify-content:center;">
        <span class="ma-stat-number" style="font-size:80px;">50,000+</span>
        <span style="font-size:32px;color:var(--body);font-weight:400;">누적 판매</span>
      </div>
    </div>

    <!-- Product name + price -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:32px;">
      <div style="font-size:30px;font-weight:500;color:var(--dark);">실키밤부 슬리핑백</div>
      <div style="display:flex;align-items:baseline;gap:12px;">
        <span class="ma-discount" style="font-size:40px;">52%</span>
        <span class="ma-price" style="font-size:40px;">29,900원</span>
      </div>
    </div>

    <!-- CTA Button -->
    <div style="display:flex;justify-content:center;">
      <div class="ma-cta-button" style="font-size:26px;padding:22px 56px;">지금 구매하기</div>
    </div>

    <!-- All content within top ~65% safezone -->

  </div>
</div>

</body>
</html>
