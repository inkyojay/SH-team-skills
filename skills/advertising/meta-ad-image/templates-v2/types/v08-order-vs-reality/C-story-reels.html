<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 주문 vs 실물 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 주문 vs 실물 (Order vs Reality — V08)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: B급 바이럴 — 풀스크린 기대/현실 비교
  IMAGE SPEC: 상하 제품 이미지 (또는 플레이스홀더)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;position:relative;background:#000;">

    <!-- Title Bar -->
    <div style="padding:56px 48px 32px;text-align:center;background:#000;">
      <div style="font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:48px;font-weight:900;color:#FFF;letter-spacing:.05em;">ORDER vs REALITY</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:26px;color:rgba(255,255,255,.4);margin-top:8px;">솔직 비교</div>
    </div>

    <!-- TOP: What I Ordered -->
    <div style="flex:1;background:#F8F4F0;position:relative;display:flex;align-items:center;justify-content:center;border-bottom:6px solid #000;">
      <!-- Label -->
      <div style="position:absolute;top:28px;left:28px;background:#FF6B6B;padding:12px 32px;border-radius:8px;z-index:2;transform:rotate(-3deg);">
        <span style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:900;color:#FFF;">ORDERED</span>
      </div>
      <!-- Product placeholder -->
      <div style="width:440px;height:440px;background:#EDE7DD;border-radius:28px;display:flex;align-items:center;justify-content:center;">
        <span style="font-size:180px;">🧸</span>
      </div>
      <div style="position:absolute;bottom:20px;right:28px;font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#aaa;">상세페이지</div>
    </div>

    <!-- Divider with arrow -->
    <div style="height:80px;background:#000;display:flex;align-items:center;justify-content:center;">
      <span style="font-family:'DM Sans',sans-serif;font-size:48px;color:#FFD700;font-weight:700;">↓ VS ↓</span>
    </div>

    <!-- BOTTOM: What I Got -->
    <div style="flex:1;background:#F0FAF0;position:relative;display:flex;align-items:center;justify-content:center;">
      <!-- Label -->
      <div style="position:absolute;top:28px;left:28px;background:#4ECDC4;padding:12px 32px;border-radius:8px;z-index:2;transform:rotate(-3deg);">
        <span style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:900;color:#FFF;">RECEIVED</span>
      </div>
      <!-- Product placeholder -->
      <div style="width:440px;height:440px;background:#E0F5E0;border-radius:28px;display:flex;align-items:center;justify-content:center;">
        <span style="font-size:180px;">🧸</span>
      </div>
      <div style="position:absolute;bottom:20px;right:28px;font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#aaa;">실제 수령</div>
    </div>

    <!-- Result Banner -->
    <div style="padding:36px 48px 52px;background:#000;text-align:center;">
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;">
        <span style="font-size:44px;">✓</span>
        <span style="font-family:'Noto Sans KR',sans-serif;font-size:48px;font-weight:900;color:#4ECDC4;">기대 = 현실</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
        <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:rgba(255,255,255,.5);">스와들 스트랩</span>
        <span style="color:rgba(255,255,255,.2);">|</span>
        <span class="ma-brand-logo" style="font-size:24px;color:rgba(255,255,255,.3);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
