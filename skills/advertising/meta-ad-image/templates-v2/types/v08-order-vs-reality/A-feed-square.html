<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 주문 vs 실물 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 주문 vs 실물 (Order vs Reality — V08)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 기대 = 현실 밈, 신뢰 구축
  IMAGE SPEC: 좌우 제품 이미지 각 540×1080 (또는 플레이스홀더)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;display:flex;position:relative;">

    <!-- LEFT: What I Ordered -->
    <div style="width:50%;height:100%;background:#F8F4F0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;text-align:center;border-right:4px solid #000;">
      <!-- Label -->
      <div style="background:#000;padding:12px 32px;border-radius:8px;margin-bottom:40px;transform:rotate(-2deg);">
        <span style="font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:26px;font-weight:900;color:#FFF;">What I Ordered</span>
      </div>
      <!-- Product placeholder -->
      <div style="width:320px;height:400px;background:#EDE7DD;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:32px;">
        <span style="font-size:120px;">🧸</span>
      </div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#888;">상세페이지 사진</div>
    </div>

    <!-- RIGHT: What I Got -->
    <div style="width:50%;height:100%;background:#F0FAF0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;text-align:center;">
      <!-- Label -->
      <div style="background:#000;padding:12px 32px;border-radius:8px;margin-bottom:40px;transform:rotate(2deg);">
        <span style="font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:26px;font-weight:900;color:#FFF;">What I Got</span>
      </div>
      <!-- Product placeholder -->
      <div style="width:320px;height:400px;background:#E0F5E0;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:32px;">
        <span style="font-size:120px;">🧸</span>
      </div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#888;">실제 수령 사진</div>
    </div>

    <!-- Center overlay: = sign -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;">
      <div style="width:100px;height:100px;border-radius:50%;background:#4ECDC4;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(78,205,196,.4);">
        <span style="font-family:'DM Sans',sans-serif;font-size:48px;font-weight:900;color:#FFF;">=</span>
      </div>
    </div>

    <!-- Bottom banner -->
    <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);padding:28px 48px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:5;">
      <span style="font-size:40px;">✓</span>
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:900;color:#4ECDC4;">기대 = 현실</span>
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:rgba(255,255,255,.5);margin-left:16px;">Sunday Hug 스와들 스트랩</span>
    </div>

  </div>
</div>

</body>
</html>
