<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 감성 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 감성 (Emotional)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 감성 브랜딩, 라이프스타일 무드
  IMAGE SPEC: 풀블리드 라이프스타일 사진 1080×1080 + 하단 그라디언트 오버레이
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">

  <!-- Full-bleed hero image -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="실키밤부 슬리핑백 라이프스타일">

  <!-- Bottom gradient overlay -->
  <div class="ma-overlay bottom" style="padding:60px 72px;padding-top:280px;">
    <!-- Display font quote -->
    <div class="ma-quote" style="color:#fff;font-size:48px;line-height:1.5;margin-bottom:24px;">
      A gentle embrace<br>for peaceful sleep
    </div>
    <!-- Product name -->
    <div style="font-family:var(--font-body);font-size:28px;color:rgba(255,255,255,.7);font-weight:300;margin-bottom:32px;">
      실키밤부 슬리핑백
    </div>
    <!-- Brand logo -->
    <div class="ma-brand-bar">
      <span class="ma-brand-logo" style="color:rgba(255,255,255,.9);">Sunday Hug</span>
    </div>
  </div>

</div>

</body>
</html>
