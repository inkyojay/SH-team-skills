<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — FAQ/오해타파 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: FAQ/오해타파 (FAQ/Myth-Buster)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — Q&A 카드 형식으로 자주 묻는 질문 해결
  IMAGE SPEC: 제품 썸네일 200×200 (하단)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-center" style="height:100%;padding:64px 72px;justify-content:space-between;background:var(--palette-gradient);">

    <!-- Top: Badge -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <span class="ma-badge" style="font-size:20px;padding:12px 32px;">FAQ</span>
      <div class="ma-title" style="font-size:44px;">자주 묻는 질문</div>
    </div>

    <!-- Q&A Cards -->
    <div style="display:flex;flex-direction:column;gap:20px;width:100%;">

      <!-- Q1 -->
      <div class="ma-review-card" style="padding:36px 40px;text-align:left;">
        <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--accent);flex-shrink:0;">Q.</span>
          <span style="font-size:28px;font-weight:500;color:var(--dark);">슬리핑백 사이즈는 어떻게 고르나요?</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--safe);flex-shrink:0;">A.</span>
          <span style="font-size:26px;color:var(--body);line-height:1.6;">아이 키에 맞춰 S(~70cm), M(~80cm), L(~90cm)로 선택하세요. 약간 여유 있는 사이즈를 추천드려요.</span>
        </div>
      </div>

      <!-- Q2 -->
      <div class="ma-review-card" style="padding:36px 40px;text-align:left;">
        <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--accent);flex-shrink:0;">Q.</span>
          <span style="font-size:28px;font-weight:500;color:var(--dark);">세탁기로 빨아도 되나요?</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--safe);flex-shrink:0;">A.</span>
          <span style="font-size:26px;color:var(--body);line-height:1.6;">네! 세탁망에 넣어 찬물 약세탁 하시면 됩니다. 형태 변형 없이 오래 사용 가능해요.</span>
        </div>
      </div>

      <!-- Q3 -->
      <div class="ma-review-card" style="padding:36px 40px;text-align:left;">
        <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--accent);flex-shrink:0;">Q.</span>
          <span style="font-size:28px;font-weight:500;color:var(--dark);">여름에도 사용할 수 있나요?</span>
        </div>
        <div style="display:flex;align-items:flex-start;gap:16px;">
          <span style="font-family:var(--font-en);font-size:28px;font-weight:700;color:var(--safe);flex-shrink:0;">A.</span>
          <span style="font-size:26px;color:var(--body);line-height:1.6;">밤부 소재는 체온 조절이 뛰어나 여름에도 쾌적하게 사용 가능합니다.</span>
        </div>
      </div>

    </div>

    <!-- Bottom: Brand -->
    <div class="ma-brand-bar" style="justify-content:center;">
      <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
