<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 시즌/컬렉션 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 시즌/컬렉션 (Seasonal/Collection)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 풀스크린 시즌 무드 + 컬렉션 하이라이트
  IMAGE SPEC: 풀블리드 시즌 무드 이미지 (배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">

  <!-- Full-bleed seasonal mood -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="시즌 컬렉션">

  <!-- Top badge -->
  <div style="position:absolute;top:100px;left:50%;transform:translateX(-50%);z-index:2;">
    <span class="ma-badge" style="font-size:22px;padding:14px 36px;">2026 SPRING</span>
  </div>

  <!-- Center-upper content overlay -->
  <div style="position:absolute;top:240px;left:0;right:0;padding:0 80px;z-index:2;text-align:center;">
    <div class="ma-label" style="color:rgba(255,255,255,.6);font-size:22px;letter-spacing:.3em;margin-bottom:16px;">NEW COLLECTION</div>
    <div class="ma-quote" style="color:#fff;font-size:56px;line-height:1.4;margin-bottom:20px;">
      봄을 닮은<br>부드러움
    </div>
    <div class="ma-subtitle" style="color:rgba(255,255,255,.7);font-size:30px;">
      자연의 따스함을 담은<br>2026 봄 컬렉션
    </div>
  </div>

  <!-- Bottom gradient with products (above safezone) -->
  <div style="position:absolute;bottom:672px;left:0;right:0;height:576px;background:linear-gradient(to top, rgba(250,247,244,.95) 0%, rgba(250,247,244,.7) 60%, transparent 100%);z-index:1;"></div>
  <div style="position:absolute;bottom:672px;left:0;right:0;padding:0 60px 48px;z-index:2;display:flex;flex-direction:column;align-items:center;">

    <!-- Product thumbnails -->
    <div style="display:flex;gap:20px;margin-bottom:32px;">
      <div style="width:200px;height:200px;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
             alt="" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="width:200px;height:200px;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
             alt="" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div style="width:200px;height:200px;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
             alt="" style="width:100%;height:100%;object-fit:cover;">
      </div>
    </div>

    <a class="ma-cta-button" style="font-size:28px;padding:24px 64px;margin-bottom:16px;">컬렉션 보기</a>
    <div class="ma-brand-bar" style="justify-content:center;">
      <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
    </div>
  </div>

</div>

</body>
</html>
