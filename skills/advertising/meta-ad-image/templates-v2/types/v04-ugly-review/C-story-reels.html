<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — Ugly 후기 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: Ugly/Lo-Fi 후기 (Ugly Review — V04)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: B급 바이럴 — TikTok 풀스크린 캡션, 강렬한 후기
  IMAGE SPEC: 없음 (텍스트 전용)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 72px;text-align:center;position:relative;">

    <!-- Noisy background effect -->
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.02) 2px, rgba(255,255,255,.02) 4px);z-index:0;"></div>

    <!-- Content -->
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:32px;">

      <!-- Header tag -->
      <div style="background:#FF3366;padding:12px 32px;border-radius:8px;transform:rotate(-2deg);">
        <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:900;color:#FFF;">실제 후기</span>
      </div>

      <!-- Star rating -->
      <div style="font-size:72px;letter-spacing:12px;margin:16px 0;">
        <span style="color:#FFD700;">★★★★★</span>
      </div>

      <!-- Review text -->
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:72px;font-weight:900;color:#FFF;line-height:1.5;text-shadow:4px 4px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 0 6px 20px rgba(0,0,0,.8);">
        이거 쓰고<br>
        <span style="color:#FFD700;font-size:84px;">7시간</span><br>
        연속 수면<br>
        성공했습니다
      </div>

      <!-- Product name -->
      <div style="margin-top:24px;background:rgba(255,255,255,.1);padding:16px 40px;border-radius:12px;">
        <span style="font-family:'Noto Sans KR',sans-serif;font-size:32px;font-weight:700;color:#FFF;">스와들 스트랩</span>
      </div>

      <!-- Reviewer -->
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:rgba(255,255,255,.4);font-weight:400;margin-top:8px;">
        — 4개월 아기 엄마, 수면교육 포기자
      </div>

    </div>

    <!-- Brand -->
    <div style="position:absolute;bottom:80px;right:48px;z-index:1;">
      <span class="ma-brand-logo" style="font-size:24px;color:rgba(255,255,255,.15);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
