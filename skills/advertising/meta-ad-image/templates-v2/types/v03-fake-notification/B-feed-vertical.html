<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — iOS 알림 오버레이 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: iOS 알림 오버레이 (Fake Notification — V03)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — iOS 알림 배너 다중 오버레이
  IMAGE SPEC: 배경 라이프스타일 이미지 1080×1350
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;position:relative;background:#E8DFD3;">

    <!-- Background -->
    <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg, #F5EDE3 0%, #E8DFD3 50%, #D4C8B8 100%);"></div>

    <!-- Background illustration -->
    <div style="position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);text-align:center;">
      <div style="font-size:240px;opacity:.25;">🧸</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:rgba(0,0,0,.15);margin-top:16px;">아기방</div>
    </div>

    <!-- iOS Status Bar -->
    <div style="position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:10;">
      <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:20px;font-weight:600;color:#333;">9:41</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:16px;color:#333;">📶 🔋</span>
      </div>
    </div>

    <!-- Notification 1 -->
    <div style="position:absolute;top:72px;left:32px;right:32px;z-index:20;">
      <div style="background:rgba(255,255,255,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:24px;padding:24px 28px;box-shadow:0 8px 40px rgba(0,0,0,.12);display:flex;gap:20px;align-items:flex-start;">
        <div style="width:72px;height:72px;border-radius:16px;background:#FEE500;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;">💬</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;">카카오톡</span>
            <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:18px;color:#8E8E93;">지금</span>
          </div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;font-weight:600;color:#1a1a1a;margin-bottom:4px;">시누이</div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;color:#3C3C43;line-height:1.4;">언니 이거 뭐야?? 우리 아기한테도 사줘 제발 🙏</div>
        </div>
      </div>
    </div>

    <!-- Notification 2 -->
    <div style="position:absolute;top:280px;left:32px;right:32px;z-index:19;">
      <div style="background:rgba(255,255,255,.88);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:24px;padding:24px 28px;box-shadow:0 8px 40px rgba(0,0,0,.08);display:flex;gap:20px;align-items:flex-start;">
        <div style="width:72px;height:72px;border-radius:16px;background:#34C759;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;">💬</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;">iMessage</span>
            <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:18px;color:#8E8E93;">3분 전</span>
          </div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;font-weight:600;color:#1a1a1a;margin-bottom:4px;">엄마</div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;color:#3C3C43;line-height:1.4;">둘째도 이거 입혀봐 진짜 안깨 대박</div>
        </div>
      </div>
    </div>

    <!-- Notification 3 -->
    <div style="position:absolute;top:488px;left:32px;right:32px;z-index:18;">
      <div style="background:rgba(255,255,255,.84);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:24px;padding:24px 28px;box-shadow:0 8px 40px rgba(0,0,0,.06);display:flex;gap:20px;align-items:flex-start;">
        <div style="width:72px;height:72px;border-radius:16px;background:#FF9500;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;">📸</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;">Instagram</span>
            <span style="font-family:-apple-system,'DM Sans',sans-serif;font-size:18px;color:#8E8E93;">5분 전</span>
          </div>
          <div style="font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:24px;color:#3C3C43;line-height:1.4;">@babymom_jin님이 회원님을 언급했습니다: 이거 꼭 사세요!!</div>
        </div>
      </div>
    </div>

    <!-- Product callout -->
    <div style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;">
      <div style="background:rgba(255,255,255,.9);border-radius:20px;padding:28px 48px;box-shadow:0 4px 20px rgba(0,0,0,.08);">
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#888;margin-bottom:8px;">모두가 물어보는 그 제품</div>
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:32px;font-weight:700;color:#1a1a1a;">Sunday Hug 스와들 스트랩</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
