<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 권위/전문가 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 권위/전문가 (Authority-Expert)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 전문가 추천 + 인증 + 제품 CTA (세로 풀스크린)
  IMAGE SPEC: 전문가 아바타 플레이스홀더 + 제품 이미지 (소형)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:80px 64px 0;">

    <!-- Label + Title -->
    <div style="text-align:center;margin-bottom:48px;">
      <div class="ma-label" style="font-size:20px;letter-spacing:.15em;margin-bottom:16px;">EXPERT RECOMMENDATION</div>
      <div class="ma-title" style="font-size:46px;color:var(--dark);line-height:1.35;">전문가가 추천하는<br>슬리핑백</div>
    </div>

    <!-- Expert Profile -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:40px;">
      <!-- Avatar placeholder -->
      <div class="ma-expert-avatar" style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;background:var(--dark);border:4px solid var(--accent);">
        <span style="font-family:var(--font-en);font-size:40px;font-weight:700;color:#fff;">Dr.K</span>
      </div>
      <div style="text-align:center;">
        <div style="font-size:30px;font-weight:700;color:var(--dark);margin-bottom:6px;">김소아 소아과 전문의</div>
        <div style="font-size:22px;color:var(--body);">소아과 전문의 15년</div>
      </div>
    </div>

    <!-- Quote -->
    <div class="ma-quote" style="font-size:34px;text-align:center;line-height:1.7;margin-bottom:48px;max-width:900px;">
      "아이의 수면 환경에서 가장 중요한 것은 적절한 온도 조절입니다. 밤부 원단은 자연적으로 온도를 조절해줍니다."
    </div>

    <!-- Certification Badges -->
    <div style="display:flex;justify-content:center;gap:40px;margin-bottom:48px;">

      <!-- KC -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:20px;font-weight:700;color:var(--dark);">KC</span>
        </div>
        <div style="font-size:18px;font-weight:500;color:var(--dark);text-align:center;">KC 인증</div>
      </div>

      <!-- OEKO-TEX -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:14px;font-weight:700;color:var(--dark);text-align:center;line-height:1.2;">OEKO<br>TEX</span>
        </div>
        <div style="font-size:18px;font-weight:500;color:var(--dark);text-align:center;">OEKO-TEX</div>
      </div>

      <!-- ISO -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="width:80px;height:80px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:20px;font-weight:700;color:var(--dark);">ISO</span>
        </div>
        <div style="font-size:18px;font-weight:500;color:var(--dark);text-align:center;">ISO 인증</div>
      </div>

    </div>

    <!-- Product + CTA -->
    <div style="display:flex;align-items:center;gap:28px;margin-bottom:24px;">
      <div style="width:120px;height:120px;border-radius:16px;overflow:hidden;flex-shrink:0;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div>
        <div style="font-size:26px;font-weight:700;color:var(--dark);margin-bottom:4px;">실키밤부 슬리핑백</div>
        <div style="font-size:20px;color:var(--body);">전문가 추천 프리미엄 수면백</div>
      </div>
    </div>

    <span class="ma-cta-button" style="font-size:26px;padding:22px 64px;margin-bottom:20px;">자세히 보기</span>

    <!-- Brand Logo (above safezone) -->
    <div style="margin-top:16px;">
      <span class="ma-brand-logo" style="color:var(--accent-dark);font-size:26px;">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
