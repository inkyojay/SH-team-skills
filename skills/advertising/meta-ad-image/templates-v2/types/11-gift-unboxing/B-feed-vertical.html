<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 선물/언박싱 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 선물/언박싱 (Gift/Unboxing)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 기프트 세트 구성품 소개
  IMAGE SPEC: 기프트 박스 이미지 1080×540 (상단) + 구성품 원형 썸네일 3개
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP 40%: Gift box image -->
    <div style="width:100%;height:40%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="기프트 세트"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 50%, rgba(250,247,244,1) 100%);z-index:1;"></div>
      <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:12px 32px;">GIFT SET</span>
      </div>
    </div>

    <!-- BOTTOM 60%: Set contents -->
    <div style="width:100%;height:60%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 72px 48px;text-align:center;">

      <div style="font-family:var(--font-display);font-size:32px;font-weight:300;font-style:italic;color:var(--accent-dark);margin-bottom:8px;">For precious moments</div>
      <div class="ma-title" style="font-size:44px;margin-bottom:40px;">프리미엄 출산 선물 세트</div>

      <!-- 3 items in set -->
      <div style="display:flex;gap:32px;margin-bottom:40px;width:100%;">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid var(--accent-light);box-shadow:0 4px 20px rgba(0,0,0,.08);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
                 alt="슬리핑백" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);">슬리핑백</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid var(--accent-light);box-shadow:0 4px 20px rgba(0,0,0,.08);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
                 alt="스와들" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);">스와들</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid var(--accent-light);box-shadow:0 4px 20px rgba(0,0,0,.08);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
                 alt="턱받이" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);">턱받이</div>
        </div>
      </div>

      <!-- Price + CTA -->
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:28px;">
        <span class="ma-price-orig" style="font-size:26px;">89,000원</span>
        <span class="ma-price" style="font-size:48px;">59,900원</span>
      </div>
      <a class="ma-cta-button" style="margin-bottom:20px;">선물하기</a>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
