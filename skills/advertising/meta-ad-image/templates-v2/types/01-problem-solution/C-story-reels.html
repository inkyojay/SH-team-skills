<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 문제-해결 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 문제-해결 (Problem-Solution)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 스토리/릴스 문제→해결 전환 포맷
  IMAGE SPEC: 제품 이미지 중앙 배치 (하단 솔루션 영역)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- TOP: Problem (~35% = 672px) -->
    <div style="height:672px;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 80px 40px;text-align:center;flex-shrink:0;">
      <div class="ma-label" style="color:rgba(255,255,255,.45);font-size:22px;letter-spacing:.25em;margin-bottom:36px;">PROBLEM</div>
      <div class="ma-title" style="color:#fff;font-size:52px;line-height:1.4;max-width:800px;">밤새 뒤척이는 아이,<br>엄마도 잠 못 드는 밤</div>
    </div>

    <!-- MIDDLE: Arrow Divider -->
    <div style="height:96px;background:linear-gradient(to bottom, #2C2C3A 0%, #2C2C3A 50%, transparent 50%);position:relative;flex-shrink:0;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:2;">
        <span style="font-size:40px;color:#fff;line-height:1;">↓</span>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:var(--palette-gradient);"></div>
    </div>

    <!-- BOTTOM: Solution (~45% = 864px, keeps text above 65% height) -->
    <div style="flex:1;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:40px 80px 0;text-align:center;">
      <div class="ma-label" style="color:var(--accent-dark);font-size:22px;letter-spacing:.25em;margin-bottom:28px;">SOLUTION</div>

      <!-- Product image -->
      <div style="width:400px;height:400px;border-radius:24px;overflow:hidden;margin-bottom:32px;box-shadow:0 12px 48px rgba(0,0,0,.1);flex-shrink:0;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>

      <div class="ma-title" style="font-size:40px;margin-bottom:12px;">실키밤부 슬리핑백으로</div>
      <div class="ma-subtitle" style="font-size:32px;margin-bottom:28px;">온 가족 숙면</div>

      <!-- Price -->
      <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:32px;">
        <span class="ma-discount" style="font-size:48px;">52%</span>
        <span class="ma-price" style="font-size:48px;">29,900원</span>
      </div>

      <a class="ma-cta-button" style="font-size:30px;padding:26px 72px;">지금 구매하기</a>
    </div>

    <!-- Safezone: bottom 35% (672px) left clear — all content above -->

  </div>
</div>

</body>
</html>
