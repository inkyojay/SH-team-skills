<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 혜택/기능 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 혜택/기능 (Benefit-Feature)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 제품 히어로 + 3개 기능 카드
  IMAGE SPEC: 제품 오버뷰 이미지 1080×540 (상단 패널)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP 50%: Product Hero -->
    <div style="width:100%;height:50%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
           alt="실키밤부 슬리핑백"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <!-- PREMIUM badge -->
      <div style="position:absolute;top:40px;left:40px;z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:10px 28px;background:rgba(26,26,26,.75);color:#fff;letter-spacing:.12em;">PREMIUM</span>
      </div>
    </div>

    <!-- BOTTOM 50%: Features -->
    <div style="width:100%;height:50%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 48px;">

      <!-- Product name -->
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:var(--font-display);font-size:28px;font-weight:300;font-style:italic;color:var(--accent-dark);margin-bottom:8px;">Silky Bamboo</div>
        <div class="ma-title" style="font-size:42px;color:var(--dark);">실키밤부 슬리핑백</div>
      </div>

      <!-- 3 Feature Cards -->
      <div style="display:flex;gap:24px;width:100%;">

        <!-- Card 1 -->
        <div class="ma-feature-card" style="flex:1;padding:28px 20px;border-radius:16px;">
          <div style="font-size:40px;margin-bottom:12px;">🌿</div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:8px;">프리미엄 밤부</div>
          <div style="font-size:20px;color:var(--body);line-height:1.5;">자연 유래 항균 원단</div>
        </div>

        <!-- Card 2 -->
        <div class="ma-feature-card" style="flex:1;padding:28px 20px;border-radius:16px;">
          <div style="font-size:40px;margin-bottom:12px;">🌡️</div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:8px;">온도 조절</div>
          <div style="font-size:20px;color:var(--body);line-height:1.5;">사계절 쾌적한 수면</div>
        </div>

        <!-- Card 3 -->
        <div class="ma-feature-card" style="flex:1;padding:28px 20px;border-radius:16px;">
          <div style="font-size:40px;margin-bottom:12px;">🔒</div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:8px;">안전 지퍼</div>
          <div style="font-size:20px;color:var(--body);line-height:1.5;">양방향 안전 지퍼</div>
        </div>

      </div>

      <!-- Brand logo -->
      <div style="position:absolute;bottom:32px;right:48px;">
        <div class="ma-brand-bar">
          <span class="ma-brand-logo" style="color:var(--accent-dark);font-size:24px;">Sunday Hug</span>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
