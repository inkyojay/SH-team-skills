<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 티어리스트 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 티어리스트 (Tier List — V06)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 게임 스타일 티어리스트, 제품 비교
  IMAGE SPEC: 없음 (UI 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;padding:48px;">

    <!-- Title -->
    <div style="text-align:center;margin-bottom:36px;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:52px;font-weight:900;color:#FFF;">육아템 티어리스트</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:22px;color:rgba(255,255,255,.4);margin-top:8px;">BABY ITEM TIER LIST</div>
    </div>

    <!-- Tier Grid -->
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">

      <!-- S Tier -->
      <div style="display:flex;height:20%;border-radius:12px;overflow:hidden;">
        <div style="width:100px;background:linear-gradient(135deg,#FFD700,#FFA500);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;color:#FFF;text-shadow:2px 2px 4px rgba(0,0,0,.3);">S</span>
        </div>
        <div style="flex:1;background:rgba(255,215,0,.12);display:flex;align-items:center;padding:0 32px;gap:20px;">
          <div style="background:rgba(255,215,0,.2);border:2px solid #FFD700;border-radius:12px;padding:12px 28px;box-shadow:0 0 20px rgba(255,215,0,.3);">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:#FFD700;">스와들 스트랩 ✨</span>
          </div>
          <div style="background:rgba(255,215,0,.15);border:2px solid rgba(255,215,0,.5);border-radius:12px;padding:12px 28px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:#FFD700;">실키밤부 슬리핑백</span>
          </div>
        </div>
      </div>

      <!-- A Tier -->
      <div style="display:flex;height:16%;border-radius:12px;overflow:hidden;">
        <div style="width:100px;background:#4ECDC4;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:48px;font-weight:700;color:#FFF;">A</span>
        </div>
        <div style="flex:1;background:rgba(78,205,196,.1);display:flex;align-items:center;padding:0 32px;gap:20px;">
          <div style="background:rgba(78,205,196,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#4ECDC4;">아기 침대</span>
          </div>
          <div style="background:rgba(78,205,196,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#4ECDC4;">바운서</span>
          </div>
        </div>
      </div>

      <!-- B Tier -->
      <div style="display:flex;height:16%;border-radius:12px;overflow:hidden;">
        <div style="width:100px;background:#5B8DEF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:48px;font-weight:700;color:#FFF;">B</span>
        </div>
        <div style="flex:1;background:rgba(91,141,239,.1);display:flex;align-items:center;padding:0 32px;gap:20px;">
          <div style="background:rgba(91,141,239,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#5B8DEF;">백색소음기</span>
          </div>
          <div style="background:rgba(91,141,239,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#5B8DEF;">수유쿠션</span>
          </div>
        </div>
      </div>

      <!-- C Tier -->
      <div style="display:flex;height:16%;border-radius:12px;overflow:hidden;">
        <div style="width:100px;background:#FF9F43;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:48px;font-weight:700;color:#FFF;">C</span>
        </div>
        <div style="flex:1;background:rgba(255,159,67,.1);display:flex;align-items:center;padding:0 32px;gap:20px;">
          <div style="background:rgba(255,159,67,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#FF9F43;">범퍼침대</span>
          </div>
        </div>
      </div>

      <!-- F Tier -->
      <div style="display:flex;height:16%;border-radius:12px;overflow:hidden;">
        <div style="width:100px;background:#FF6B6B;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:'DM Sans',sans-serif;font-size:48px;font-weight:700;color:#FFF;">F</span>
        </div>
        <div style="flex:1;background:rgba(255,107,107,.1);display:flex;align-items:center;padding:0 32px;gap:20px;">
          <div style="background:rgba(255,107,107,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#FF6B6B;">일반 이불</span>
          </div>
          <div style="background:rgba(255,107,107,.15);border-radius:12px;padding:12px 24px;">
            <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:#FF6B6B;text-decoration:line-through;">수면조끼</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Brand -->
    <div style="text-align:center;margin-top:24px;">
      <span class="ma-brand-logo" style="font-size:20px;color:rgba(255,255,255,.2);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
