<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 메모장 스타일 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 메모장 스타일 (Notes App — V01)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — iPhone 메모장 UI, 체크리스트형 제품 소개
  IMAGE SPEC: 없음 (텍스트 전용)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;background:#FFFFFF;">

    <!-- Status Bar -->
    <div style="height:44px;background:#F9F3E0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;">
      <span style="font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;color:#8B7D5E;">9:41</span>
      <div style="display:flex;gap:8px;">
        <span style="font-size:16px;color:#8B7D5E;">📶</span>
        <span style="font-size:16px;color:#8B7D5E;">🔋</span>
      </div>
    </div>

    <!-- Notes Header -->
    <div style="background:#F9F3E0;padding:20px 40px 24px;border-bottom:1px solid #E8DFC8;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-family:'DM Sans',sans-serif;font-size:24px;color:#C4A94D;font-weight:500;">< Notes</span>
        <span style="font-family:'DM Sans',sans-serif;font-size:24px;color:#C4A94D;font-weight:500;">Done</span>
      </div>
    </div>

    <!-- Note Content -->
    <div style="flex:1;padding:52px 56px;display:flex;flex-direction:column;gap:16px;background:#FFFFFF;">
      <div style="font-family:'Courier New',monospace;font-size:20px;color:#999;margin-bottom:4px;">2026년 3월 22일 오전 2:47</div>

      <div style="font-family:'Noto Sans KR',sans-serif;font-size:46px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:12px;">
        출산 준비물 최종 📝
      </div>

      <div style="font-family:'Courier New','Noto Sans KR',monospace;font-size:32px;color:#333;line-height:2.0;">
        <span style="text-decoration:line-through;color:#aaa;">☑ 아기침대</span><br>
        <span style="text-decoration:line-through;color:#aaa;">☑ 젖병세트</span><br>
        <span style="text-decoration:line-through;color:#aaa;">☑ 기저귀</span><br>
        <span style="text-decoration:line-through;color:#aaa;">☑ 내의세트</span><br>
        <br>
        <span style="color:#1a1a1a;font-weight:700;">☐ 스와들 스트랩</span><br>
        <span style="color:#1a1a1a;font-weight:700;">☐ 실키밤부 슬리핑백</span><br>
        <br>
        <span style="color:#C4A94D;font-size:28px;">↑ 이거 안 사면 후회함</span><br>
        <span style="color:#C4A94D;font-size:28px;">  (선배맘 3명이 추천)</span>
      </div>
    </div>

    <!-- Footer -->
    <div style="padding:20px 56px 36px;border-top:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Courier New',monospace;font-size:18px;color:#aaa;">Shared from Notes</span>
      <span class="ma-brand-logo" style="font-size:22px;color:#999;">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
