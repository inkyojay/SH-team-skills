<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 가격/할인 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 가격/할인 (Price-Discount)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 제품 이미지 + 할인 정보 결합
  IMAGE SPEC: 제품 라이프스타일 이미지 1080×608 (상단 45%)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- Top 45%: Product Image with Discount Overlay -->
    <div style="width:100%;height:45%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="실키밤부 슬리핑백"
           class="ma-hero-img">
      <!-- Semi-transparent overlay -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(44,44,58,.45);z-index:1;display:flex;align-items:center;justify-content:center;">
        <div style="display:flex;align-items:baseline;gap:12px;">
          <span style="font-family:var(--font-en);font-size:120px;font-weight:700;color:#fff;line-height:1;">52%</span>
          <span style="font-family:var(--font-en);font-size:52px;font-weight:700;color:#fff;line-height:1;">OFF</span>
        </div>
      </div>
    </div>

    <!-- Bottom 55%: Price Info -->
    <div style="width:100%;height:55%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 80px;text-align:center;gap:20px;">

      <!-- Price -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span class="ma-price-orig" style="font-size:30px;">62,000원</span>
        <span class="ma-price" style="font-size:64px;">29,900원</span>
      </div>

      <!-- Product Name -->
      <div class="ma-title" style="font-size:40px;margin-top:8px;">실키밤부 슬리핑백</div>

      <!-- Subtitle -->
      <div class="ma-subtitle" style="font-size:28px;color:var(--body);">라이브 방송 한정 특가</div>

      <!-- CTA -->
      <span class="ma-cta-button" style="font-size:28px;padding:24px 64px;margin-top:12px;">지금 구매하기</span>

      <!-- Brand -->
      <div class="ma-brand-bar" style="justify-content:center;margin-top:8px;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>

    </div>

  </div>
</div>

</body>
</html>
