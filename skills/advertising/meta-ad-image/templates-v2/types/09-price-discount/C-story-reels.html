<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 가격/할인 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 가격/할인 (Price-Discount)
  VARIATION: C — Story Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 스토리/릴스용 할인 강조
  IMAGE SPEC: 없음 (그래디언트 배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <!-- Content in top 65% safezone -->
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:0 80px;">

    <!-- Spacer top -->
    <div style="height:120px;flex-shrink:0;"></div>

    <!-- SPECIAL PRICE Label -->
    <span class="ma-label" style="font-size:24px;letter-spacing:.3em;">SPECIAL PRICE</span>

    <!-- Huge Discount -->
    <div style="display:flex;align-items:baseline;gap:8px;margin-top:40px;">
      <span class="ma-discount" style="font-size:220px;line-height:1;">52</span>
      <div style="display:flex;flex-direction:column;align-items:flex-start;">
        <span class="ma-discount" style="font-size:72px;line-height:1;">%</span>
        <span class="ma-discount" style="font-size:72px;line-height:1;margin-top:-4px;">OFF</span>
      </div>
    </div>

    <!-- Price Comparison -->
    <div style="display:flex;align-items:center;gap:24px;margin-top:40px;">
      <span class="ma-price-orig" style="font-size:32px;">62,000원</span>
      <span style="font-size:32px;color:var(--sub);">→</span>
      <span class="ma-price" style="font-size:56px;">29,900원</span>
    </div>

    <!-- Product Name -->
    <div class="ma-title" style="font-size:44px;margin-top:32px;text-align:center;">실키밤부 슬리핑백</div>

    <!-- CTA -->
    <span class="ma-cta-button" style="font-size:30px;padding:28px 80px;margin-top:48px;">지금 구매하기</span>

    <!-- Brand Logo (above safezone boundary) -->
    <div class="ma-brand-bar" style="justify-content:center;margin-top:48px;">
      <span class="ma-brand-logo" style="font-size:32px;color:var(--accent-dark);">Sunday Hug</span>
    </div>

    <!-- Remaining space is safezone bottom (35%) -->

  </div>
</div>

</body>
</html>
