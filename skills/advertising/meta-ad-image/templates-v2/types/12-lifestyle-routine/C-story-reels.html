<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 라이프스타일/루틴 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 라이프스타일/루틴 (Lifestyle/Routine)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 세로 풀스크린 루틴 소개
  IMAGE SPEC: 풀블리드 라이프스타일 이미지 (배경)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">

  <!-- Full-bleed lifestyle -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
       alt="수면 루틴">

  <!-- Top area badge -->
  <div style="position:absolute;top:100px;left:50%;transform:translateX(-50%);z-index:2;">
    <span class="ma-badge" style="font-size:22px;padding:14px 36px;">NIGHT ROUTINE</span>
  </div>

  <!-- Center quote -->
  <div class="ma-overlay full" style="background:rgba(26,26,26,.5);">
    <div style="max-width:800px;padding:0 60px;">
      <div class="ma-quote" style="color:#fff;font-size:52px;line-height:1.5;margin-bottom:24px;">
        Every night,<br>the same gentle ritual
      </div>
      <div class="ma-title" style="color:#fff;font-size:44px;margin-bottom:16px;">우리 아이 수면 루틴</div>
      <div class="ma-subtitle" style="color:rgba(255,255,255,.7);font-size:30px;margin-bottom:48px;">
        슬리핑백 하나로 시작하는<br>편안한 밤
      </div>

      <!-- Routine steps horizontal -->
      <div style="display:flex;gap:20px;margin-bottom:48px;">
        <div style="flex:1;background:rgba(255,255,255,.1);border-radius:16px;padding:28px 20px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">🛁</div>
          <div style="font-size:22px;color:#fff;">목욕</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,.1);border-radius:16px;padding:28px 20px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">👶</div>
          <div style="font-size:22px;color:#fff;">슬리핑백</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,.1);border-radius:16px;padding:28px 20px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">🌙</div>
          <div style="font-size:22px;color:#fff;">숙면</div>
        </div>
      </div>

      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:rgba(255,255,255,.9);">Sunday Hug</span>
      </div>
    </div>
  </div>

</div>
