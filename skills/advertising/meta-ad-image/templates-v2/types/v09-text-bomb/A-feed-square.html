<!--=============================================================

  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 한 줄 카피, 울트라 미니멀

<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:#FEE500;display:flex;align-items:center;justify-content:center;padding:80px;position:relative;">

    <!-- One witty line -->
    <div style="font-family:'Noto Sans KR',sans-serif;font-size:88px;font-weight:900;color:#000;line-height:1.4;text-align:center;">
      이 스와들 입히면<br>
      우리 아기 10초 안에<br>
      기절합니다
    </div>

    <!-- Tiny brand in corner -->
    <div style="position:absolute;bottom:32px;right:40px;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:20px;font-weight:400;color:rgba(0,0,0,.25);">sundayhug.kr</span>
    </div>

  </div>
</div>
