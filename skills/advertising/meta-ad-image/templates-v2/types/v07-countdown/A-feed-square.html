<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 카운트다운 리스트 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 카운트다운 리스트 (Countdown List — V07)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 역순 카운트다운, 이유 나열
  IMAGE SPEC: 없음 (텍스트 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:#000;display:flex;flex-direction:column;">

    <!-- Title -->
    <div style="padding:48px 60px 32px;text-align:center;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:44px;font-weight:900;color:#FFF;">이걸 써야 하는</div>
      <div style="font-family:'DM Sans','Noto Sans KR',sans-serif;font-size:56px;font-weight:900;color:#FFD700;">3가지 이유</div>
    </div>

    <!-- Countdown Items -->
    <div style="flex:1;display:flex;flex-direction:column;padding:0 60px;gap:16px;">

      <!-- #3 -->
      <div style="flex:1;display:flex;align-items:center;gap:32px;background:rgba(255,255,255,.05);border-radius:20px;padding:24px 36px;">
        <div style="font-family:'DM Sans',sans-serif;font-size:80px;font-weight:900;color:rgba(255,255,255,.15);flex-shrink:0;width:100px;text-align:center;">3</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:34px;font-weight:700;color:#FFF;">세탁기에 돌려도 OK</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.5);margin-top:6px;">매일 세탁해도 안 늘어남</div>
        </div>
      </div>

      <!-- #2 -->
      <div style="flex:1;display:flex;align-items:center;gap:32px;background:rgba(255,255,255,.08);border-radius:20px;padding:24px 36px;">
        <div style="font-family:'DM Sans',sans-serif;font-size:80px;font-weight:900;color:rgba(255,255,255,.2);flex-shrink:0;width:100px;text-align:center;">2</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:34px;font-weight:700;color:#FFF;">등센서 완벽 차단</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.5);margin-top:6px;">내려놓아도 안 깸</div>
        </div>
      </div>

      <!-- #1 -->
      <div style="flex:1.2;display:flex;align-items:center;gap:32px;background:linear-gradient(135deg, rgba(255,215,0,.15), rgba(255,165,0,.1));border:2px solid rgba(255,215,0,.3);border-radius:20px;padding:24px 36px;">
        <div style="font-family:'DM Sans',sans-serif;font-size:100px;font-weight:900;color:#FFD700;flex-shrink:0;width:100px;text-align:center;text-shadow:0 0 20px rgba(255,215,0,.3);">1</div>
        <div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:38px;font-weight:900;color:#FFD700;">7시간 연속 수면</div>
          <div style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,215,0,.6);margin-top:6px;">엄마도 아기도 숙면</div>
        </div>
      </div>

    </div>

    <!-- Brand -->
    <div style="padding:24px 60px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;font-weight:700;color:rgba(255,255,255,.4);">스와들 스트랩</span>
      <span class="ma-brand-logo" style="font-size:22px;color:rgba(255,255,255,.2);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
