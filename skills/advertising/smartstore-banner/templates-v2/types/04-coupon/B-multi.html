<!--=============================================================
  TYPE: 쿠폰 배너 (Coupon Banner)
  VARIATION: B — Multi (다중 쿠폰)
  DIMENSIONS: 720 × 360px
  PURPOSE: 쿠폰 다운로드 유도 — 3종 쿠폰 나열
  IMAGE SPEC: 상단 제품 이미지 스트립
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>쿠폰 배너 - B Multi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ss-frame" data-type="coupon">
  <!-- 상단 제품 이미지 스트립 -->
  <div style="width:100%;height:140px;overflow:hidden;">
    <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
  </div>
  <!-- 하단 쿠폰 영역 -->
  <div style="padding:24px 48px;background:var(--bg-warm);display:flex;flex-direction:column;align-items:center;">
    <div style="font-size:22px;font-weight:700;color:var(--dark);margin-bottom:12px;">쿠폰 3종 세트 다운로드</div>
    <div style="display:flex;gap:14px;width:100%;justify-content:center;">
      <div class="ss-coupon-card" style="flex:1;max-width:200px;padding:16px 14px;">
        <div class="ss-coupon-amount" style="font-size:28px;">5,000원</div>
        <div class="ss-coupon-condition" style="font-size:13px;">3만원 이상</div>
      </div>
      <div class="ss-coupon-card" style="flex:1;max-width:200px;padding:16px 14px;">
        <div class="ss-coupon-amount" style="font-size:28px;">10,000원</div>
        <div class="ss-coupon-condition" style="font-size:13px;">5만원 이상</div>
      </div>
      <div class="ss-coupon-card" style="flex:1;max-width:200px;padding:16px 14px;">
        <div class="ss-coupon-amount" style="font-size:28px;">20,000원</div>
        <div class="ss-coupon-condition" style="font-size:13px;">10만원 이상</div>
      </div>
    </div>
    <div style="font-family:var(--font-en);font-size:12px;color:var(--sub);margin-top:8px;">기간 한정 · 중복 사용 불가</div>
  </div>
</div>
</body>
</html>
