<!--=============================================================
  SECTION: Bundle Deals (구매 옵션)
  ORDER: 07
  REQUIRED: ✅ 필수
  BACKGROUND: white
  PURPOSE: 단품/2+1/세트 등 구매 옵션을 카드 형태로 제시.

  DATA REQUIRED:
  - {{#bundles}} : 2~4개 번들 옵션 배열
    각 항목: { image, name, desc, price_orig, price_live, discount, featured }
=============================================================-->
<div class="sec">
  <div class="sec-label tx-center">Bundle Deals</div>
  <div class="sec-title tx-center">라이브 시청자님을 위한<br>구매 옵션</div>
  <div class="bundle">
    {{#bundles}}
    <div class="bundle-card {{?featured}}featured{{/featured}}">
      <div class="bundle-img"><img src="{{image}}" alt=""></div>
      <div class="bundle-body">
        <div class="bundle-best">BEST</div>
        <div class="bundle-name">{{name}}</div>
        <div class="bundle-desc">{{desc}}</div>
        <div class="bundle-prices">
          <span class="bundle-price-original">{{price_orig}}</span>
          <span class="bundle-price-live">{{price_live}}</span>
          <span class="bundle-discount">{{discount}}</span>
        </div>
      </div>
    </div>
    {{/bundles}}
  </div>
</div>
