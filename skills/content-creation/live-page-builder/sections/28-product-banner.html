<!-- ============================================
     28. Product Banner — 제품 이미지 배경 + 텍스트 오버레이
     ============================================
     선택 섹션 | 배경: 이미지
     제품 사진을 배경으로 깔고 그 위에 텍스트/CTA를 배치하는 비주얼 배너.
     3가지 오버레이 스타일: dark / light / bottom-fade

     DATA REQUIRED:
     - {{product_image}} : 제품/라이프스타일 이미지 URL
     - {{banner_label}} : 영문 라벨 (예: "BEST SELLER", "NEW ARRIVAL")
     - {{banner_title}} : 메인 타이틀
     - {{banner_desc}} : 설명 텍스트 (선택)
     - {{banner_price_live}} : 라이브가 (선택)
     - {{banner_price_original}} : 정가 (선택)
     - {{banner_cta_text}} : CTA 버튼 텍스트 (선택)
     - {{overlay_style}} : dark / light / bottom-fade + top / center / bottom
     ============================================ -->

<!-- Style A: 다크 오버레이 + 중앙 텍스트 -->
<div class="prod-banner">
  <img class="prod-banner-img" src="{{product_image}}" alt="{{banner_title}}">
  <div class="prod-banner-overlay dark center">
    <div class="prod-banner-label">{{banner_label}}</div>
    <div class="prod-banner-title">{{banner_title}}</div>
    <div class="prod-banner-desc">{{banner_desc}}</div>
    <div class="prod-banner-price">
      <span class="prod-banner-price-live">{{banner_price_live}}</span>
      <span class="prod-banner-price-original">{{banner_price_original}}</span>
    </div>
    <div><a class="prod-banner-btn" href="#">{{banner_cta_text}}</a></div>
  </div>
</div>

<!-- Style B: 라이트 오버레이 + 상단 텍스트 -->
<div class="prod-banner">
  <img class="prod-banner-img" src="{{product_image}}" alt="{{banner_title}}">
  <div class="prod-banner-overlay light top">
    <div class="prod-banner-label">{{banner_label}}</div>
    <div class="prod-banner-title">{{banner_title}}</div>
    <div class="prod-banner-desc">{{banner_desc}}</div>
    <div><a class="prod-banner-btn" href="#">{{banner_cta_text}}</a></div>
  </div>
</div>

<!-- Style C: 하단 그라데이션 + 하단 텍스트 -->
<div class="prod-banner">
  <img class="prod-banner-img" src="{{product_image}}" alt="{{banner_title}}">
  <div class="prod-banner-overlay bottom-fade bottom">
    <div class="prod-banner-label">{{banner_label}}</div>
    <div class="prod-banner-title">{{banner_title}}</div>
    <div class="prod-banner-price">
      <span class="prod-banner-price-live">{{banner_price_live}}</span>
      <span class="prod-banner-price-original">{{banner_price_original}}</span>
    </div>
  </div>
</div>
