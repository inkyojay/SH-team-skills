<!--=============================================================
  SECTION: Live Hero (라이브 히어로)
  ORDER: 01
  REQUIRED: ✅ 필수
  BACKGROUND: palette gradient
  PURPOSE: 라이브 방송의 첫인상. 호스트 사진, 방송 제목, 메인 혜택.
  NOTE: JS/애니메이션 없음. 정적 LIVE 뱃지.

  DATA REQUIRED:
  - {{host_image}}        : 호스트 프로필 사진 URL (80×80, 원형)
  - {{live_title_html}}   : 방송 제목 (HTML, <br> 줄바꿈 가능)
  - {{live_benefit}}      : 메인 혜택 한 줄
  - {{live_sub}}          : 부가 설명
=============================================================-->
<div class="live-hero">
  <div class="live-badge">LIVE</div>
  <img class="live-hero-host" src="{{host_image}}" alt="호스트">
  <div class="live-hero-title">{{live_title_html}}</div>
  <div class="live-hero-benefit">{{live_benefit}}</div>
  <div class="live-hero-sub">{{live_sub}}</div>
</div>
