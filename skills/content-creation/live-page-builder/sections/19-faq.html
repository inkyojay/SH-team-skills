<!--=============================================================
  SECTION: FAQ (자주 묻는 질문)
  ORDER: 19
  REQUIRED: 🔶 선택
  BACKGROUND: white
  PURPOSE: 정적 Q&A 리스트. 아코디언 아님 — 모두 열린 상태.
  NOTE: JS 없음. 이미지 변환 시 모든 답변이 보여야 함.

  DATA REQUIRED:
  - {{#faqs}} : FAQ 배열 (4~6개 권장)
    각 항목: { question, answer_html }
=============================================================-->
<div class="sec">
  <div class="sec-label tx-center">FAQ</div>
  <div class="sec-title tx-center">자주 묻는 질문</div>
  <div class="faq">
    {{#faqs}}
    <div class="faq-item">
      <div class="faq-q">{{question}}</div>
      <div class="faq-a">
        <div class="faq-a-inner">{{answer_html}}</div>
      </div>
    </div>
    {{/faqs}}
  </div>
</div>
