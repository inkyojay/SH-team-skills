<!--=============================================================
  SECTION: Countdown (카운트다운)
  ORDER: 04
  REQUIRED: ✅ 필수
  BACKGROUND: warm
  PURPOSE: 정적 카운트다운으로 시간 한정감을 전달.
  NOTE: 모든 애니메이션 제거. 정적 표시만.

  DATA REQUIRED:
  - {{countdown_title}}  : 제목
  - {{countdown_hours}}  : 시
  - {{countdown_mins}}   : 분
  - {{countdown_secs}}   : 초
  - {{countdown_note}}   : 하단 안내
=============================================================-->
<div class="countdown">
  <div class="countdown-label">TIME DEAL</div>
  <div class="countdown-title">{{countdown_title}}</div>
  <div class="countdown-timer">
    <div class="countdown-unit">
      <div class="countdown-num">{{countdown_hours}}</div>
      <div class="countdown-txt">HOURS</div>
    </div>
    <div class="countdown-unit">
      <div class="countdown-num">{{countdown_mins}}</div>
      <div class="countdown-txt">MIN</div>
    </div>
    <div class="countdown-unit">
      <div class="countdown-num">{{countdown_secs}}</div>
      <div class="countdown-txt">SEC</div>
    </div>
  </div>
  <div class="countdown-note">{{countdown_note}}</div>
</div>
