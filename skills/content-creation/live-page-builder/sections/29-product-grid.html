<!-- ============================================
     29. Product Grid — 추천 상품 그리드
     ============================================
     선택 섹션 | 배경: white
     2열 제품 카드 그리드. 이미지 + 상품명 + 가격/할인율 표시.
     라이브에서 함께 구매 가능한 추천 상품을 보여줌.

     DATA REQUIRED:
     - {{section_title}} : 섹션 제목 (예: "함께 구매하면 좋은 제품")
     - {{products[]}} : 상품 배열
       - {{product_image}} : 상품 이미지 URL
       - {{product_name}} : 상품명
       - {{discount_rate}} : 할인율 (예: "32%")
       - {{live_price}} : 라이브가
       - {{original_price}} : 정가
       - {{badge}} : 배지 텍스트 (선택, 예: "LIVE ONLY")
     ============================================ -->

<div class="sec">
  <div class="sec-label tx-center">Recommendations</div>
  <div class="sec-title tx-center">{{section_title}}</div>
  <div class="prod-grid">
    <div class="prod-card">
      <div class="prod-card-img"><img src="{{product_image_1}}" alt="{{product_name_1}}"></div>
      <div class="prod-card-body">
        <div class="prod-card-name">{{product_name_1}}</div>
        <div class="prod-card-prices">
          <span class="prod-card-discount">{{discount_rate_1}}</span>
          <span class="prod-card-price">{{live_price_1}}</span>
        </div>
        <div class="prod-card-original">{{original_price_1}}</div>
        <span class="prod-card-badge">{{badge_1}}</span>
      </div>
    </div>
    <div class="prod-card">
      <div class="prod-card-img"><img src="{{product_image_2}}" alt="{{product_name_2}}"></div>
      <div class="prod-card-body">
        <div class="prod-card-name">{{product_name_2}}</div>
        <div class="prod-card-prices">
          <span class="prod-card-discount">{{discount_rate_2}}</span>
          <span class="prod-card-price">{{live_price_2}}</span>
        </div>
        <div class="prod-card-original">{{original_price_2}}</div>
        <span class="prod-card-badge">{{badge_2}}</span>
      </div>
    </div>
    <!-- 필요에 따라 카드 추가 -->
  </div>
</div>
