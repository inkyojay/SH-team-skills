<!-- ============================================
     31. Channel Follow — 채널 팔로우 CTA
     ============================================
     선택 섹션 | 배경: palette highlight
     카카오톡 채널, 인스타그램 등 SNS 채널 팔로우를 유도하는 섹션.

     DATA REQUIRED:
     - {{channel_name}} : 채널명 (예: "카카오톡 채널")
     - {{channel_desc}} : 팔로우 유도 문구
     - {{channel_cta}} : CTA 버튼 텍스트 (예: "채널 추가하기")
     - {{channel_url}} : 채널 URL
     ============================================ -->

<div class="ch-follow">
  <div class="ch-follow-icon">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  </div>
  <div class="ch-follow-title">{{channel_name}} 팔로우하고<br>라이브 알림 받기</div>
  <div class="ch-follow-desc">{{channel_desc}}</div>
  <a class="ch-follow-btn" href="{{channel_url}}">{{channel_cta}}</a>
</div>
