<!--=============================================================
  SECTION: Coupon (전용 쿠폰)
  ORDER: 06

  BACKGROUND: warm
  PURPOSE: 라이브 전용 할인 쿠폰 강조 카드.

  DATA REQUIRED:
  - {{coupon_amount}}    : 할인 금액/율 (예: "5,000원")
  - {{coupon_label}}     : 쿠폰명 (예: "라이브 전용 할인 쿠폰")

  - {{coupon_code}}      : 쿠폰 코드 (선택, 예: "LIVE2026")
=============================================================-->
<div class="sec warm">
  <div class="sec-label tx-center">Coupon</div>
  <div class="sec-title tx-center">라이브 시청자 전용 쿠폰</div>
  <div class="coupon-card">
    <div class="coupon-amount">{{coupon_amount}}</div>
    <div class="coupon-label">{{coupon_label}}</div>
