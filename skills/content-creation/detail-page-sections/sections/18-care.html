<!--=============================================================
  SECTION: Care Guide (세탁/관리)
  ORDER: 18
  REQUIRED: ✅ 필수
  BACKGROUND: white
  PURPOSE: 제품의 올바른 관리법을 간결한 카드 그리드로 안내.

  DESIGN NOTES:
  - "세탁방법" 헤딩 중앙 정렬, 하단 구분선
  - 2열 카드 그리드, 둥근 모서리, 연한 배경
  - 각 카드: 제목(볼드) + 설명(서브컬러)
  - 아이콘 없이 텍스트만으로 깔끔하게 구성

  DATA REQUIRED:
  - {{#care_items}} : 6개 관리 항목 배열
    각 항목: { title: "30°C 세탁 가능", desc_html: "물 온도 30°C<br>울코스 세탁 권장" }
=============================================================-->
<div class="sec v">
  <div class="wash-label">세탁방법</div>

  <div class="wash-grid">
    {{#care_items}}
    <div class="wash-card">
      <strong>{{title}}</strong>
      <span>{{desc_html}}</span>
    </div>
    {{/care_items}}
  </div>
</div>
