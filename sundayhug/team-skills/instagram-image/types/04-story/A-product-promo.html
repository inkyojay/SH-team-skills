<!--=============================================================
  TYPE: 스토리 (Story)
  VARIATION: A — Product Promo
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 스토리 — 제품 프로모션 + 스와이프 CTA
  IMAGE SPEC: 1080 × 1152px (상단 60%)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스토리 - A Product Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ig-frame" data-type="story">
  <!-- Top: Product image (60%) -->
  <div style="position:absolute;top:0;left:0;right:0;height:60%;overflow:hidden;">
    <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
    <!-- Top brand label -->
    <div style="position:absolute;top:48px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center;">
      <span class="ig-label" style="color:rgba(255,255,255,.8);">SUNDAY HUG</span>
      <span class="ig-badge" style="font-size:18px;padding:8px 20px;">BEST</span>
    </div>
  </div>

  <!-- Bottom: Info (40%) -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:var(--palette-gradient);padding:60px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <div style="font-size:40px;font-weight:700;color:var(--dark);margin-bottom:12px;">실키밤부 슬리핑백</div>
    <div style="font-size:26px;color:var(--body);margin-bottom:32px;">실크처럼 부드러운 프리미엄 밤부 원단</div>

    <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:8px;">
      <span class="ig-discount" style="font-size:52px;">52%</span>
      <span class="ig-price" style="font-size:48px;">29,900원</span>
    </div>
    <div class="ig-price-orig" style="margin-bottom:48px;">62,000원</div>

    <!-- Swipe up CTA -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;border-left:3px solid var(--accent);border-top:3px solid var(--accent);transform:rotate(45deg);"></div>
      <span style="font-size:22px;font-weight:600;color:var(--accent);letter-spacing:.1em;">위로 스와이프</span>
    </div>
  </div>
</div>
</body>
</html>
