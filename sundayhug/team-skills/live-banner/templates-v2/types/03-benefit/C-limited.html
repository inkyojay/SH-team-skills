<!--=============================================================
  TYPE: 혜택 배너 (Benefit Banner)
  VARIATION: C — Limited
  DIMENSIONS: 720 × 360px (2:1)
  PURPOSE: 라이브 혜택 안내 — 한정특가
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>혜택 배너 - C Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="benefit">
  <div style="display:flex;width:100%;height:100%;background:var(--bg-warm);">
    <div style="width:8px;background:var(--accent);flex-shrink:0;"></div>
    <div style="flex:0 0 auto;display:flex;align-items:center;padding:0 36px;">
      <span class="nlb-badge" style="font-size:16px;padding:12px 24px;">한정특가</span>
    </div>
    <div style="flex:1;display:flex;align-items:center;padding:0 24px;">
      <div>
        <div class="nlb-product-name" style="font-size:28px;margin-bottom:4px;">실키밤부 슬리핑백</div>
        <div class="nlb-product-desc" style="font-size:18px;">프리미엄 밤부 원단 슬리핑백</div>
      </div>
    </div>
    <div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 48px 0 24px;">
      <div class="nlb-product-prices">
        <span class="nlb-product-discount" style="font-size:32px;">52%</span>
        <span class="nlb-product-price" style="font-size:32px;">29,900원</span>
      </div>
      <span class="nlb-product-orig" style="margin-top:4px;">62,000원</span>
    </div>
  </div>
</div>
</body>
</html>
