<!--=============================================================
  TYPE: 혜택 배너 (Benefit Banner)
  VARIATION: A — Coupon
  DIMENSIONS: 720 × 360px (2:1)
  PURPOSE: 라이브 혜택 안내 — 쿠폰
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>혜택 배너 - A Coupon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="benefit">
  <div style="display:flex;width:100%;height:100%;background:var(--palette-gradient);">
    <div style="flex:1;padding:40px 48px;display:flex;flex-direction:column;justify-content:center;">
      <span class="nlb-label" style="font-size:14px;margin-bottom:12px;">LIVE COUPON</span>
      <div class="nlb-title" style="font-size:32px;margin-bottom:8px;">라이브 전용 쿠폰</div>
      <div class="nlb-subtitle" style="font-size:20px;">방송 중 다운로드 가능</div>
      <div class="nlb-brand-bar" style="margin-top:20px;">
        <span class="nlb-brand-logo" style="color:var(--accent);font-size:20px;">Sunday Hug</span>
      </div>
    </div>
    <div style="flex:0 0 300px;display:flex;align-items:center;justify-content:center;padding:40px;">
      <div class="nlb-benefit-card" style="width:100%;padding:28px 24px;">
        <div style="font-family:var(--font-en);font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--accent);margin-bottom:8px;">LIVE ONLY</div>
        <div class="nlb-benefit-amount" style="font-size:44px;">15,000원</div>
        <div style="width:60%;height:1px;background:var(--line);margin:12px auto;"></div>
        <div class="nlb-benefit-label" style="font-size:15px;">5만원 이상 구매 시</div>
        <div style="font-size:13px;color:var(--sub);margin-top:6px;">라이브 방송 중 한정</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
