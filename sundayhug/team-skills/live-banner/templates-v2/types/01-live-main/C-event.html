<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>라이브 메인 - C Event</title>

<body style="margin:0;padding:0;background:#eee;">
<div class="nlb-frame" data-type="main">

      <span style="font-family:var(--font-body);font-size:36px;font-weight:700;color:var(--dark);">할인</span>

    <div style="margin-top:16px;font-family:var(--font-en);font-size:22px;font-weight:500;letter-spacing:.08em;color:var(--accent-dark);">2026.03.18 — 03.20</div>
