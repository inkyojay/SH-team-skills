<!--=============================================================
  SECTION: Final CTA (최종 구매 유도)
  ORDER: 24
  REQUIRED: ✅ 필수
  BACKGROUND: dark2
  PURPOSE: 페이지 마지막 구매 전환 포인트.
           신뢰 포인트 + 리뷰 수치를 다시 한 번 요약하고
           큰 구매 버튼으로 최종 전환을 유도한다.

  DATA REQUIRED:
  - {{final_cta_title_html}} : 제목 (HTML)
  - {{final_cta_trust}}      : 신뢰 포인트 요약 (HTML)
  - {{final_cta_stats}}      : 리뷰 통계 한 줄
  - {{purchase_url}}         : 구매 링크
=============================================================-->
<div class="final-cta v">
  <div class="final-cta-label">{{brand_tag}}</div>
  <h2>{{final_cta_title_html}}</h2>
  <p>{{final_cta_trust}}</p>
  <a href="{{purchase_url}}">지금 구매하기</a>
  <div class="final-cta-note">{{final_cta_stats}}</div>
</div>
