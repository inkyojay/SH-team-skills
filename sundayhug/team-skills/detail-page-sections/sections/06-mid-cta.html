<!--=============================================================
  SECTION: Mid CTA (중간 구매 유도)
  ORDER: 06 (Key Features 바로 뒤)
  REQUIRED: ✅ 필수
  BACKGROUND: gradient (warm → accent-light)
  PURPOSE: Key Features를 읽고 관심이 생긴 고객이 바로 구매할 수 있도록
           페이지 중간에 첫 번째 구매 버튼을 배치한다.
           이탈을 줄이는 핵심 전환 포인트.

  DESIGN NOTES:
  - 그라데이션 배경으로 시각적으로 구분
  - 간결한 메시지 + 구매 버튼 1개
  - Trust 포인트 한 줄 (KC인증/국내생산/무형광)

  DATA REQUIRED:
  - {{mid_cta_title}}    : 제목 (예: "우리 아기 꿀잠, 지금 시작하세요")
  - {{mid_cta_sub}}      : 부가 정보 (예: "KC인증 완료 / 100% 국내생산 / 무형광")
  - {{purchase_url}}     : 구매 링크 URL
=============================================================-->
<div class="mid-cta v">
  <div class="mid-cta-title">{{mid_cta_title}}</div>
  <div class="mid-cta-sub">{{mid_cta_sub}}</div>
  <a href="{{purchase_url}}">구매하기</a>
</div>
