<!--=============================================================
  SECTION: Key Features (해결책 제시)
  ORDER: 05
  REQUIRED: ✅ 필수
  BACKGROUND: white
  PURPOSE: Safety(문제)에 대한 해결책으로 제품을 제시한다.
           핵심 USP를 4개 카드로 요약하고, 상단에 핵심 한 줄 메시지.
           "그래서 만들었습니다" 형태의 스토리텔링.

  DESIGN NOTES:
  - 상단: 라이프스타일 이미지 1장
  - 하단: 2x2 그리드 카드 (sub-2col)
  - USP 텍스트에 .hl 클래스로 accent 강조

  DATA REQUIRED:
  - {{features_title_html}} : 제목 (예: "그래서 만들었습니다,<br>꿀잠 슬리핑백")
  - {{features_usp_html}}   : USP 설명문 (accent 강조 포함)
  - {{features_image}}      : 라이프스타일 이미지 URL
  - {{#feature_cards}}      : 4개 카드 배열
    각 카드: { title: "입는 이불 구조", desc: "설명..." }
=============================================================-->
<div class="sec v">
  <div class="sec-label">Key Features</div>
  <div class="sec-title">{{features_title_html}}</div>
  <div class="sec-desc">{{features_usp_html}}</div>
  <div class="fb-img" style="margin-bottom:8px;"><img src="{{features_image}}" alt="키 피처"></div>

  <div class="sub-2col" style="margin-top:28px;">
    {{#feature_cards}}
    <div class="sub-2col-item">
      <h4>{{title}}</h4>
      <p>{{desc}}</p>
    </div>
    {{/feature_cards}}
  </div>
</div>
