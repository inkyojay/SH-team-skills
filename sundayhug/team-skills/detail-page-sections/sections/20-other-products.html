<!--=============================================================
  SECTION: Other Products (크로스셀)
  ORDER: 20
  REQUIRED: 🔶 선택 — 관련 제품이 있을 때
  BACKGROUND: white
  PURPOSE: 같은 카테고리/시리즈의 다른 제품으로 자연스럽게 유도.

  DATA REQUIRED:
  - {{#other_products}} : 제품 배열 (3개 권장)
    각 항목: { url, image, name }
=============================================================-->
<div class="sec v">
  <div class="sec-label tx-center">More Items</div>
  <div class="sec-title tx-center">다른 제품도 확인해보세요</div>
  <div class="other v">
    {{#other_products}}
    <a href="{{url}}">
      <div class="other-img"><img src="{{image}}" alt="{{name}}"></div>
      <p>{{name}}</p>
    </a>
    {{/other_products}}
  </div>
</div>
