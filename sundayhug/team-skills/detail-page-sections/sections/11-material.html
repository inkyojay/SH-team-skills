<!--=============================================================
  SECTION: Material (소재 가이드)
  ORDER: 11
  REQUIRED: 🔶 선택 — 소재 비교가 중요한 제품에 사용
  BACKGROUND: white
  PURPOSE: 동일 제품의 소재 변형을 비교하여 고객이 자신에게 맞는
           소재를 선택할 수 있게 돕는다. 현재 제품 소재의 장점도 강조.

  DESIGN NOTES:
  - mat-tbl: 소재 비교 테이블 (3열: 소재명/특징/구성)
  - link-btn: 다른 소재 제품 링크
  - note-card: 현재 소재의 상세 특성 카드

  DATA REQUIRED:
  - {{material_image}}     : 소재 비교 이미지
  - {{#materials}}         : 소재 배열
    각 항목: { name, feature, feature_sub, composition }
  - {{other_material_url}} : 다른 소재 제품 URL
  - {{current_material}}   : 현재 소재명
  - {{#material_notes}}    : 소재 특성 배열
    각 항목: { label_en, desc_html }
=============================================================-->
<div class="sec v">
  <div class="sec-label">Material Guide</div>
  <div class="sec-title">소재별 쇼핑 가이드</div>
  <div class="sec-desc">계절과 환경에 맞는 소재를 선택해보세요.</div>

  <div class="fb-img"><img src="{{material_image}}" alt="소재 가이드"></div>

  <table class="mat-tbl v">
    <thead><tr><th></th><th>특징</th><th>소재구성</th></tr></thead>
    <tbody>
      {{#materials}}
      <tr>
        <td>{{name}}</td>
        <td>{{feature}}<span class="sm">{{feature_sub}}</span></td>
        <td>{{composition}}</td>
      </tr>
      {{/materials}}
    </tbody>
  </table>

  <a href="{{other_material_url}}" class="link-btn">다른 소재 제품 보러가기 &rarr;</a>

  <div class="note-card v">
    <div class="note-hd">
      <h3>{{current_material}}</h3>
      <span>MATERIAL NOTE</span>
    </div>
    {{#material_notes}}
    <div class="note-item">
      <strong>{{label_en}}</strong>
      <p>{{desc_html}}</p>
    </div>
    {{/material_notes}}
  </div>
</div>
