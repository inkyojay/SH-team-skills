<!--=============================================================
  TYPE: 프로모션 배너 (Promotion Banner)
  VARIATION: A — Discount (할인 강조)
  DIMENSIONS: 720 × 240px
  PURPOSE: 스토어 프로모션 영역 — 할인율/가격 강조 스트립
  IMAGE SPEC: 제품 썸네일 포함
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로모션 배너 - A Discount</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="ss-frame" data-type="promo">
  <div style="display:flex;width:100%;height:100%;background:var(--bg-warm);">
    <!-- Left accent bar -->
    <div style="width:8px;background:var(--accent);flex-shrink:0;"></div>
    <!-- Content -->
    <div style="flex:1;display:flex;align-items:center;padding:0 48px;gap:40px;">
      <div style="flex-shrink:0;">
        <span class="ss-discount" style="font-size:72px;line-height:1;">52%</span>
      </div>
      <div style="flex:1;">
        <div style="font-size:28px;font-weight:700;color:var(--dark);line-height:1.3;">실키밤부 슬리핑백</div>
        <div style="font-size:18px;color:var(--body);margin-top:4px;">프리미엄 밤부 원단 슬리핑백</div>
      </div>
      <div style="flex-shrink:0;text-align:right;">
        <div class="ss-price" style="font-size:40px;">29,900원</div>
        <div class="ss-price-orig" style="font-size:18px;">62,000원</div>
      </div>
      <div style="flex-shrink:0;width:180px;height:180px;border-radius:12px;overflow:hidden;margin-left:16px;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg" alt="실키밤부 슬리핑백" style="width:100%;height:100%;object-fit:cover;">
      </div>
    </div>
  </div>
</div>
</body>
</html>
