<!--=============================================================
  TYPE: 아이템리스트 알림톡 (Alimtalk Item List)
  VARIATION: A — Order Summary
  DIMENSIONS: 800 × auto (content-driven)
  PURPOSE: 주문 상세 아이템 리스트
  IMAGE SPEC: 아이템 썸네일: 120 × 120px 각 (정사각, cover 적용)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>알림톡 아이템리스트 — 주문 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">
<div class="kakao-frame" data-type="alimtalk">
  <div class="km-itemlist">
    <div class="km-itemlist-header">
      <div style="width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;">
        <span style="font-family:var(--font-display);font-size:18px;font-weight:300;font-style:italic;color:#fff;">S</span>
      </div>
      <div style="font-size:18px;font-weight:700;color:var(--dark);">Sunday Hug</div>
    </div>
    <div class="km-itemlist-title">주문 상세 내역</div>
    <div class="km-itemlist-item">
      <div class="km-itemlist-item-img"><img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백"></div>
      <div class="km-itemlist-item-body">
        <div class="km-itemlist-item-name">실키밤부 슬리핑백</div>
        <div class="km-itemlist-item-desc">화이트크림 · M</div>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span class="km-itemlist-item-price">29,900원</span>
          <span class="km-itemlist-item-qty">× 1</span>
        </div>
      </div>
    </div>
    <div class="km-itemlist-item">
      <div class="km-itemlist-item-img"><img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="밤부 스와들"></div>
      <div class="km-itemlist-item-body">
        <div class="km-itemlist-item-name">밤부 스와들</div>
        <div class="km-itemlist-item-desc">데일리크림</div>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span class="km-itemlist-item-price">24,900원</span>
          <span class="km-itemlist-item-qty">× 1</span>
        </div>
      </div>
    </div>
    <div class="km-itemlist-summary">
      <div class="km-itemlist-summary-row"><span>상품 금액</span><span>54,800원</span></div>
      <div class="km-itemlist-summary-row"><span>배송비</span><span>무료</span></div>
      <div class="km-itemlist-summary-row"><span>할인</span><span style="color:var(--danger);">-5,000원</span></div>
      <div class="km-itemlist-summary-total"><span>총 결제금액</span><span>49,800원</span></div>
    </div>
    <a class="km-alimtalk-btn" href="#">주문 상세 보기</a>
  </div>
</div>
</body>
</html>
