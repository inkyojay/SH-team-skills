<!--=============================================================
  TYPE: 캐러셀 피드형 (Carousel Feed)
  VARIATION: A — Product · 커버 + 제품 카드
  DIMENSIONS: 800 × 600px per card (4:3)
  PURPOSE: 커버 카드로 프로모션 소개 → 개별 제품 카드
  IMAGE SPEC: 커버 800×600px · 제품 800×600px (cover 적용)
=============================================================-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캐러셀 피드 - A Product</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<body style="margin:0;padding:0;background:#eee;">

<!-- Card 1: Cover -->
<div class="km-card" data-type="feed">
  <img class="km-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="커버">
  <div class="km-cover-text overlay">
    <div class="km-cover-tag">SPRING PROMOTION</div>
    <div class="km-cover-title">봄 맞이 슬리핑백<br>최대 52% 특가</div>
    <div class="km-cover-date">2026.03.13(목) — 03.20(목)</div>
  </div>
</div>

<!-- Card 2: Product -->
<div class="km-card" data-type="feed" style="margin-top:20px;">
  <img class="km-hero-img" src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="실키밤부 슬리핑백">
  <div class="km-info-bar">
    <div class="km-info-bar-left">
      <div class="km-info-bar-name">실키밤부 슬리핑백</div>
      <div class="km-info-bar-desc">기간한정 특가 · 3.20까지</div>
    </div>
    <div class="km-info-bar-right">
      <div style="display:flex;align-items:baseline;gap:8px;">
        <span class="km-info-bar-discount">52%</span>
        <span class="km-info-bar-price">29,900원</span>
      </div>
      <div class="km-info-bar-orig">62,000원</div>
    </div>
  </div>
</div>

</body>
</html>
