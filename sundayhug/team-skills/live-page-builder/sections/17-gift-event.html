<!--=============================================================
  SECTION: Gift Event (사은품 안내)
  ORDER: 17
  REQUIRED: 🔶 선택
  BACKGROUND: white
  PURPOSE: 구매 시 사은품 안내.

  DATA REQUIRED:
  - {{gift_title_html}} : 이벤트 제목
  - {{gift_desc}}       : 설명
  - {{#gifts}}          : 사은품 배열
  - {{gift_note}}       : 안내사항
=============================================================-->
<div class="sec">
  <div class="sec-label tx-center">Gift for You</div>
  <div class="sec-title tx-center">라이브 시청자님을 위한<br>특별 선물</div>
  <div class="event">
    <div class="event-badge">GIFT</div>
    <div class="event-body">
      <div class="event-title">{{gift_title_html}}</div>
      <div class="event-desc">{{gift_desc}}</div>
      <div class="event-gifts">
        {{#gifts}}
        <div class="event-gift">
          <div class="event-gift-img"><img src="{{image}}" alt=""></div>
          <div class="event-gift-info">
            <h5>{{name}}</h5>
            <p>{{condition}}</p>
          </div>
        </div>
        {{/gifts}}
      </div>
      <div class="event-note">{{gift_note}}</div>
    </div>
  </div>
</div>
