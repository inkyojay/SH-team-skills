<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비포/애프터 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비포/애프터 (Before-After)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 사용 전후 비교로 제품 효과 시각화
  IMAGE SPEC: 없음 (텍스트 기반 좌우 분할)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-split" style="width:100%;height:100%;">

    <!-- LEFT: Before -->
    <div style="width:50%;height:100%;background:#F0EDED;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 50px;text-align:center;">
      <span class="ma-label" style="font-size:26px;letter-spacing:.25em;color:#999;margin-bottom:32px;">BEFORE</span>
      <div style="font-size:88px;margin-bottom:36px;">&#x1F61F;</div>
      <div class="ma-title" style="font-size:44px;color:#666;line-height:1.35;margin-bottom:32px;">이불 걷어차는<br>아이</div>
      <div style="display:flex;flex-direction:column;gap:20px;width:100%;">
        <div style="font-size:30px;color:#888;line-height:1.5;font-weight:400;">&#x274C; 새벽에 추워서 깸</div>
        <div style="font-size:30px;color:#888;line-height:1.5;font-weight:400;">&#x274C; 엄마도 잠 못 잠</div>
        <div style="font-size:30px;color:#888;line-height:1.5;font-weight:400;">&#x274C; 감기 걱정</div>
      </div>
    </div>

    <!-- RIGHT: After -->
    <div style="width:50%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 50px;text-align:center;">
      <span class="ma-label" style="font-size:26px;letter-spacing:.25em;margin-bottom:32px;">AFTER</span>
      <div style="font-size:88px;margin-bottom:36px;">&#x1F60A;</div>
      <div class="ma-title" style="font-size:44px;line-height:1.35;margin-bottom:32px;">숙면하는<br>아이</div>
      <div style="display:flex;flex-direction:column;gap:20px;width:100%;">
        <div style="font-size:30px;color:var(--dark);line-height:1.5;font-weight:400;">&#x2705; 아침까지 푹 잠</div>
        <div style="font-size:30px;color:var(--dark);line-height:1.5;font-weight:400;">&#x2705; 온 가족 숙면</div>
        <div style="font-size:30px;color:var(--dark);line-height:1.5;font-weight:400;">&#x2705; 사계절 걱정 없음</div>
      </div>
    </div>

  </div>

  <!-- Bottom Strip -->
  <div class="ma-strip">
    <span style="font-family:var(--font-body);font-size:28px;font-weight:500;color:#fff;">실키밤부 슬리핑백</span>
    <span class="ma-brand-logo" style="color:rgba(255,255,255,.8);">Sunday Hug</span>
  </div>
</div>

</body>
</html>
