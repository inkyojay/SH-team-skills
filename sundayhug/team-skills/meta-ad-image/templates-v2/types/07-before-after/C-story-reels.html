<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 비포/애프터 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 비포/애프터 (Before-After)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 세로형 비포/애프터 + 제품 솔루션
  IMAGE SPEC: 제품 이미지 320×320 (중단 패널)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- TOP: Before (~30%) -->
    <div style="width:100%;height:30%;background:#3A3535;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;text-align:center;">
      <span class="ma-label" style="font-size:26px;letter-spacing:.25em;color:rgba(255,255,255,.5);margin-bottom:20px;">BEFORE</span>
      <div style="font-size:72px;margin-bottom:24px;">&#x1F61F;</div>
      <div class="ma-title" style="font-size:46px;color:#fff;line-height:1.35;margin-bottom:16px;">이불 걷어차는 아이</div>
      <div class="ma-subtitle" style="font-size:28px;color:rgba(255,255,255,.5);line-height:1.6;">새벽에 깨서 이불 덮어주기 반복<br>엄마도 아이도 잠 못 자는 밤</div>
    </div>

    <!-- Arrow Divider -->
    <div class="ma-arrow" style="width:100%;height:5%;background:linear-gradient(to bottom,#3A3535 0%,var(--bg-warm) 100%);font-size:56px;color:var(--accent);">&#x2193;</div>

    <!-- MIDDLE: After (~35%) -->
    <div style="width:100%;height:35%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 80px;text-align:center;">
      <span class="ma-label" style="font-size:26px;letter-spacing:.25em;margin-bottom:20px;">AFTER</span>
      <div style="font-size:72px;margin-bottom:20px;">&#x1F60A;</div>
      <div class="ma-title" style="font-size:46px;line-height:1.35;margin-bottom:16px;">아침까지 푹 자는 아이</div>
      <div class="ma-subtitle" style="font-size:28px;line-height:1.6;margin-bottom:28px;">실키밤부 슬리핑백으로<br>온 가족 숙면</div>

      <!-- Product Image -->
      <div style="width:320px;height:320px;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.1);">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>
    </div>

    <!-- Product Info + CTA (~30% — safezone) -->
    <div style="width:100%;height:30%;background:var(--bg-warm);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 80px;text-align:center;">
      <div style="font-family:var(--font-body);font-size:34px;font-weight:500;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
      <div class="ma-product-info" style="justify-content:center;margin-bottom:32px;">
        <span class="ma-price" style="font-size:48px;">49,900&#xFFE6;</span>
      </div>
      <div class="ma-cta-button" style="font-size:28px;padding:22px 60px;">지금 구매하기</div>
      <div class="ma-brand-bar" style="justify-content:center;margin-top:24px;">
        <span class="ma-brand-logo" style="font-size:24px;color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
