<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 긴급성/희소성 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 긴급성/희소성 (Urgency-Scarcity)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 제품 이미지 + 카운트다운 결합
  IMAGE SPEC: 제품 라이프스타일 이미지 1080×540 (상단 40%)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- Top 40%: Product Image with Dark Overlay -->
    <div style="width:100%;height:40%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
           alt="실키밤부 슬리핑백"
           class="ma-hero-img">
      <!-- Dark overlay -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(44,44,58,.55);z-index:1;"></div>
      <!-- ENDING SOON badge -->
      <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:22px;padding:14px 36px;background:var(--danger);color:#fff;">ENDING SOON</span>
      </div>
    </div>

    <!-- Bottom 60%: Countdown + Info -->
    <div style="width:100%;height:60%;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 80px;text-align:center;gap:24px;">

      <!-- Countdown -->
      <div class="ma-countdown">
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">02</div>
          <div class="ma-countdown-label">일</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">08</div>
          <div class="ma-countdown-label">시간</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">45</div>
          <div class="ma-countdown-label">분</div>
        </div>
        <div class="ma-countdown-unit">
          <div class="ma-countdown-number">30</div>
          <div class="ma-countdown-label">초</div>
        </div>
      </div>

      <!-- Product Name -->
      <div class="ma-title" style="font-size:40px;color:#fff;">실키밤부 슬리핑백</div>

      <!-- Subtitle -->
      <div class="ma-subtitle" style="font-size:28px;color:rgba(255,255,255,.7);">52% 할인이 곧 종료됩니다</div>

      <!-- Price -->
      <div style="display:flex;align-items:baseline;gap:16px;">
        <span class="ma-price-orig" style="font-size:28px;color:rgba(255,255,255,.4);">62,000원</span>
        <span class="ma-price" style="font-size:52px;color:#fff;">29,900원</span>
      </div>

      <!-- Remaining Quantity -->
      <div style="font-family:var(--font-body);font-size:28px;font-weight:500;color:var(--danger);">남은 수량 127개</div>

      <!-- CTA -->
      <span class="ma-cta-button" style="font-size:28px;padding:24px 64px;background:var(--accent);color:#2C2C3A;font-weight:700;margin-top:4px;">지금 구매하기</span>

      <!-- Brand -->
      <div class="ma-brand-bar" style="justify-content:center;margin-top:4px;">
        <span class="ma-brand-logo" style="color:rgba(255,255,255,.5);">Sunday Hug</span>
      </div>

    </div>

  </div>
</div>

</body>
</html>
