<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 주문 vs 실물 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 주문 vs 실물 (Order vs Reality — V08)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — 상하 분할 기대/현실 비교
  IMAGE SPEC: 상하 제품 이미지 각 1080×540 (또는 플레이스홀더)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;position:relative;">

    <!-- Title -->
    <div style="background:#000;padding:36px 48px;text-align:center;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:44px;font-weight:900;color:#FFF;">주문 vs 실물 비교</span>
    </div>

    <!-- TOP: What I Ordered -->
    <div style="flex:1;background:#F8F4F0;display:flex;position:relative;border-bottom:6px solid #000;">
      <!-- Label -->
      <div style="position:absolute;top:24px;left:24px;background:#FF6B6B;padding:10px 28px;border-radius:8px;z-index:2;transform:rotate(-3deg);">
        <span style="font-family:'DM Sans',sans-serif;font-size:24px;font-weight:900;color:#FFF;">WHAT I ORDERED</span>
      </div>
      <!-- Product area -->
      <div style="width:100%;display:flex;align-items:center;justify-content:center;">
        <div style="width:360px;height:360px;background:#EDE7DD;border-radius:24px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:140px;">🧸</span>
        </div>
      </div>
    </div>

    <!-- BOTTOM: What I Got -->
    <div style="flex:1;background:#F0FAF0;display:flex;position:relative;">
      <!-- Label -->
      <div style="position:absolute;top:24px;left:24px;background:#4ECDC4;padding:10px 28px;border-radius:8px;z-index:2;transform:rotate(-3deg);">
        <span style="font-family:'DM Sans',sans-serif;font-size:24px;font-weight:900;color:#FFF;">WHAT I GOT</span>
      </div>
      <!-- Product area -->
      <div style="width:100%;display:flex;align-items:center;justify-content:center;">
        <div style="width:360px;height:360px;background:#E0F5E0;border-radius:24px;display:flex;align-items:center;justify-content:center;">
          <span style="font-size:140px;">🧸</span>
        </div>
      </div>
      <!-- Same badge -->
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;">
        <div style="background:#4ECDC4;padding:16px 40px;border-radius:100px;box-shadow:0 8px 32px rgba(78,205,196,.4);">
          <span style="font-family:'Noto Sans KR',sans-serif;font-size:32px;font-weight:900;color:#FFF;">똑 같 음 ✓</span>
        </div>
      </div>
    </div>

    <!-- Bottom banner -->
    <div style="background:#000;padding:32px 48px;display:flex;align-items:center;justify-content:center;gap:20px;">
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:900;color:#4ECDC4;">기대 = 현실</span>
      <span style="font-family:'Noto Sans KR',sans-serif;font-size:24px;color:rgba(255,255,255,.4);">|</span>
      <span class="ma-brand-logo" style="font-size:24px;color:rgba(255,255,255,.5);">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
