<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 문제-해결 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 문제-해결 (Problem-Solution)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 수면 문제 공감 → 슬리핑백 솔루션 제안
  IMAGE SPEC: 제품 라이프스타일 이미지 540×1080 (우측 패널)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-split" style="width:100%;height:100%;">

    <!-- LEFT: Problem -->
    <div style="width:50%;height:100%;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;text-align:center;">
      <div style="font-size:80px;margin-bottom:40px;">😰</div>
      <div class="ma-title" style="color:#fff;font-size:52px;line-height:1.35;margin-bottom:24px;">밤새 뒤척이는<br>아이</div>
      <div class="ma-subtitle" style="color:rgba(255,255,255,.55);font-size:28px;line-height:1.6;">얇은 이불은 걷어차고,<br>두꺼운 이불은 답답해하고...</div>
    </div>

    <!-- RIGHT: Solution -->
    <div style="width:50%;height:100%;position:relative;overflow:hidden;background:var(--palette-gradient);">
      <!-- Product image -->
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
           alt="실키밤부 슬리핑백"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.85;">
      <!-- Overlay gradient -->
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to top, rgba(250,247,244,.95) 0%, rgba(250,247,244,.6) 40%, transparent 70%);z-index:1;"></div>
      <!-- Content -->
      <div style="position:absolute;bottom:0;left:0;right:0;padding:60px 48px;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;">
        <span class="ma-badge" style="font-size:18px;padding:10px 24px;margin-bottom:20px;">SOLUTION</span>
        <div style="font-family:var(--font-display);font-size:40px;font-weight:300;font-style:italic;color:var(--dark);margin-bottom:12px;">숙면의 시작</div>
        <div class="ma-title" style="font-size:36px;color:var(--dark);margin-bottom:24px;">실키밤부 슬리핑백</div>
        <div class="ma-brand-bar" style="justify-content:center;">
          <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
