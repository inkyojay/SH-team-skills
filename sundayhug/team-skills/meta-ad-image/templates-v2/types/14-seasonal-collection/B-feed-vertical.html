<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 시즌/컬렉션 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 시즌/컬렉션 (Seasonal/Collection)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 시즌 컬렉션 제품 라인업 소개
  IMAGE SPEC: 시즌 무드 이미지 1080×500 (상단) + 제품 그리드
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Seasonal mood -->
    <div style="width:100%;height:38%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="봄 컬렉션"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 30%, rgba(250,247,244,1) 100%);z-index:1;"></div>
      <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:12px 32px;">2026 SPRING</span>
      </div>
      <div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:2;text-align:center;">
        <div style="font-family:var(--font-display);font-size:42px;font-weight:300;font-style:italic;color:var(--dark);">New Collection</div>
      </div>
    </div>

    <!-- BOTTOM: Product lineup -->
    <div style="width:100%;height:62%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 48px 48px;">

      <div class="ma-title" style="font-size:40px;margin-bottom:8px;">봄 신상 라인업</div>
      <div class="ma-subtitle" style="font-size:24px;margin-bottom:32px;">따스한 색감, 부드러운 촉감</div>

      <!-- 3 products in row -->
      <div style="display:flex;gap:24px;width:100%;margin-bottom:36px;">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="width:100%;aspect-ratio:1;border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
                 alt="슬리핑백" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);margin-bottom:4px;">슬리핑백</div>
          <div style="font-size:20px;color:var(--accent-dark);">NEW</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="width:100%;aspect-ratio:1;border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
                 alt="스와들" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);margin-bottom:4px;">스와들</div>
          <div style="font-size:20px;color:var(--accent-dark);">NEW</div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
          <div style="width:100%;aspect-ratio:1;border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);">
            <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
                 alt="이불" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="font-size:24px;font-weight:500;color:var(--dark);margin-bottom:4px;">밤부 이불</div>
          <div style="font-size:20px;color:var(--accent-dark);">NEW</div>
        </div>
      </div>

      <a class="ma-cta-button" style="margin-bottom:20px;">컬렉션 보기</a>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
