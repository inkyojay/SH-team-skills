<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — FAQ/오해타파 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: FAQ/오해타파 (FAQ/Myth-Buster)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 흔한 오해/궁금증 → 팩트 체크 형식
  IMAGE SPEC: 없음 (그래디언트 배경 + 아이콘)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Myth (40%) -->
    <div style="height:40%;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;text-align:center;">
      <div class="ma-label" style="color:rgba(255,255,255,.4);font-size:20px;letter-spacing:.25em;margin-bottom:24px;">MYTH</div>
      <div style="font-size:64px;margin-bottom:20px;">🤔</div>
      <div class="ma-title" style="color:#fff;font-size:44px;line-height:1.4;">
        "슬리핑백은<br>여름에 더워요"
      </div>
    </div>

    <!-- Arrow divider -->
    <div style="height:4%;background:linear-gradient(to bottom, #2C2C3A 50%, transparent 50%);position:relative;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:2;">
        <span style="font-size:32px;color:#fff;line-height:1;">↓</span>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:var(--palette-gradient);"></div>
    </div>

    <!-- BOTTOM: Fact (56%) -->
    <div style="height:56%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 80px;text-align:center;">
      <div class="ma-label" style="color:var(--safe);font-size:20px;letter-spacing:.25em;margin-bottom:20px;">FACT</div>
      <div class="ma-title" style="font-size:40px;margin-bottom:20px;color:var(--dark);">
        밤부 원단은 체온 조절에<br>최적화되어 있어요
      </div>
      <div class="ma-subtitle" style="font-size:26px;line-height:1.7;margin-bottom:32px;">
        대나무 섬유의 미세 구멍이 열을 배출하고<br>수분을 흡수해 사계절 쾌적합니다
      </div>

      <!-- Fact badges -->
      <div style="display:flex;gap:20px;margin-bottom:32px;">
        <div style="padding:12px 24px;background:rgba(124,154,114,.15);border-radius:12px;">
          <span class="ma-check" style="font-size:22px;">✓</span>
          <span style="font-size:22px;color:var(--dark);margin-left:8px;">통기성 우수</span>
        </div>
        <div style="padding:12px 24px;background:rgba(124,154,114,.15);border-radius:12px;">
          <span class="ma-check" style="font-size:22px;">✓</span>
          <span style="font-size:22px;color:var(--dark);margin-left:8px;">흡습성 뛰어남</span>
        </div>
        <div style="padding:12px 24px;background:rgba(124,154,114,.15);border-radius:12px;">
          <span class="ma-check" style="font-size:22px;">✓</span>
          <span style="font-size:22px;color:var(--dark);margin-left:8px;">온도 조절</span>
        </div>
      </div>

      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
