<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — FAQ/오해타파 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: FAQ/오해타파 (FAQ/Myth-Buster)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — Myth vs Fact 세로 전환 포맷
  IMAGE SPEC: 제품 이미지 (중앙 원형 썸네일)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- TOP: Myth (~30%) -->
    <div style="height:576px;background:#2C2C3A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 80px 40px;text-align:center;flex-shrink:0;">
      <div class="ma-label" style="color:rgba(255,255,255,.4);font-size:22px;letter-spacing:.25em;margin-bottom:32px;">MYTH</div>
      <div style="font-size:72px;margin-bottom:24px;">❌</div>
      <div class="ma-title" style="color:#fff;font-size:48px;line-height:1.4;">
        "슬리핑백을 입으면<br>아이가 답답해해요"
      </div>
    </div>

    <!-- Arrow divider -->
    <div style="height:96px;background:linear-gradient(to bottom, #2C2C3A 50%, transparent 50%);position:relative;flex-shrink:0;">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:2;">
        <span style="font-size:40px;color:#fff;line-height:1;">↓</span>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:var(--palette-gradient);"></div>
    </div>

    <!-- BOTTOM: Fact -->
    <div style="flex:1;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:40px 80px 0;text-align:center;">
      <div class="ma-label" style="color:var(--safe);font-size:22px;letter-spacing:.25em;margin-bottom:24px;">FACT</div>

      <!-- Product image -->
      <div style="width:300px;height:300px;border-radius:50%;overflow:hidden;margin-bottom:28px;box-shadow:0 8px 40px rgba(0,0,0,.1);flex-shrink:0;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>

      <div class="ma-title" style="font-size:40px;margin-bottom:16px;color:var(--dark);">넉넉한 하체 공간 설계</div>
      <div class="ma-subtitle" style="font-size:28px;line-height:1.7;margin-bottom:32px;">
        다리를 자유롭게 움직일 수 있는<br>A라인 실루엣으로<br>답답함 없이 포근해요
      </div>

      <!-- Fact points -->
      <div style="display:flex;gap:16px;margin-bottom:32px;">
        <div style="padding:12px 20px;background:rgba(124,154,114,.15);border-radius:12px;">
          <span class="ma-check" style="font-size:22px;">✓</span>
          <span style="font-size:20px;color:var(--dark);margin-left:8px;">자유로운 발차기</span>
        </div>
        <div style="padding:12px 20px;background:rgba(124,154,114,.15);border-radius:12px;">
          <span class="ma-check" style="font-size:22px;">✓</span>
          <span style="font-size:20px;color:var(--dark);margin-left:8px;">A라인 설계</span>
        </div>
      </div>

      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

    <!-- Safezone: bottom 35% (672px) left clear -->

  </div>
</div>

</body>
</html>
