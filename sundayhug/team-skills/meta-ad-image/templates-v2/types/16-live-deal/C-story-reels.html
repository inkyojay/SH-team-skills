<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 라이브 단독 특가 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 라이브 단독 특가 (Live Deal)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 라이브 방송 한정 특가 상품 프로모션
  IMAGE SPEC: 상단 제품 이미지 940×560px (object-fit:cover)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <!-- Full Background -->
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:120px 72px 200px;position:relative;">

    <!-- Top: Badge + Title + Subtitle -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="ma-badge" style="font-size:22px;padding:16px 40px;letter-spacing:.12em;">LIVE ONLY</span>
      <div class="ma-title" style="font-size:64px;text-align:center;">라이브 단독 특가</div>
      <div class="ma-subtitle" style="font-size:28px;color:var(--body);text-align:center;">방송 중에만 만나볼 수 있는 역대급 가격</div>
    </div>

    <!-- Product Card (Vertical Stack for Story) -->
    <div style="margin-top:64px;width:940px;background:#fff;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 32px rgba(0,0,0,.06);">

      <!-- Top: Product Image -->
      <div style="width:100%;height:560px;overflow:hidden;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
             alt="제품 이미지"
             style="width:100%;height:100%;object-fit:cover;">
      </div>

      <!-- Bottom: Product Info -->
      <div style="padding:48px 56px 52px;">
        <!-- Product Name -->
        <div style="font-family:var(--font-body);font-size:42px;font-weight:700;color:var(--dark);line-height:1.4;">듀얼 역류방지쿠션 +커버포함</div>
        <!-- Tags -->
        <div style="font-family:var(--font-body);font-size:24px;color:var(--sub);margin-top:16px;">#육아템 #수유템</div>
        <!-- Divider -->
        <div style="width:100%;height:1px;background:var(--line);margin:32px 0;"></div>
        <!-- Original Price -->
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-family:var(--font-body);font-size:28px;color:var(--sub);">정상가</span>
          <span class="ma-price-orig" style="font-size:28px;">54,900원</span>
        </div>
        <!-- Deal Price -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;">
          <span style="font-family:var(--font-body);font-size:28px;color:var(--dark);font-weight:500;">라이브 혜택가</span>
          <span class="ma-price" style="font-size:48px;color:var(--dark);">42,750원</span>
        </div>
        <!-- Discount Badge -->
        <div style="display:flex;justify-content:flex-end;margin-top:16px;">
          <span style="display:inline-block;padding:10px 28px;border-radius:100px;background:var(--danger);color:#fff;font-family:var(--font-en);font-size:26px;font-weight:700;">22%</span>
        </div>
      </div>
    </div>

    <!-- Bottom Notes -->
    <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:10px;">
      <span style="font-family:var(--font-body);font-size:24px;color:var(--sub);">※ 라이브 방송 중에만 적용되는 특별 할인가입니다</span>
      <span style="font-family:var(--font-body);font-size:24px;color:var(--sub);">※ 추가 혜택 모두 적용 시 적용되는 혜택가입니다</span>
    </div>

  </div>
</div>

</body>
</html>
