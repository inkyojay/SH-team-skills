<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 감성 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 감성 (Emotional)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 감성 브랜딩, 중앙 텍스트 오버레이
  IMAGE SPEC: 풀블리드 라이프스타일 사진 1080×1350 + 반투명 풀 오버레이
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">

  <!-- Full-bleed hero image -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
       alt="실키밤부 슬리핑백 라이프스타일">

  <!-- Full semi-transparent overlay -->
  <div class="ma-overlay full" style="padding:100px 80px;justify-content:center;align-items:center;text-align:center;">

    <!-- SUNDAY HUG label -->
    <div class="ma-label" style="color:rgba(255,255,255,.55);font-size:22px;letter-spacing:.3em;margin-bottom:48px;">SUNDAY HUG</div>

    <!-- Display font headline -->
    <div class="ma-quote" style="color:#fff;font-size:56px;line-height:1.5;margin-bottom:24px;">
      Every night,<br>a warm hug
    </div>

    <!-- Korean subtitle -->
    <div class="ma-subtitle" style="color:rgba(255,255,255,.75);font-size:32px;margin-bottom:48px;">
      매일 밤, 따뜻한 포옹처럼
    </div>

    <!-- Product name -->
    <div style="font-family:var(--font-body);font-size:30px;color:rgba(255,255,255,.85);font-weight:400;margin-bottom:80px;">
      실키밤부 슬리핑백
    </div>

    <!-- Brand logo at bottom -->
    <div class="ma-brand-bar" style="position:absolute;bottom:72px;left:50%;transform:translateX(-50%);">
      <span class="ma-brand-logo" style="color:rgba(255,255,255,.7);font-size:24px;">Sunday Hug</span>
    </div>

  </div>

</div>

</body>
</html>
