<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 스크롤 멈춤 훅 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 스크롤 멈춤 훅 (Hook-Reveal — V05)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: B급 바이럴 — 충격 텍스트 상단 + 하단 제품 리빌
  IMAGE SPEC: 없음 (텍스트 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- HOOK: 70% -->
    <div style="height:70%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;position:relative;">
      <!-- Accent stripe -->
      <div style="position:absolute;top:0;left:0;right:0;height:8px;background:#FFD700;"></div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:36px;font-weight:500;color:#FFD700;margin-bottom:32px;letter-spacing:.1em;">⚠ 주의 ⚠</div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:88px;font-weight:900;color:#FFF;line-height:1.35;">
        이걸 알면<br>
        다른 스와들<br>
        <span style="color:#FF3366;">못 씁니다</span>
      </div>
    </div>

    <!-- REVEAL: 30% -->
    <div style="height:30%;background:#FFF;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 60px;text-align:center;gap:20px;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:40px;font-weight:700;color:#1a1a1a;">
        Sunday Hug 스와들 스트랩
      </div>
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;color:#888;line-height:1.5;">
        실키밤부 소재 | 등센서 방지 | 사계절 사용
      </div>
      <a class="ma-cta-button" style="font-size:26px;padding:20px 56px;margin-top:8px;">자세히 보기</a>
    </div>

  </div>
</div>

</body>
</html>
