<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 스크롤 멈춤 훅 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 스크롤 멈춤 훅 (Hook-Reveal — V05)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: B급 바이럴 — 충격적 텍스트 → 제품 리빌
  IMAGE SPEC: 없음 (텍스트 기반)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- HOOK: 80% -->
    <div style="height:80%;background:#FF3366;display:flex;align-items:center;justify-content:center;padding:60px 80px;text-align:center;">
      <div style="font-family:'Noto Sans KR',sans-serif;font-size:96px;font-weight:900;color:#FFF;line-height:1.3;text-shadow:0 4px 20px rgba(0,0,0,.2);">
        이거 진짜<br>사기 아닙니다
      </div>
    </div>

    <!-- REVEAL: 20% -->
    <div style="height:20%;background:#FFF;display:flex;align-items:center;justify-content:center;padding:20px 60px;gap:24px;">
      <div style="width:120px;height:120px;border-radius:16px;background:#F8F4F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-size:56px;">🧸</span>
      </div>
      <div>
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:28px;font-weight:700;color:#1a1a1a;">스와들 스트랩</div>
        <div style="font-family:'Noto Sans KR',sans-serif;font-size:22px;color:#888;">아기 7시간 연속 수면</div>
      </div>
      <a class="ma-cta-button" style="font-size:22px;padding:16px 36px;flex-shrink:0;">구매하기</a>
    </div>

  </div>
</div>

</body>
</html>
