<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 라이프스타일/루틴 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 라이프스타일/루틴 (Lifestyle/Routine)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 일상 속 제품 사용 장면, 수면 루틴 제안
  IMAGE SPEC: 풀블리드 라이프스타일 사진 1080×1080 + 하단 루틴 스텝 오버레이
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">

  <!-- Full-bleed lifestyle image -->
  <img class="ma-hero-img"
       src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
       alt="수면 루틴">

  <!-- Top badge -->
  <div style="position:absolute;top:48px;left:48px;z-index:2;">
    <span class="ma-badge" style="font-size:18px;padding:10px 24px;">BEDTIME ROUTINE</span>
  </div>

  <!-- Bottom overlay with routine steps -->
  <div class="ma-overlay bottom" style="padding:60px 64px;padding-top:300px;">
    <div style="font-family:var(--font-display);font-size:42px;font-weight:300;font-style:italic;color:#fff;margin-bottom:24px;">Sweet dreams routine</div>

    <!-- 3-step routine -->
    <div style="display:flex;gap:24px;margin-bottom:32px;">
      <div style="flex:1;background:rgba(255,255,255,.12);border-radius:16px;padding:24px;text-align:center;">
        <div style="font-family:var(--font-en);font-size:18px;color:rgba(255,255,255,.5);letter-spacing:.15em;margin-bottom:8px;">STEP 1</div>
        <div style="font-size:28px;margin-bottom:8px;">🛁</div>
        <div style="font-size:22px;color:#fff;font-weight:400;">따뜻한 목욕</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.12);border-radius:16px;padding:24px;text-align:center;">
        <div style="font-family:var(--font-en);font-size:18px;color:rgba(255,255,255,.5);letter-spacing:.15em;margin-bottom:8px;">STEP 2</div>
        <div style="font-size:28px;margin-bottom:8px;">👶</div>
        <div style="font-size:22px;color:#fff;font-weight:400;">슬리핑백 입히기</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.12);border-radius:16px;padding:24px;text-align:center;">
        <div style="font-family:var(--font-en);font-size:18px;color:rgba(255,255,255,.5);letter-spacing:.15em;margin-bottom:8px;">STEP 3</div>
        <div style="font-size:28px;margin-bottom:8px;">🌙</div>
        <div style="font-size:22px;color:#fff;font-weight:400;">편안한 숙면</div>
      </div>
    </div>

    <div class="ma-brand-bar">
      <span class="ma-brand-logo" style="color:rgba(255,255,255,.9);">Sunday Hug</span>
    </div>
  </div>

</div>

</body>
</html>
