<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 혜택/기능 Story Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 혜택/기능 (Benefit-Feature)
  VARIATION: C — Story / Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 세로 풀스크린 4개 기능 카드 + 제품 이미지
  IMAGE SPEC: 제품 이미지 400×400 (중앙 원형/라운드)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;padding:80px 60px 0;">

    <!-- Label + Title -->
    <div style="text-align:center;margin-bottom:40px;">
      <div class="ma-label" style="font-size:20px;letter-spacing:.18em;margin-bottom:16px;">WHY SILKY BAMBOO</div>
      <div class="ma-title" style="font-size:48px;color:var(--dark);line-height:1.35;">실키밤부가<br>특별한 이유</div>
    </div>

    <!-- Product Image (centered, rounded rect) -->
    <div style="width:400px;height:400px;border-radius:32px;overflow:hidden;margin-bottom:48px;flex-shrink:0;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg"
           alt="실키밤부 슬리핑백"
           style="width:100%;height:100%;object-fit:cover;">
    </div>

    <!-- 4 Feature Cards (stacked, full width, compact) -->
    <div style="width:100%;display:flex;flex-direction:column;gap:16px;">

      <!-- Card 1 -->
      <div class="ma-feature-card" style="display:flex;align-items:center;gap:24px;text-align:left;padding:24px 32px;border-radius:14px;">
        <div style="font-size:32px;flex-shrink:0;width:48px;text-align:center;">🌿</div>
        <div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px;">프리미엄 밤부 원단</div>
          <div style="font-size:20px;color:var(--body);line-height:1.4;">실크보다 부드러운 촉감</div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="ma-feature-card" style="display:flex;align-items:center;gap:24px;text-align:left;padding:24px 32px;border-radius:14px;">
        <div style="font-size:32px;flex-shrink:0;width:48px;text-align:center;">🌡️</div>
        <div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px;">사계절 온도 조절</div>
          <div style="font-size:20px;color:var(--body);line-height:1.4;">여름엔 시원, 겨울엔 따뜻</div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="ma-feature-card" style="display:flex;align-items:center;gap:24px;text-align:left;padding:24px 32px;border-radius:14px;">
        <div style="font-size:32px;flex-shrink:0;width:48px;text-align:center;">🧬</div>
        <div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px;">자연 항균 기능</div>
          <div style="font-size:20px;color:var(--body);line-height:1.4;">세균 번식 99.9% 억제</div>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="ma-feature-card" style="display:flex;align-items:center;gap:24px;text-align:left;padding:24px 32px;border-radius:14px;">
        <div style="font-size:32px;flex-shrink:0;width:48px;text-align:center;">🔒</div>
        <div>
          <div style="font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px;">양방향 안전 지퍼</div>
          <div style="font-size:20px;color:var(--body);line-height:1.4;">기저귀 교체도 간편</div>
        </div>
      </div>

    </div>

    <!-- Brand Logo (above safezone) -->
    <div style="margin-top:40px;">
      <span class="ma-brand-logo" style="color:var(--accent-dark);font-size:26px;">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
