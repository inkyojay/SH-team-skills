<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 세트/구성 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 세트/구성 (Bundle/Set)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 세트 구성 리스트 + 개별/세트 가격 비교
  IMAGE SPEC: 세트 이미지 1080×450 (상단 히어로)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div class="ma-split-h" style="width:100%;height:100%;">

    <!-- TOP: Set hero image -->
    <div style="width:100%;height:35%;position:relative;overflow:hidden;">
      <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
           alt="세트 구성"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 30%, rgba(250,247,244,1) 100%);z-index:1;"></div>
      <div style="position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:2;">
        <span class="ma-badge" style="font-size:20px;padding:12px 32px;">BUNDLE DEAL</span>
      </div>
    </div>

    <!-- BOTTOM: Set breakdown -->
    <div style="width:100%;height:65%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 72px 48px;">

      <div class="ma-title" style="font-size:40px;margin-bottom:36px;">수면 케어 풀세트</div>

      <!-- Item list with prices -->
      <div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:700px;margin-bottom:32px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="display:flex;align-items:center;gap:20px;">
            <div style="width:72px;height:72px;border-radius:12px;overflow:hidden;flex-shrink:0;">
              <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg" alt="" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <span style="font-size:28px;font-weight:500;color:var(--dark);">실키밤부 슬리핑백</span>
          </div>
          <span style="font-family:var(--font-en);font-size:24px;color:var(--sub);text-decoration:line-through;">62,000원</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="display:flex;align-items:center;gap:20px;">
            <div style="width:72px;height:72px;border-radius:12px;overflow:hidden;flex-shrink:0;">
              <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg" alt="" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <span style="font-size:28px;font-weight:500;color:var(--dark);">오가닉 스와들 2장</span>
          </div>
          <span style="font-family:var(--font-en);font-size:24px;color:var(--sub);text-decoration:line-through;">35,000원</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:24px 32px;background:rgba(255,255,255,.5);border-radius:16px;">
          <div style="display:flex;align-items:center;gap:20px;">
            <div style="width:72px;height:72px;border-radius:12px;overflow:hidden;flex-shrink:0;">
              <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-03.jpg" alt="" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <span style="font-size:28px;font-weight:500;color:var(--dark);">프리미엄 턱받이</span>
          </div>
          <span style="font-family:var(--font-en);font-size:24px;color:var(--sub);text-decoration:line-through;">18,000원</span>
        </div>
      </div>

      <!-- Set price -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;">
        <div style="display:flex;align-items:baseline;gap:16px;">
          <span class="ma-discount" style="font-size:48px;">30%</span>
          <span class="ma-price" style="font-size:56px;">79,900원</span>
        </div>
      </div>

      <a class="ma-cta-button" style="margin-bottom:20px;">세트 구매하기</a>
      <div class="ma-brand-bar" style="justify-content:center;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
