<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 권위/전문가 Feed Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 권위/전문가 (Authority-Expert)
  VARIATION: B — Feed Vertical
  DIMENSIONS: 1080 × 1350px (4:5)
  PURPOSE: 메타 광고 — 전문가 추천 + 인증 배지 + 제품
  IMAGE SPEC: 제품 라이프스타일 이미지 (하단 소형)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-vertical">
  <div style="width:100%;height:100%;display:flex;flex-direction:column;">

    <!-- TOP: Expert Profile + Quote (bg-warm) -->
    <div style="flex:1;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 72px;">

      <!-- Badge -->
      <div style="margin-bottom:32px;">
        <span class="ma-badge" style="font-size:18px;padding:10px 28px;">EXPERT RECOMMENDATION</span>
      </div>

      <!-- Expert Profile -->
      <div class="ma-expert-profile" style="margin-bottom:36px;">
        <!-- Avatar placeholder -->
        <div class="ma-expert-avatar" style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;background:var(--dark);border:3px solid var(--accent);">
          <span style="font-family:var(--font-en);font-size:32px;font-weight:700;color:#fff;">Dr.K</span>
        </div>
        <div>
          <div style="font-size:28px;font-weight:700;color:var(--dark);margin-bottom:4px;">김소아 소아과 전문의</div>
          <div style="font-size:20px;color:var(--body);">소아과 전문의 15년</div>
        </div>
      </div>

      <!-- Quote -->
      <div class="ma-quote" style="font-size:32px;text-align:center;line-height:1.7;max-width:860px;">
        "밤부 원단은 자연적으로 온도를 조절해 아이에게 최적의 수면 환경을 제공합니다."
      </div>
    </div>

    <!-- MIDDLE: Certification Badges -->
    <div style="padding:40px 64px;background:var(--bg);display:flex;justify-content:center;gap:32px;">

      <!-- KC -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div style="width:88px;height:88px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:var(--dark);">KC</span>
        </div>
        <div style="font-size:20px;font-weight:500;color:var(--dark);text-align:center;">KC<br>안전인증</div>
      </div>

      <!-- OEKO-TEX -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div style="width:88px;height:88px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:16px;font-weight:700;color:var(--dark);text-align:center;line-height:1.2;">OEKO<br>TEX</span>
        </div>
        <div style="font-size:20px;font-weight:500;color:var(--dark);text-align:center;">OEKO-TEX<br>인증</div>
      </div>

      <!-- ISO -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div style="width:88px;height:88px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;background:#fff;">
          <span style="font-family:var(--font-en);font-size:22px;font-weight:700;color:var(--dark);">ISO</span>
        </div>
        <div style="font-size:20px;font-weight:500;color:var(--dark);text-align:center;">국제표준<br>ISO</div>
      </div>

    </div>

    <!-- BOTTOM: Product + Brand -->
    <div style="padding:32px 64px 40px;background:var(--bg);display:flex;align-items:center;gap:32px;">
      <!-- Product image (small) -->
      <div style="width:160px;height:160px;border-radius:16px;overflow:hidden;flex-shrink:0;">
        <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/lifestyle-02.jpg"
             alt="실키밤부 슬리핑백"
             style="width:100%;height:100%;object-fit:cover;">
      </div>
      <!-- Product info -->
      <div style="flex:1;">
        <div style="font-family:var(--font-display);font-size:22px;font-weight:300;font-style:italic;color:var(--accent-dark);margin-bottom:4px;">Silky Bamboo</div>
        <div style="font-size:28px;font-weight:700;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
        <div style="font-size:20px;color:var(--body);">전문가가 인정한 프리미엄 수면 솔루션</div>
      </div>
      <!-- Brand -->
      <div style="flex-shrink:0;">
        <span class="ma-brand-logo" style="color:var(--accent-dark);font-size:24px;">Sunday Hug</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
