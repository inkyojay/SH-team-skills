<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 권위/전문가 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 권위/전문가 (Authority-Expert)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 전문가 프로필 + 추천 인용문
  IMAGE SPEC: 전문가 아바타 플레이스홀더 (이니셜 원형)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 72px;">

    <!-- EXPERT PICK Badge -->
    <div style="margin-bottom:40px;">
      <span class="ma-badge" style="font-size:20px;padding:12px 32px;">EXPERT PICK</span>
    </div>

    <!-- Expert Profile -->
    <div class="ma-expert-profile" style="flex-direction:column;gap:16px;margin-bottom:48px;">
      <!-- Avatar placeholder with initials -->
      <div class="ma-expert-avatar" style="width:140px;height:140px;display:flex;align-items:center;justify-content:center;background:var(--dark);border:3px solid var(--accent);">
        <span style="font-family:var(--font-en);font-size:36px;font-weight:700;color:#fff;letter-spacing:.02em;">Dr.K</span>
      </div>
      <div style="text-align:center;">
        <div style="font-size:30px;font-weight:700;color:var(--dark);margin-bottom:6px;">김소아 소아과 전문의</div>
        <div style="font-size:22px;color:var(--body);">소아과 전문의 15년</div>
      </div>
    </div>

    <!-- Quote -->
    <div class="ma-quote" style="font-size:36px;text-align:center;line-height:1.7;margin-bottom:48px;max-width:900px;">
      "아이의 수면 환경에서 가장 중요한 것은 적절한 온도 조절입니다. 밤부 원단은 자연적으로 온도를 조절해 아이에게 최적의 수면 환경을 제공합니다."
    </div>

    <!-- Product Name + Brand -->
    <div style="display:flex;align-items:center;gap:24px;">
      <div style="font-size:26px;font-weight:500;color:var(--dark);">실키밤부 슬리핑백</div>
      <div style="width:1px;height:24px;background:var(--sub);opacity:.4;"></div>
      <span class="ma-brand-logo" style="color:var(--accent-dark);font-size:24px;">Sunday Hug</span>
    </div>

  </div>
</div>

</body>
</html>
