<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사용자 후기 Story/Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사용자 후기 (UGC/Testimonial)
  VARIATION: C — Story/Reels
  DIMENSIONS: 1080 × 1920px (9:16)
  PURPOSE: 메타 광고 — 다중 리뷰 카드로 신뢰 극대화
  IMAGE SPEC: 텍스트 전용 (리뷰 카드 2개 스택)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="story-reels">
  <div style="width:100%;height:100%;background:var(--palette-gradient);display:flex;flex-direction:column;padding:80px 72px;">

    <!-- Top: Label + Title (safezone) -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:48px;">
      <span class="ma-label">SUNDAY HUG</span>
      <div class="ma-title" style="font-size:56px;text-align:center;line-height:1.35;">엄마들의 리얼 후기</div>
    </div>

    <!-- Review Card 1 -->
    <div class="ma-review-card" style="width:100%;padding:44px 48px;margin-bottom:28px;">
      <div style="font-family:var(--font-display);font-size:56px;font-weight:300;font-style:italic;color:var(--accent);line-height:0.6;margin-bottom:20px;">&ldquo;</div>
      <div class="ma-quote" style="font-size:32px;line-height:1.6;margin-bottom:24px;">밤새 뒤척이던 아이가<br>이제 아침까지 푹 자요</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="font-size:30px;color:var(--accent);letter-spacing:3px;">★★★★★</div>
        <div style="font-size:22px;color:var(--body);">김○○ 맘</div>
      </div>
    </div>

    <!-- Review Card 2 -->
    <div class="ma-review-card" style="width:100%;padding:44px 48px;margin-bottom:48px;">
      <div style="font-family:var(--font-display);font-size:56px;font-weight:300;font-style:italic;color:var(--accent);line-height:0.6;margin-bottom:20px;">&ldquo;</div>
      <div class="ma-quote" style="font-size:32px;line-height:1.6;margin-bottom:24px;">밤부 원단이라 여름에도 시원하고<br>겨울에도 따뜻해요</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="font-size:30px;color:var(--accent);letter-spacing:3px;">★★★★★</div>
        <div style="font-size:22px;color:var(--body);">이○○ 맘</div>
      </div>
    </div>

    <!-- Product Info + CTA -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <div style="text-align:center;">
        <div style="font-size:30px;font-weight:500;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
        <div style="font-size:24px;color:var(--body);">아이의 숙면을 위한 선택</div>
      </div>
      <div class="ma-cta-button" style="font-size:26px;padding:22px 56px;">자세히 보기</div>
    </div>

    <!-- Content ends here — within top ~65% safezone -->

  </div>
</div>

</body>
</html>
