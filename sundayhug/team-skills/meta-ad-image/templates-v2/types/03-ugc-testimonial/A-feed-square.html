<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Sunday Hug — 사용자 후기 Feed Square</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_base-styles.css">
<link rel="stylesheet" href="../../_palettes.css">
</head>
<!--=============================================================
  TYPE: 사용자 후기 (UGC/Testimonial)
  VARIATION: A — Feed Square
  DIMENSIONS: 1080 × 1080px (1:1)
  PURPOSE: 메타 광고 — 실 사용자 리뷰로 신뢰 형성
  IMAGE SPEC: 제품 썸네일 200×200 (하단 원형)
=============================================================-->
<body style="margin:0;padding:0;background:#eee;">

<div class="ma-frame" data-type="feed-square">
  <div class="ma-center" style="background:var(--palette-gradient);padding:80px 90px;justify-content:space-between;">

    <!-- Top: Badge + Quote marks -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;">
      <span class="ma-badge">REAL REVIEW</span>
      <div style="font-family:var(--font-display);font-size:120px;font-weight:300;font-style:italic;color:var(--accent);line-height:0.6;margin-top:16px;">&ldquo;</div>
    </div>

    <!-- Center: Review Card -->
    <div class="ma-review-card" style="width:100%;padding:48px 52px;text-align:center;">
      <div class="ma-quote" style="font-size:38px;line-height:1.65;margin-bottom:32px;">아이가 이 슬리핑백을 입으면 신기하게 잘 자요.<br>밤새 뒤척이지 않고 아침까지 푹 자더라고요.</div>
      <div style="font-size:36px;color:var(--accent);letter-spacing:4px;margin-bottom:20px;">★★★★★</div>
      <div style="font-size:26px;color:var(--body);font-weight:400;">김○○ 맘 · 14개월 아기</div>
    </div>

    <!-- Bottom: Product thumbnail + brand -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div style="display:flex;align-items:center;gap:20px;">
        <div style="width:200px;height:200px;border-radius:16px;overflow:hidden;flex-shrink:0;">
          <img src="../../../../../projects/detail-pages/current/images/sleepsack-silky-bamboo/overview-01.jpg"
               alt="실키밤부 슬리핑백"
               style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div style="text-align:left;">
          <div style="font-size:28px;font-weight:500;color:var(--dark);margin-bottom:8px;">실키밤부 슬리핑백</div>
          <div class="ma-brand-bar">
            <span class="ma-brand-logo" style="color:var(--accent-dark);">Sunday Hug</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
